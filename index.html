<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD COMMAND V188</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #c5a059; --bg: #000; }
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg); overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* Main Container - Locked to Screen Width */
        #container { width: 100%; height: 100%; position: relative; overflow: hidden; }
        
        /* Tactical Buttons Row */
        .side-col { 
            position: absolute; width: 22%; height: 60%; top: 20%; 
            display: flex; flex-direction: column; justify-content: space-around; z-index: 100; 
        }
        .left { left: 2%; } .right { right: 2%; }
        .main-btn { 
            background: rgba(0, 20, 0, 0.9); border: 2px solid var(--gold); 
            color: var(--gold); padding: 12px 2px; text-align: center; 
            font-size: 11px; font-weight: bold; border-radius: 6px; text-transform: uppercase;
        }

        /* Map Page Layout */
        .page { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000; z-index: 500; 
        }
        .header { 
            background: #111; border-bottom: 2px solid var(--gold); 
            padding: 10px; display: flex; align-items: center; 
        }
        .back-btn { 
            background: var(--gold); color: #000; border: none; 
            padding: 10px 15px; font-weight: bold; border-radius: 4px; 
        }

        #map-controls { background: #111; padding: 8px; width: 100%; }
        #live-map { width: 100%; height: 45vh; background: #222; }

        /* Bottom Tactical Toolbar - Sized for Mobile */
        .tool-grid { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; background: #000; }
        .role-btn { 
            flex: 1 1 18%; background: #222; color: #fff; border: 1px solid #444; 
            padding: 12px 0; font-size: 11px; font-weight: bold; border-radius: 4px;
        }
        .act-btn { 
            flex: 1 1 30%; background: var(--gold); color: #000; border: none; 
            padding: 18px 0; font-size: 11px; font-weight: bold; border-radius: 4px; 
            text-transform: uppercase; margin-top: 5px;
        }

        /* Marker Styles */
        .pulse { width: 18px; height: 18px; background: #007bff; border: 3px solid white; border-radius: 50%; animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 123, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); } }
    </style>
</head>
<body>

<div id="container">
    <div style="width:100%; height:100%; background: radial-gradient(circle, #001a00 0%, #000 100%); display:flex; justify-content:center; align-items:center;">
        <img src="badge.jpg" style="position:absolute; top:20px; width:80px; z-index:10;">
        <img src="homepage.jpg" style="width:95%; opacity:0.6;">
        
        <div class="side-col left">
            <div class="main-btn" onclick="openPage('sos')">K9 SOS</div>
            <div class="main-btn">LEGAL</div>
            <div class="main-btn">DRUGS</div>
        </div>
        <div class="side-col right">
            <div class="main-btn" onclick="openPage('m-map')">TACTICAL MAP</div>
            <div class="main-btn">LOGS</div>
            <div class="main-btn">CODE</div>
        </div>
    </div>
</div>

<div id="m-map" class="page">
    <div class="header">
        <button class="back-btn" onclick="closePage('m-map')">← BACK</button>
        <span style="color:var(--gold); margin-left:15px; font-weight:bold;">COMMAND MAP</span>
    </div>

    <div id="map-controls">
        <div style="display:flex; gap:4px; margin-bottom:8px;">
            <input type="text" id="map-search" placeholder="ADDRESS..." style="flex:1; padding:12px; border-radius:4px; border:1px solid var(--gold); background:#000; color:#fff;">
            <button onclick="searchAddr()" style="background:var(--gold); border:none; padding:0 15px; border-radius:4px; font-weight:bold;">GO</button>
        </div>
        <button id="start-btn" onclick="startGps()" style="width:100%; background:#004400; color:#fff; border:1px solid #00ff00; padding:12px; font-weight:bold; border-radius:4px;">▶ START LIVE TRACKING</button>
    </div>

    <div id="live-map"></div>

    <div class="tool-grid">
        <button class="role-btn" style="border-top:3px solid blue;" onclick="setRole('le')">LE</button>
        <button class="role-btn" style="border-top:3px solid lightblue;" onclick="setRole('k9')">K9</button>
        <button class="role-btn" style="border-top:3px solid red;" onclick="setRole('sar')">SAR</button>
        <button class="role-btn" style="border-top:3px solid purple;" onclick="setRole('sub')">SUB</button>
        <button class="role-btn" style="border-top:3px solid green;" onclick="setRole('civ')">CIV</button>
        
        <button class="act-btn" style="background:#600; color:#fff;" onclick="togglePerimeter()">📍 PERIMETER</button>
        <button class="act-btn" onclick="dropFlag()">🚩 FOUND PROP</button>
        <button class="act-btn" onclick="toggleNight()">🌙 NIGHT</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, userMarker, perimeterMode = false;

    function openPage(id) {
        document.getElementById(id).style.display = 'block';
        if(id === 'm-map') {
            setTimeout(() => {
                if(!map) {
                    map = L.map('live-map', {zoomControl: false}).setView([37.525, -79.15], 13);
                    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                }
                map.invalidateSize();
            }, 300);
        }
    }

    function closePage(id) { document.getElementById(id).style.display = 'none'; }

    function startGps() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                if (userMarker) { userMarker.setLatLng([lat, lng]); } 
                else {
                    const icon = L.divIcon({ className: 'pulse', iconSize: [18, 18] });
                    userMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                }
                map.panTo([lat, lng]);
            }, null, { enableHighAccuracy: true });
        }
    }

    function togglePerimeter() {
        perimeterMode = !perimeterMode;
        if(perimeterMode) {
            alert("PERIMETER ACTIVE: Tap map to drop RED DOTS.");
            map.on('click', e => L.circleMarker(e.latlng, { color: 'red', radius: 8, fillOpacity: 0.9 }).addTo(map));
        } else {
            map.off('click');
        }
    }

    async function searchAddr() {
        let addr = document.getElementById('map-search').value;
        if(!addr) return;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`);
        const data = await res.json();
        if (data[0]) {
            map.setView([data[0].lat, data[0].lon], 17);
            L.marker([data[0].lat, data[0].lon]).addTo(map).bindPopup("SEARCH POINT").openPopup();
        }
    }

    function toggleNight() { document.getElementById('live-map').classList.toggle('night-vision-map'); }
    function dropFlag() { if(userMarker) L.marker(userMarker.getLatLng()).addTo(map).bindPopup("PROPERTY FOUND").openPopup(); }
</script>

<style>
    .night-vision-map { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.2); }
</style>

</body>
</html>
