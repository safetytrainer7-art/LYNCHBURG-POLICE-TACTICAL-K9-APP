
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAR COMMAND - MANUAL V11</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --sar-orange: #ff6600; --gold: #ffd700; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Arial', sans-serif; overflow: hidden; color: white; }

        .header { background: #001a00; padding: 45px 15px 10px; border-bottom: 3px solid var(--sar-orange); z-index: 3000; }
        .search-row { display: flex; gap: 5px; }
        .search-row input { flex-grow: 1; padding: 12px; border-radius: 4px; border: none; font-size: 16px; font-weight: bold; }
        
        #map { flex-grow: 1; width: 100%; height: calc(100vh - 250px); z-index: 1; background: #111; }

        /* THE LEGEND (LEFT SIDE) */
        .legend { 
            position: absolute; left: 10px; top: 190px; width: 160px; 
            background: rgba(0,0,0,0.9); border: 2px solid var(--gold); 
            padding: 10px; z-index: 2000; border-radius: 8px; font-size: 12px; 
        }
        .legend b { color: var(--sar-orange); border-bottom: 1px solid #444; display: block; margin-bottom: 5px; }

        /* BOTTOM TOOLBAR */
        .toolbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 10px; background: #000; z-index: 3000; }
        .tool { background: #222; border: 1px solid #444; padding: 15px 0; border-radius: 6px; text-align: center; cursor: pointer; color: #fff; }
        .tool label { display: block; font-size: 9px; color: var(--gold); text-transform: uppercase; margin-top: 5px; font-weight: bold; }
        .tool.active { background: var(--sar-orange); }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px;">
        <span id="stat-text" style="color:var(--gold);">MANUAL COMMAND MODE</span>
        <span id="clock-text">00:00:00</span>
    </div>
    <div class="search-row">
        <input type="text" id="pls-input" placeholder="Enter Address (Include City, VA)">
        <button onclick="manualSearch()" style="background:var(--sar-orange); color:white; border:none; padding:10px 15px; border-radius:4px; font-weight:bold;">DEPLOY</button>
    </div>
</div>

<div id="map"></div>

<div class="legend">
    <b>SUBJECT PROFILE</b>
    NAME: <span id="n-tag">SEARCHING...</span><br>
    TYPE: <span style="color:yellow;">DEMENTIA</span><br>
    STATUS: <span style="color:lime;">ACTIVE</span><br>
    <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
    <span style="font-size:9px; color:#aaa;">Double-click map to set PLS manually.</span>
</div>

<div class="toolbar">
    <div id="perim-btn" class="tool" onclick="togglePerim()"><span>📐</span><label>Perimeter</label></div>
    <div class="tool" onclick="dropLZ()"><span>🚁</span><label>Set LZ</label></div>
    <div class="tool" onclick="alert('Searching for satellite...')"><span>📍</span><label>My Loc</label></div>
    <div class="tool" onclick="location.reload()"><span>🔄</span><label>Reset</label></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize map on Amherst, VA area
    var map = L.map('map', { zoomControl: false }).setView([37.5857, -79.0517], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 1. MANUAL SEARCH
    function manualSearch() {
        var addr = document.getElementById('pls-input').value;
        if(!addr) return;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${addr}`)
            .then(r => r.json()).then(d => {
                if(d[0]) {
                    var pos = [d[0].lat, d[0].lon];
                    map.setView(pos, 17);
                    L.marker(pos).addTo(map).bindPopup("<b>POINT LAST SEEN</b>").openPopup();
                } else {
                    alert("Location not found. Try adding ', VA' to the end.");
                }
            });
    }

    // 2. DOUBLE-CLICK TO SET PLS (NO SEARCH NEEDED)
    map.on('dblclick', function(e) {
        L.marker(e.latlng).addTo(map).bindPopup("<b>MANUAL PLS SET</b>").openPopup();
    });

    // 3. PERIMETER TOOL
    var drawing = false;
    var perimPoints = [];
    var poly = L.polygon([], {color: 'orange', fillOpacity: 0.3}).addTo(map);

    function togglePerim() {
        drawing = !drawing;
        document.getElementById('perim-btn').classList.toggle('active');
        if(drawing) alert("TAP MODE: Tap the map to draw the search perimeter.");
    }

    map.on('click', function(e) {
        if(drawing) {
            perimPoints.push(e.latlng);
            poly.setLatLngs(perimPoints);
            L.circleMarker(e.latlng, {radius: 4, color: 'white', fillColor: 'orange', fillOpacity: 1}).addTo(map);
        }
    });

    function dropLZ() { L.circle(map.getCenter(), {radius: 40, color: 'lime'}).addTo(map).bindPopup("HELO LZ").openPopup(); }
    setInterval(() => { document.getElementById('clock-text').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
