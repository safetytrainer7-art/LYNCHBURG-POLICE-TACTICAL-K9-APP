<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 Command Center</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0b1a12; }
        .app-container {
            width: 100%;
            height: 100vh;
            max-width: 430px; 
            background: url('homepage.jpg') no-repeat center top;
            background-size: cover;
            position: relative;
            margin: 0 auto;
        }
        /* These are the invisible touch zones for your icons */
        .icon-grid {
            position: absolute;
            top: 25%; /* Adjusts where the buttons start over your photo */
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }
        .icon-btn {
            height: 80px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0); /* Invisible but clickable */
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="icon-grid">
        <!-- Row 1 -->
        <div class="icon-btn" onclick="window.location.href='legal.html'"></div>
        <div class="icon-btn" onclick="window.location.href='narcotics.html'"></div>
        <div class="icon-btn" onclick="window.location.href='training.html'"></div>
        
        <!-- Row 2 -->
        <div class="icon-btn" onclick="alert('Emergency SOS/CPR Coming Soon')"></div>
        <div class="icon-btn" onclick="alert('GPS Tracking Coming Soon')"></div>
        <div class="icon-btn" onclick="alert('Tactical Tracking Coming Soon')"></div>
    </div>
</div>

</body>
</html>
