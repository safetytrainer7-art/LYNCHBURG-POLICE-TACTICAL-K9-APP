
<script>
    // NEW TACTICAL DISTANCE LOGIC (V114)
    function calcDist(){
        if(officerMarkers.length < 2) {
            document.getElementById('dist-hud').innerText = "PLACE AT LEAST 2 OFFICERS TO MEASURE PERIMETER GAPS";
            return;
        }
        
        var hud = document.getElementById('dist-hud');
        var text = "";
        
        // Measures the gap between each officer placed in sequence
        for (var i = 0; i < officerMarkers.length - 1; i++) {
            var p1 = officerMarkers[i].getLatLng();
            var p2 = officerMarkers[i+1].getLatLng();
            var d = p1.distanceTo(p2) * 1.09361; // Meters to Yards
            
            var color = d > 150 ? "#ff4444" : "#00ff44"; // Red if gap is over 150 yards
            text += `<span style="color:${color}">GAP ${i+1}-${i+2}: ${Math.round(d)} YDS</span> | `;
        }
        
        // If it's a closed square/triangle, measure the final gap to close the loop
        if(officerMarkers.length > 2) {
            var first = officerMarkers[0].getLatLng();
            var last = officerMarkers[officerMarkers.length - 1].getLatLng();
            var dFinal = last.distanceTo(first) * 1.09361;
            var colorFinal = dFinal > 150 ? "#ff4444" : "#00ff44";
            text += `<span style="color:${colorFinal}">GAP ${officerMarkers.length}-1: ${Math.round(dFinal)} YDS</span>`;
        }
        
        hud.innerHTML = text;
    }
</script>
