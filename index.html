
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD COMMAND V85</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --orange: #ff6600; --gold: #ffd700; --blue: #0044ff; --red: #ff0000; --live: #00ff00; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; touch-action: none; }
        .header { background: #001a00; border-bottom: 3px solid var(--orange); padding: 15px; text-align: center; color: var(--gold); font-weight: bold; }
        #map { height: 400px; width: 100%; background: #111; touch-action: auto; }
        .dash { background: #222; padding: 10px; display: flex; gap: 5px; }
        #addr-in { flex-grow: 1; padding: 12px; border-radius: 5px; font-size: 16px; }
        .icon-row { display: flex; justify-content: space-around; background: #111; padding: 10px; border-top: 2px solid #444; }
        .tool { padding: 15px; border: 2px solid #444; border-radius: 10px; background: #222; font-size: 20px; }
        .tool.active { border-color: var(--live); background: #003300; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .btn { background: #222; border: 2px solid #444; border-radius: 10px; padding: 15px; text-align: center; color: var(--gold); font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #000; z-index: 999; padding: 20px; overflow-y: auto; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="header">ACSD K9 COMMAND - V85 FIELD READY</div>
    <div class="dash">
        <input type="text" id="addr-in" placeholder="ENTER SEARCH AREA">
        <button onclick="findGPS()" style="background:var(--live); border:none; padding:10px; border-radius:5px; font-weight:bold;">TRACK</button>
    </div>
    
    <div id="map"></div>

    <div class="icon-row">
        <div id="m-perim" class="tool" onclick="setMode('perim')">🔴</div>
        <div id="m-k9" class="tool" onclick="setMode('k9')">🐕</div>
        <div id="m-clue" class="tool" onclick="setMode('clue')">🚩</div>
        <button onclick="clearMap()" style="background:var(--red); color:#fff; border:none; border-radius:5px; padding:10px;">CLEAR</button>
    </div>

    <div class="grid">
        <div class="btn" style="border-color:var(--blue)" onclick="openM('law')">⚖️ 20 LAWS</div>
        <div class="btn" style="border-color:var(--red)" onclick="openM('med')">🚑 MEDICAL</div>
    </div>

    <div id="law" class="modal"><button onclick="closeM('law')" style="width:100%;padding:15px;background:var(--red);color:#fff;">CLOSE</button><h2>K9 LAWS</h2><p><b>FL v. Harris:</b> Reliability.<br><b>FL v. Jardines:</b> Curtilage.<br><b>Rodriguez v. US:</b> Delay.</p></div>
    <div id="med" class="modal"><button onclick="closeM('med')" style="width:100%;padding:15px;background:var(--red);color:#fff;">CLOSE</button><h2>K9 MEDICAL</h2><p><b>CPR:</b> 100bpm.<br><b>HEAT:</b> Cool paws.<br><b>GSW:</b> Pressure.</p></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', {zoomControl: false}).setView([37.584, -79.052], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        var mode = null;
        var points = [];
        var polyline = L.polyline([], {color: 'red', weight: 5}).addTo(map);

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
            if(m) document.getElementById('m-'+m).classList.add('active');
            
            // LOCK MAP DRAGGING WHEN DRAWING PERIMETER
            if(m === 'perim') {
                map.dragging.disable();
                alert("Perimeter Active: Tap map to drop points. Map is locked.");
            } else {
                map.dragging.enable();
            }
        }

        map.on('click', function(e) {
            if(mode === 'perim') {
                points.push(e.latlng);
                polyline.setLatLngs(points);
                L.circleMarker(e.latlng, {radius: 5, color: 'red'}).addTo(map);
            } else if(mode === 'k9') {
                L.marker(e.latlng, {icon: L.divIcon({html: '🐕', className: 'id-icon', iconSize: [30, 30]})}).addTo(map);
            } else if(mode === 'clue') {
                L.marker(e.latlng, {icon: L.divIcon({html: '🚩', className: 'id-icon', iconSize: [30, 30]})}).addTo(map);
            }
        });

        function clearMap() {
            points = [];
            polyline.setLatLngs([]);
            setMode(null);
        }

        function findGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                map.setView([p.coords.latitude, p.coords.longitude], 16);
                L.circleMarker([p.coords.latitude, p.coords.longitude],{radius:8,fillColor:'#007bff',fillOpacity:1,color:'#fff'}).addTo(map);
            });
        }
        function openM(id){ document.getElementById(id).style.display='block'; }
        function closeModal(id){ document.getElementById(id).style.display='none'; }
    </script>
</body>
</html>
