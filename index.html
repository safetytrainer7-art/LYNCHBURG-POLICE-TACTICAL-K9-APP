
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 Command - ACSO TACTICAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: #fff; font-family: 'Times New Roman', serif; overflow: hidden; }
        
        #map { width: 100%; height: 60%; border-bottom: 5px solid #d4af37; background: #111; cursor: crosshair; }

        .command-panel { 
            width: 100%; height: 40%; background: #001a11; 
            padding: 15px; box-sizing: border-box; overflow-y: auto;
            border-top: 2px solid #d4af37;
        }

        .instruction-banner { background: #d4af37; color: #000; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 0.9em; }

        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
        
        .go-btn { flex: 2; background: #28a745; color: white; padding: 15px; font-weight: bold; text-transform: uppercase; border: none; border-radius: 5px; }
        .perim-btn { flex: 1; background: #ff8c00; color: white; padding: 15px; font-weight: bold; border: none; border-radius: 5px; }

        .asset-selector { display: flex; justify-content: space-around; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px; border: 1px solid #d4af37; }
        .mode-btn { padding: 10px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; font-weight: bold; font-size: 0.8em; }
        .active-mode { border-color: #fff; box-shadow: 0 0 10px #fff; }

        .address-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; color: #d4af37; border: 1px solid #d4af37; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="map-status" class="instruction-banner">Select an Asset below, then TAP MAP to place</div>
<div id="map"></div>

<div class="command-panel">
    <input type="text" id="targetAddr" class="address-input" placeholder="ENTER SEARCH ADDRESS...">
    
    <div class="btn-row">
        <button class="go-btn" onclick="executeSearch()">Initialize Area</button>
        <button class="perim-btn" onclick="setMode('perimeter')">DRAW PERIMETER</button>
    </div>

    <div class="asset-selector">
        <div id="btn-blue" class="mode-btn" style="background:blue;" onclick="setMode('blue')">OFFICER</div>
        <div id="btn-red" class="mode-btn" style="background:red;" onclick="setMode('red')">SAR</div>
        <div id="btn-green" class="mode-btn" style="background:green;" onclick="setMode('green')">CIVILIAN</div>
        <div id="btn-purple" class="mode-btn" style="background:purple;" onclick="setMode('purple')">SUBJECT</div>
    </div>
    
    <button onclick="location.reload()" style="width:100%; margin-top:15px; background:transparent; color:#aaa; border:none; text-decoration:underline;">Clear All & Reset Map</button>
</div>

<script>
    var map = L.map('map').setView([37.58, -79.05], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var currentMode = 'blue';
    var perimeterPoints = [];
    var activePerimeter = null;

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active-mode'));
        if(mode !== 'perimeter') {
            document.getElementById('btn-' + mode).classList.add('active-mode');
            document.getElementById('map-status').innerText = "TAP MAP TO PLACE " + mode.toUpperCase();
        } else {
            document.getElementById('map-status').innerText = "TAP 3+ POINTS ON MAP TO DRAW PERIMETER";
            perimeterPoints = []; // Reset points for new drawing
        }
    }

    // MAP CLICK LOGIC - This fixes the stacking issue
    map.on('click', function(e) {
        if (currentMode === 'perimeter') {
            drawPerimeter(e.latlng);
        } else {
            dropMarker(e.latlng, currentMode);
        }
    });

    function dropMarker(latlng, color) {
        L.circleMarker(latlng, {
            radius: 12, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9
        }).addTo(map).bindPopup("<b>" + color.toUpperCase() + " Asset</b><br>Stationed").openPopup();
    }

    function drawPerimeter(latlng) {
        perimeterPoints.push([latlng.lat, latlng.lng]);
        if (activePerimeter) map.removeLayer(activePerimeter);
        
        if (perimeterPoints.length >= 3) {
            activePerimeter = L.polygon(perimeterPoints, {
                color: '#ff8c00', fillColor: '#ff8c00', fillOpacity: 0.2, weight: 3
            }).addTo(map);
            activePerimeter.bindPopup("<b>SEARCH PERIMETER SET</b>");
        }
        L.circleMarker(latlng, {radius: 4, color: '#ff8c00'}).addTo(map);
    }

    async function executeSearch() {
        var val = document.getElementById('targetAddr').value;
        if(!val) return;
        const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}`);
        const results = await resp.json();
        if(results.length > 0) {
            map.setView([results[0].lat, results[0].lon], 16);
            L.marker([results[0].lat, results[0].lon]).addTo(map).bindPopup("<b>Command Post</b>").openPopup();
        }
    }
    
    // Default mode on start
    setMode('blue');
</script>

</body>
</html>
