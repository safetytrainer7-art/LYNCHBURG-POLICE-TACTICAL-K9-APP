<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 Command - Desktop & GPS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Times New Roman', serif; overflow: hidden; }

        /* LAYER 1: THE MAIN DESKTOP */
        #desktop-home {
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, #001a11, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: absolute; z-index: 1;
        }
        .desktop-icon {
            width: 120px; height: 120px; background: #000; border: 3px solid #d4af37;
            border-radius: 15px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer; color: #d4af37; font-weight: bold;
        }
        .desktop-icon:active { transform: scale(0.9); }

        /* LAYER 2: THE GPS OVERLAY (HIDDEN BY DEFAULT) */
        #gps-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none; /* Invisible until icon is pressed */
        }

        #map { width: 100%; height: 50%; border-bottom: 3px solid #d4af37; }

        .nav-header { 
            width: 100%; height: 50px; background: #000; display: flex; 
            align-items: center; justify-content: space-between; padding: 0 10px; box-sizing: border-box;
            border-bottom: 1px solid #d4af37;
        }
        .exit-btn { background: #ff0000; color: #fff; padding: 8px 15px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }

        .command-panel { width: 100%; height: 50%; background: #001a11; padding: 10px; box-sizing: border-box; overflow-y: auto; }
        
        .hud-bar { background: #000; color: #00ff00; padding: 8px; text-align: center; border: 1px solid #333; font-family: monospace; font-size: 0.9em; margin-bottom: 5px; }

        .asset-row { display: flex; justify-content: space-around; margin-top: 10px; }
        .dot-choice { width: 22%; padding: 10px 0; text-align: center; color: white; font-weight: bold; font-size: 0.7em; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<!-- DESKTOP LAYER -->
<div id="desktop-home">
    <h1 style="color: #d4af37; margin-bottom: 40px;">K9 COMMAND DESKTOP</h1>
    <div class="desktop-icon" onclick="launchGPS()">
        <span style="font-size: 3em;">🌐</span>
        <span>GPS MAP</span>
    </div>
    <p style="color: #666; margin-top: 20px;">ACSO - AMHERST COUNTY</p>
</div>

<!-- GPS LAYER -->
<div id="gps-overlay">
    <div class="nav-header">
        <button class="exit-btn" onclick="shutdownGPS()">SHUT DOWN GPS</button>
        <span style="color:#d4af37; font-weight:bold;">TACTICAL UNIT</span>
    </div>

    <div id="map"></div>
    <div class="hud-bar" id="dist-reader">DISTANCE CALCULATOR STANDBY</div>

    <div class="command-panel">
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="addr" style="flex:3; padding:10px; background:#000; border:1px solid #d4af37; color:#d4af37;" placeholder="Search Address...">
            <button onclick="initCP()" style="flex:1; background:#28a745; color:white; border:none; font-weight:bold;">INIT CP</button>
        </div>

        <div style="display: flex; gap: 5px;">
            <button onclick="setMode('perimeter')" style="flex:1; background:#ff8c00; color:white; border:none; padding:10px; font-weight:bold;">PERIMETER</button>
            <button onclick="findMe()" style="flex:1; background:#007bff; color:white; border:none; padding:10px; font-weight:bold;">MY LOCATION</button>
        </div>

        <div class="asset-row">
            <div class="dot-choice" style="background:blue;" onclick="setMode('blue')">OFFICER</div>
            <div class="dot-choice" style="background:red;" onclick="setMode('red')">SAR</div>
            <div class="dot-choice" style="background:green;" onclick="setMode('green')">CIV</div>
            <div class="dot-choice" style="background:purple;" onclick="setMode('purple')">SUB</div>
        </div>
        <p style="color:#ff0000; text-align:center; font-size:0.8em; margin-top:10px;">TAP DOT ON MAP TO REMOVE SEARCHER</p>
    </div>
</div>

<script>
    var map, cpPos, currentMode = 'blue';
    var perimeterPoints = [];
    var perimeterPoly = null;

    // NAVIGATION LOGIC
    function launchGPS() {
        document.getElementById('gps-overlay').style.display = 'block';
        if (!map) {
            map = L.map('map', { zoomControl: false }).setView([37.58, -79.05], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            map.on('click', function(e) {
                if(currentMode === 'perimeter') {
                    perimeterPoints.push([e.latlng.lat, e.latlng.lng]);
                    if(perimeterPoly) map.removeLayer(perimeterPoly);
                    if(perimeterPoints.length >= 3) {
                        perimeterPoly = L.polygon(perimeterPoints, {color: '#ff8c00', fillOpacity: 0.2, interactive: false}).addTo(map);
                    }
                    L.circleMarker(e.latlng, {radius: 4, color: '#ff8c00'}).addTo(map);
                } else {
                    dropAsset(e.latlng, currentMode);
                }
            });
        }
    }

    function shutdownGPS() {
        if(confirm("Terminate GPS Session and return to Desktop?")) {
            document.getElementById('gps-overlay').style.display = 'none';
        }
    }

    function setMode(m) { currentMode = m; }

    function dropAsset(ll, color) {
        var marker = L.circleMarker(ll, {radius: 12, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9}).addTo(map);
        
        // DISTANCE LOGIC
        if(cpPos) {
            var yards = Math.round(ll.distanceTo(cpPos) * 1.09361);
            document.getElementById('dist-reader').innerText = `UNIT DISTANCE TO CP: ${yards} YARDS`;
        }

        // REMOVAL LOGIC
        marker.on('click', function(e) {
            L.DomEvent.stopPropagation(e);
            if(confirm("Remove this unit from the field?")) {
                map.removeLayer(marker);
            }
        });
    }

    async function initCP() {
        var val = document.getElementById('addr').value;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}`);
        const data = await res.json();
        if(data.length > 0) {
            cpPos = L.latLng(data[0].lat, data[0].lon);
            map.setView(cpPos, 16);
            L.marker(cpPos, {icon: L.divIcon({html: '<div style="background:white; padding:2px; border:2px solid #000; font-weight:bold;">CP</div>'})}).addTo(map);
            document.getElementById('dist-reader').innerText = "CP INITIALIZED. DISTANCE READY.";
        }
    }

    function findMe() { map.locate({setView: true, maxZoom: 16}); }
    
    map.on('locationfound', function(e) {
        L.circleMarker(e.latlng, {radius: 8, fillColor: '#007bff', color: '#fff', weight: 3}).addTo(map).bindPopup("MY POSITION").openPopup();
    });
</script>

</body>
</html>
