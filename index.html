<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 Command</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .app-screen {
            width: 100vw;
            height: 100vh;
            background: url('homepage.jpg') no-repeat center center;
            background-size: contain;
            position: relative;
        }
        .button-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }
        .btn {
            border: 1px solid rgba(212, 175, 55, 0.1); /* Very faint outline */
            background: rgba(255, 255, 255, 0.01);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-screen">
    <div class="button-grid">
        <!-- TOP ROW -->
        <div class="btn" onclick="window.location.href='legal.html'"></div>
        <div class="btn" onclick="window.location.href='narcotics.html'"></div>
        <div class="btn" onclick="window.location.href='training.html'"></div>
        
        <!-- MIDDLE ROW -->
        <div class="btn" onclick="window.location.href='emergency.html'"></div>
        <div class="btn" onclick="alert('GPS coming soon')"></div>
        <div class="btn" onclick="alert('Tactical coming soon')"></div>

        <!-- BOTTOM ROW -->
        <div class="btn" onclick="alert('Bottom Left')"></div>
        <div class="btn" onclick="alert('Bottom Center')"></div>
        <div class="btn" onclick="alert('Bottom Right')"></div>
    </div>
</div>

</body>
</html>
