<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAR COMMAND - MANUAL OVERRIDE V7</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --sar-orange: #ff6600; --gold: #ffd700; --danger: #ff0000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Arial', sans-serif; overflow: hidden; color: white; }

        .header { background: #001a00; padding: 45px 15px 10px; border-bottom: 3px solid var(--sar-orange); z-index: 3000; }
        .search-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .search-row input { flex-grow: 1; padding: 15px; border-radius: 4px; border: none; font-size: 16px; background: #fff; color: #000; font-weight: bold; }
        
        #map { flex-grow: 1; width: 100%; height: calc(100vh - 220px); z-index: 1; border-top: 1px solid #333; }

        .status-bar { display: flex; justify-content: space-between; background: #111; padding: 8px 15px; font-size: 11px; border-bottom: 1px solid #333; }
        .indicator { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        .tools { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 15px; background: #000; }
        .tool-btn { background: #222; border: 1px solid #444; padding: 15px 0; border-radius: 6px; text-align: center; color: #fff; cursor: pointer; }
        .tool-btn label { display: block; font-size: 9px; color: var(--gold); text-transform: uppercase; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div class="search-row">
        <input type="text" id="target-addr" placeholder="TYPE ADDRESS HERE FIRST">
        <button onclick="manualDeploy()" style="background:var(--sar-orange); color:white; border:none; padding:10px 20px; border-radius:4px; font-weight:bold;">DEPLOY</button>
    </div>
</div>

<div class="status-bar">
    <span><span id="gps-dot" class="indicator" style="background:grey;"></span> GPS STATUS: <span id="gps-msg">OFF</span></span>
    <span>SATELLITE ACCURACY: <span id="acc-val">--</span></span>
</div>

<div id="map"></div>

<div class="tools">
    <div class="tool-btn" onclick="startTracking()"><span>📍</span><label>Show Me</label></div>
    <div class="tool-btn" onclick="dropLZ()"><span>🚁</span><label>Set LZ</label></div>
    <div class="tool-btn" onclick="clearMap()"><span>🔄</span><label>Clear</label></div>
    <div class="tool-btn" onclick="location.reload()" style="border-color:var(--danger);"><span>✖</span><label>Reset</label></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false }).setView([37.4137, -79.1422], 13);
    L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

    // 1. MANUAL DEPLOY (WORKS INDEPENDENTLY)
    function manualDeploy() {
        var addr = document.getElementById('target-addr').value;
        if(!addr) return alert("Enter an address first!");
        
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${addr}`)
            .then(r => r.json()).then(d => {
                if(d[0]) {
                    var pos = [d[0].lat, d[0].lon];
                    map.setView(pos, 18); // Zoom in tight on the address
                    L.marker(pos).addTo(map).bindPopup("<b>SEARCH POINT: " + addr + "</b>").openPopup();
                } else {
                    alert("Address not found. Be specific (e.g., 123 Main St, Amherst, VA)");
                }
            });
    }

    // 2. GPS TRACKING (ONLY WHEN REQUESTED)
    var myMarker = null;
    function startTracking() {
        if (navigator.geolocation) {
            document.getElementById('gps-msg').innerText = "CONNECTING...";
            navigator.geolocation.watchPosition(function(p) {
                var lat = p.coords.latitude;
                var lng = p.coords.longitude;
                var acc = p.coords.accuracy.toFixed(0);
                
                document.getElementById('gps-msg').innerText = "LIVE";
                document.getElementById('gps-dot').style.background = (acc < 50) ? "lime" : "yellow";
                document.getElementById('acc-val').innerText = acc + " meters";

                if (!myMarker) {
                    myMarker = L.circleMarker([lat, lng], { color: 'blue', fillColor: '#fff', fillOpacity: 1, radius: 10 }).addTo(map);
                } else {
                    myMarker.setLatLng([lat, lng]);
                }
            }, null, { enableHighAccuracy: true });
        }
    }

    function dropLZ() {
        L.circle(map.getCenter(), { radius: 35, color: '#00ff00', fillOpacity: 0.3 }).addTo(map).bindPopup("HELO LZ").openPopup();
    }

    function clearMap() {
        window.location.reload();
    }
</script>
</body>
</html>
