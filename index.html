<div id="training" class="page">
    <div class="header">
        <button class="back-btn" onclick="goHome()">← BACK</button>
        <span style="color:var(--gold); margin-left:15px; font-weight:bold;">K9 DAILY TRAINING LOG</span>
    </div>
    <div style="padding: 15px; background: #000; color: #fff; padding-bottom: 100px;">
        
        <div style="border: 2px solid #00ffcc; padding: 15px; border-radius: 8px; background: #001a1a;">
            <h3 style="color: #00ffcc; margin-top: 0;">TRAINING RECORD</h3>
            
            <label>DATE/TIME:</label>
            <input type="datetime-local" id="t-date" class="f-input">
            
            <div style="display:flex; gap:5px;">
                <div style="flex:1;"><label>TEMP:</label><input type="text" id="t-temp" placeholder="72°F" class="f-input"></div>
                <div style="flex:1;"><label>WIND:</label><input type="text" id="t-wind" placeholder="NW 5mph" class="f-input"></div>
            </div>

            <label>LOCATION/WEATHER:</label>
            <input type="text" id="t-loc" placeholder="Amherst Warehouse / Clear" class="f-input">

            <label>SEARCH TYPE:</label>
            <select id="t-type" class="f-input">
                <option>VEHICLE INTERIOR/EXTERIOR</option>
                <option>WAREHOUSE / LARGE AREA</option>
                <option>RESIDENTIAL / BUILDING</option>
                <option>TRACKING / APPREHENSION</option>
                <option>AGITATION / PATROL</option>
            </select>

            <label>TRAINING AID / SCENT CONE:</label>
            <input type="text" id="t-aid" placeholder="Heroin 5g / High Hide / Left Cone" class="f-input">

            <label>PERFORMANCE NOTES:</label>
            <textarea id="t-notes" class="f-input" style="height:80px;" placeholder="Final response noted, scratch/sit alert..."></textarea>

            <button onclick="genPDF('TRAINING')" style="width:100%; background:#00ffcc; color:#000; padding:15px; font-weight:bold; border:none; border-radius:4px; margin-top:10px;">💾 GENERATE PDF REPORT</button>
        </div>
    </div>
</div>

<div id="incidents" class="page">
    <div class="header">
        <button class="back-btn" onclick="goHome()">← BACK</button>
        <span style="color:var(--gold); margin-left:15px; font-weight:bold;">K9 INCIDENT REPORT</span>
    </div>
    <div style="padding: 15px; background: #000; color: #fff; padding-bottom: 100px;">
        <div style="border: 2px solid #ff0055; padding: 15px; border-radius: 8px; background: #1a0005;">
            <h3 style="color: #ff0055; margin-top: 0;">CALL FOR SERVICE</h3>
            
            <label>OFFICER / DEPT:</label>
            <input type="text" id="i-off" placeholder="Deputy Jones / ACSO" class="f-input">

            <label>DISPOSITION / ARRESTS:</label>
            <input type="text" id="i-disp" placeholder="Arrest Made / Evidence Seized" class="f-input">

            <label>INJURIES / DIAGRAM NOTES:</label>
            <textarea id="i-notes" class="f-input" style="height:80px;" placeholder="Suspect bit left calf / Tactical deployment..."></textarea>

            <button onclick="genPDF('INCIDENT')" style="width:100%; background:#ff0055; color:#fff; padding:15px; font-weight:bold; border:none; border-radius:4px; margin-top:10px;">💾 GENERATE INCIDENT PDF</button>
        </div>
    </div>
</div>

<div id="vets" class="page">
    <div class="header">
        <button class="back-btn" onclick="goHome()">← BACK</button>
        <span style="color:#ff3333; margin-left:15px; font-weight:bold;">EMERGENCY VETS</span>
    </div>
    <div style="padding: 15px; background: #000;">
        <div class="vet-card"><b>LYNCHBURG:</b> Animal Emergency & Critical Care <br><a href="tel:4348461504" style="color:#00ff00;">(434) 846-1504</a></div>
        <div class="vet-card"><b>CAMPBELL:</b> Peaks View Animal Hospital <br><a href="tel:4345254996" style="color:#00ff00;">(434) 525-4996</a></div>
        <div class="vet-card"><b>NELSON/AMHERST:</b> Blue Ridge Animal Clinic <br><a href="tel:5404633774" style="color:#00ff00;">(540) 463-3774</a></div>
    </div>
</div>

<style>
    .f-input { width: 100%; padding: 12px; margin: 8px 0 15px 0; background: #111; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 14px; }
    label { color: #aaa; font-size: 12px; font-weight: bold; text-transform: uppercase; }
    .vet-card { background: #111; border: 1px solid #ff3333; padding: 15px; margin-bottom: 10px; border-radius: 4px; color: #fff; }
</style>

        alert("CREATING " + type + " REPORT...\n\nIn a full build, this would trigger a Print-to-PDF. For now, all data is captured and ready for the Sheriff!");
