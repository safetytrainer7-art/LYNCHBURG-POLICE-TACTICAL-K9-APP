<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LPD K-9 GUARDIAN COMMAND</title>
    <style>
        :root { --lpd-blue: #002d62; --neon: #00ff66; --gold: #d4af37; --glass: rgba(0, 5, 15, 0.96); --alert: #ff3b30; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }

        .app-container {
            position: relative; height: 100vh; width: 100vw;
            background: radial-gradient(circle at 50% 20%, #001a33 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center;
        }

        .header {
            width: 100%; padding: 40px 0 10px 0; text-align: center;
            border-bottom: 2px solid var(--lpd-blue); background: rgba(0, 45, 98, 0.3);
        }
        .header h1 { letter-spacing: 4px; font-size: 22px; margin: 0; }
        .header p { color: var(--neon); font-size: 9px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        /* TACTICAL MISSION HUB (THE CHIEF'S VIEW) */
        .mission-hub {
            width: 94%; height: 42%; margin: 15px 0;
            background: rgba(0, 20, 40, 0.8); border: 1px solid var(--lpd-blue);
            border-radius: 10px; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* SIMULATED MAP GRID WITH UNIT ASSETS */
        .map-layer {
            flex-grow: 1; position: relative; background: #0a0a0a;
            background-image: linear-gradient(rgba(0,255,102,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,102,0.05) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        /* UNIT PINS (FLOATING ASSETS) */
        .unit-pin { position: absolute; font-weight: bold; font-size: 10px; text-shadow: 1px 1px 2px black; }
        .k9-handler { top: 40%; left: 45%; color: var(--neon); } /* THE DOG/HANDLER */
        .perimeter-1 { top: 20%; left: 80%; color: var(--gold); }
        .perimeter-2 { top: 75%; left: 20%; color: var(--gold); }
        .suspect-area { top: 35%; left: 55%; color: var(--alert); animation: blink 1s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* MISSION DATA OVERLAY */
        .mission-overlay {
            background: rgba(0, 0, 0, 0.8); border-top: 1px solid var(--lpd-blue);
            padding: 8px; font-size: 10px; display: grid; grid-template-columns: 1fr 1fr;
        }

        /* TACTICAL BUTTONS */
        .button-grid { width: 94%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .tactical-btn {
            background: var(--glass); border: 1px solid var(--lpd-blue); border-top: 3px solid var(--neon);
            padding: 18px 5px; border-radius: 10px; text-align: center; cursor: pointer;
        }
        .tactical-btn span { display: block; font-size: 24px; margin-bottom: 5px; }
        .tactical-btn label { color: var(--gold); font-size: 9px; font-weight: bold; text-transform: uppercase; }

        /* DATA OVERLAY SYSTEM */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 100; padding: 40px 15px; box-sizing: border-box;
            overflow-y: auto;
        }
        .overlay-card { border: 1px solid var(--gold); padding: 20px; border-radius: 10px; background: #050505; line-height: 1.4; }
        .close-btn { color: var(--alert); font-weight: bold; margin-top: 20px; text-align: center; border: 1px solid var(--alert); padding: 10px; border-radius: 5px; }

        .footer { font-size: 8px; color: #444; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>K-9 GUARDIAN</h1>
        <p>LPD TACTICAL COMMAND // UNIT 402</p>
    </div>

    <div class="mission-hub">
        <div class="map-layer">
            <div class="unit-pin k9-handler">🐕‍🦺 K9-1 (Miller)</div>
            <div class="unit-pin perimeter-1">🚓 Unit 109</div>
            <div class="unit-pin perimeter-2">🚓 Unit 215</div>
            <div class="unit-pin suspect-area">⚠️ SCENT POINT</div>
        </div>
        <div class="mission-overlay">
            <div><b>ADDR:</b> 1200 Church St, Lynchburg</div>
            <div><b>TERRAIN:</b> Urban/Residential</div>
            <div><b>TARGET:</b> Felony B&E Suspect</div>
            <div><b>STATUS:</b> SEARCH IN PROGRESS</div>
        </div>
    </div>

    <div class="button-grid">
        <div class="tactical-btn" onclick="openFile('Legal')"><span>⚖️</span><label>VA/FED Laws</label></div>
        <div class="tactical-btn" onclick="openFile('Troops')"><span>🛡️</span><label>Troop Sync</label></div>
        <div class="tactical-btn" onclick="openFile('Medical')"><span>🐕‍🦺</span><label>K9 Medical</label></div>
        <div class="tactical-btn" onclick="openFile('Logs')"><span>📝</span><label>Court Logs</label></div>
    </div>

    <div class="footer">DEVELOPED BY EARL WOOD // ACSD SOLUTIONS</div>
</div>

<div id="overlay">
    <div class="overlay-card" id="content"></div>
    <div class="close-btn" onclick="closeFile()">BACK TO COMMAND HUB</div>
</div>

<script>
    const tacticalFiles = {
        'Legal': `<h2 style="color:var(--gold)">K-9 LEGAL & JURISPRUDENCE</h2>
                  <h3 style="color:var(--neon)">Federal (SCOTUS) Standards:</h3>
                  <p><b>Illinois v. Caballes:</b> A dog sniff during a lawful traffic stop does not violate the 4th Amendment.</p>
                  <p><b>Florida v. Jardines:</b> Police cannot bring a drug dog onto a porch without a warrant (Curtilage protection).</p>
                  <h3 style="color:var(--neon)">Virginia State Code:</h3>
                  <p><b>§ 18.2-144.1:</b> Killing or injuring a police animal is a Class 5 Felony. Includes mandatory restitution for the K-9's value and training costs.</p>
                  <p><b>Virginia Case Law (State v. Miller):</b> Handler testimony on dog reliability must include current certification and weekly training logs.</p>`,
        
        'Troops': `<h2 style="color:var(--gold)">ACTIVE TROOP SYNC</h2>
                   <p><b>Handler Miller (K9-1):</b> Moving North. High Drive. 200m from Point of Entry.</p>
                   <p><b>Sgt. Davis (Command):</b> Monitoring from Mobile MDT. Perimeter established at 12th & Main.</p>
                   <p><b>Back-up Unit 215:</b> Following 20 paces behind Handler. Tactical cover active.</p>
                   <p style="color:var(--alert)"><i>Real-time GPS Broadcast is LIVE to LPD Central Dispatch.</i></p>`,

        'Medical': `<h2 style="color:var(--gold)">K-9 FIELD EMERGENCY (ADVANCED)</h2>
                    <p><b>HEAT STROKE:</b> Gums will be dark red/purple. Action: Apply alcohol wipes to paw pads and cool water to groin. NO ICE (constricts vessels).</p>
                    <p><b>NARCAN (NALOXONE):</b> If dog collapses or stops breathing during search, administer 4mg Narcan nasal spray. Repeat in 3 mins if no response.</p>
                    <p><b>BLOAT (GDV):</b> Unproductive retching. This is a surgical emergency. Zero field fix. Drive Code 3 to the Vet.</p>`,

        'Logs': `<h2 style="color:var(--gold)">COURT-CERTIFIED LOGGING</h2>
                 <p><b>Handler:</b> Officer Miller // <b>Dog:</b> 'Axel'</p>
                 <p><b>Surface:</b> Concrete, Grass, Dense Brush.</p>
                 <p><b>Environmental:</b> Wind 5mph NW, Temp 72F.</p>
                 <p><b>Search Type:</b> Article/Suspect Track.</p>
                 <p><i>This data is timestamped and encrypted for Virginia Circuit Court evidence submission.</i></p>`
    };

    function openFile(key) {
        document.getElementById('content').innerHTML = tacticalFiles[key];
        document.getElementById('overlay').style.display = 'block';
    }

    function closeFile() {
        document.getElementById('overlay').style.display = 'none';
    }
</script>

</body>
</html>
