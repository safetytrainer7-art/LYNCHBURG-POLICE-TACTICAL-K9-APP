<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD OFFICIAL COMMAND</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #000; overflow: hidden; }

        /* THE LIVE PHOTO LAYER */
        #home-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            /* This searches for the file you renamed to homepage.png */
            background-image: url('homepage.png'), url('IMG_2908.png'), url('image_a47b1c.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            z-index: 5000;
        }

        /* INVISIBLE TACTICAL HOTSPOTS (Mapped to your gold icons) */
        .hotspot { position: absolute; cursor: pointer; z-index: 5001; }
        
        /* Positioning based on the photo layout you provided */
        #spot-map  { top: 15%; right: 10%; width: 20%; height: 30%; }
        #spot-med  { top: 15%; left: 10%; width: 20%; height: 30%; }
        #spot-law  { top: 45%; left: 10%; width: 20%; height: 30%; }
        #spot-logs { top: 45%; right: 10%; width: 20%; height: 30%; }

        .module { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #002200; z-index: 9000; color: #ffd700; padding: 20px; }
    </style>
</head>
<body>

<div id="home-screen">
    <div id="spot-map" class="hotspot" onclick="alert('GPS Map Launching...')"></div>
    <div id="spot-med" class="hotspot" onclick="alert('Medical Protocols Active')"></div>
    <div id="spot-law" class="hotspot" onclick="alert('Legal Shield: Graham v. Connor')"></div>
    <div id="spot-logs" class="hotspot" onclick="alert('Training Logs Opening')"></div>
</div>

<script>
    // This script ensures that if the image fails, you get a message instead of just black
    window.onload = function() {
        var bg = document.getElementById('home-screen');
        if (window.getComputedStyle(bg).backgroundImage === 'none') {
            console.log("Image not found. Ensure homepage.png is in this folder.");
        }
    };
</script>

</body>
</html>
