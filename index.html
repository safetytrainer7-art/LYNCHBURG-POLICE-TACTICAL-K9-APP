
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 Command - ACSO TACTICAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: #fff; font-family: 'Times New Roman', serif; overflow: hidden; }
        
        /* 1. THE MAP - OCCUPIES TOP HALF */
        #map { width: 100%; height: 55%; border-bottom: 5px solid #d4af37; background: #111; }

        /* 2. THE COMMAND PANEL - BOTTOM HALF */
        .command-panel { 
            width: 100%; height: 45%; background: #001a11; 
            padding: 20px; box-sizing: border-box; overflow-y: auto;
            border-top: 2px solid #d4af37;
        }

        .search-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        .address-input { 
            width: 100%; padding: 18px; font-size: 1.3em; background: #000; 
            color: #d4af37; border: 2px solid #d4af37; border-radius: 5px;
        }

        /* THE "GO" BUTTON - IMPOSSIBLE TO MISS */
        .go-btn { 
            background: #28a745; color: white; padding: 20px; font-size: 1.5em; 
            font-weight: bold; text-transform: uppercase; border: none; 
            border-radius: 10px; cursor: pointer; box-shadow: 0 5px #19692c;
        }
        .go-btn:active { transform: translateY(4px); box-shadow: 0 2px #19692c; }

        .secondary-btn { 
            background: #0044cc; color: white; padding: 12px; 
            border: none; border-radius: 5px; font-weight: bold;
        }

        .asset-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin: 15px 0; }
        .dot-btn { padding: 15px 5px; font-size: 0.8em; font-weight: bold; color: white; border-radius: 5px; text-align: center; cursor: pointer; border: 1px solid #fff; }

        /* NIGHT VISION OVERLAY */
        .nv-mode { filter: sepia(100%) hue-rotate(90deg) brightness(1.2) contrast(1.2); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="command-panel" id="ui">
    <div class="search-container">
        <input type="text" id="targetAddr" class="address-input" placeholder="ENTER ADDRESS OR TOWN...">
        <button class="go-btn" onclick="executeSearch()">Execute & Start Search</button>
        <button class="secondary-btn" onclick="useMyLocation()">Use My Current GPS Location</button>
    </div>

    <div class="asset-grid">
        <div class="dot-btn" style="background: blue;" onclick="dropDot('blue', 'Officer')">OFFICER</div>
        <div class="dot-btn" style="background: red;" onclick="dropDot('red', 'SAR')">SAR</div>
        <div class="dot-btn" style="background: green;" onclick="dropDot('green', 'CIV')">CIVILIAN</div>
        <div class="dot-btn" style="background: purple;" onclick="dropDot('purple', 'SUB')">SUBJECT</div>
    </div>

    <button class="secondary-btn" style="width:100%; background:#333; color:#00ff00; border:1px solid #00ff00;" onclick="toggleNV()">TOGGLE NIGHT VISION</button>
</div>

<script>
    // Initialize map focused on Amherst, VA area
    var map = L.map('map').setView([37.58, -79.05], 12);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    // THE START SEARCH LOGIC
    async function executeSearch() {
        var val = document.getElementById('targetAddr').value;
        if(!val) {
            alert("Sir, please enter an address or town first.");
            return;
        }

        // Visual feedback that the system is working
        document.querySelector('.go-btn').innerText = "Locating Assets...";
        
        try {
            const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}`);
            const results = await resp.json();

            if(results.length > 0) {
                var loc = results[0];
                map.setView([loc.lat, loc.lon], 16);
                L.marker([loc.lat, loc.lon]).addTo(map).bindPopup("<b>Incident Command Post</b>").openPopup();
                document.querySelector('.go-btn').innerText = "SEARCH ACTIVE";
            } else {
                alert("Location not found. Try adding 'Virginia' to the search.");
                document.querySelector('.go-btn').innerText = "EXECUTE & START SEARCH";
            }
        } catch (e) {
            alert("Connection error. Check data signal.");
            document.querySelector('.go-btn').innerText = "EXECUTE & START SEARCH";
        }
    }

    function useMyLocation() {
        map.locate({setView: true, maxZoom: 16});
    }

    function dropDot(color, label) {
        var pos = map.getCenter();
        L.circleMarker(pos, {
            radius: 12, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9
        }).addTo(map).bindPopup("<b>" + label + "</b><br>Real-Time Active").openPopup();
    }

    function toggleNV() {
        document.getElementById('map').classList.toggle('nv-mode');
        document.getElementById('ui').classList.toggle('nv-mode');
    }

    map.on('locationfound', function(e) {
        L.circle(e.latlng, e.accuracy).addTo(map);
        L.marker(e.latlng).addTo(map).bindPopup("Your Position").openPopup();
    });
</script>

</body>
</html>
