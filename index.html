
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #map { height: 75vh; width: 100%; background: #222; }
        .hud { height: 25vh; background: #111; border-top: 3px solid #ff6600; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #333; border: 1px solid #ff6600; color: #fff; padding: 15px; text-align: center; font-weight: bold; border-radius: 5px; }
        .gps-lock { background: #003366; border-color: #007bff; grid-column: span 2; }
        .status { grid-column: span 2; text-align: center; color: #00ff00; font-family: monospace; font-size: 12px; }
        .beacon { width: 20px; height: 20px; background: #007bff; border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 15px #007bff; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="hud">
        <div id="gps-stat" class="status">SATELLITE: STANDBY</div>
        <div class="btn gps-lock" onclick="getPreciseLock()">🛰️ FORCE SATELLITE LOCK</div>
        <div class="btn" onclick="setM('k9')">🐕 K9</div>
        <div class="btn" onclick="setM('leo')">👮 LEO</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', {zoomControl:false}).setView([37.584, -79.052], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker, mode, watchID;

        function getPreciseLock() {
            if (watchID) navigator.geolocation.clearWatch(watchID);
            document.getElementById('gps-stat').innerText = "FILTERING TOWER DATA... SEEKING SATELLITE";
            
            watchID = navigator.geolocation.watchPosition(p => {
                var acc = p.coords.accuracy;
                // REJECT ANY SIGNAL OVER 10 METERS (This stops the road-snapping)
                if (acc > 10) {
                    document.getElementById('gps-stat').innerText = "SIGNAL TOO WEAK ("+Math.round(acc*3.28)+"ft) - KEEP SEARCHING";
                    return;
                }
                var pos = [p.coords.latitude, p.coords.longitude];
                if (!marker) {
                    marker = L.marker(pos, {icon: L.divIcon({className:'beacon'})}).addTo(map);
                    map.setView(pos, 19);
                } else { marker.setLatLng(pos); }
                document.getElementById('gps-stat').innerText = "SATELLITE LOCK: ACTIVE ("+Math.round(acc*3.28)+"ft Accuracy)";
            }, null, {enableHighAccuracy: true, maximumAge: 0});
        }
        function setM(m) { mode = m; }
        map.on('click', e => {
            if(!mode) return;
            var icon = mode === 'k9' ? '🐕' : '👮';
            L.marker(e.latlng, {icon: L.divIcon({html: `<div style="font-size:30px;">${icon}</div>`})}).addTo(map);
        });
    </script>
</body>
</html>
