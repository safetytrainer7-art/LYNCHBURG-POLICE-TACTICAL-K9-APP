
<div id="m-map" class="page">
    <div class="header">
        <button class="back-btn" onclick="closePage('m-map')">← BACK</button>
        <h2 style="color:#c5a059; margin:0;">TACTICAL PERIMETER HUB</h2>
    </div>
    
    <div id="map-toolbar">
        <input type="text" id="addr-search" placeholder="ENTER ADDRESS...">
        <div class="tool-row">
            <button class="tool-btn" onclick="setMode('le')">BLUE (LE)</button>
            <button class="tool-btn" onclick="setMode('k9')">LT BLUE (K9)</button>
            <button class="tool-btn" onclick="setMode('sar')">RED (SAR)</button>
            <button class="tool-btn" onclick="setMode('sus')">PURPLE (SUB)</button>
        </div>
        <div class="tool-row">
            <button class="tool-btn action" onclick="togglePerimeter()">PERIMETER</button>
            <button class="tool-btn action" onclick="dropFlag()">FOUND PROP</button>
            <button class="tool-btn action" onclick="toggleNight()">NIGHT VISION</button>
            <button class="tool-btn alert" onclick="resetMap()">RESET ALL</button>
        </div>
    </div>

    <div id="map-display"></div>
    
    <div id="tactical-data">
        <div id="wind-flag">🚩 WIND: NW 12MPH</div>
        <div id="dist-calc">DIST TO NEAREST: 0.00 FT</div>
    </div>
</div>

<style>
    #map-toolbar { background: #000; padding: 10px; border-bottom: 1px solid var(--gold); }
    #addr-search { width: 95%; padding: 10px; background: #111; color: #fff; border: 1px solid var(--gold); margin-bottom: 5px; }
    #map-display { width: 100%; height: 60vh; background: #222; }
    .tool-row { display: flex; justify-content: space-around; margin-top: 5px; }
    .tool-btn { background: #1a1a1a; color: var(--gold); border: 1px solid var(--gold); padding: 8px 2px; font-size: 10px; width: 23%; border-radius: 4px; }
    .tool-btn.action { background: var(--gold); color: #000; font-weight: bold; }
    .tool-btn.alert { background: #600; color: #fff; border: none; }
    
    #tactical-data { display: flex; justify-content: space-between; padding: 10px; background: #000; font-family: monospace; color: var(--gold); font-size: 12px; }
    
    /* NIGHT VISION OVERLAY */
    .night-mode { filter: invert(100%) hue-rotate(180deg) brightness(0.7) contrast(1.2); }
</style>

<script>
    // Note: To make this "Live" for all phones, you will eventually link this to a 
    // service like Firebase or Ably so the dots move on everyone's screen.
    
    let mapMode = 'le'; 
    
    function setMode(type) {
        mapMode = type;
        console.log("Active Mode: " + type);
    }

    function toggleNight() {
        document.getElementById('map-display').classList.toggle('night-mode');
    }

    function resetMap() {
        if(confirm("SHUT DOWN SEARCH? This clears all flags and perimeters.")) {
            location.reload(); 
        }
    }

    // Logic for placing/removing markers would go here
    // Distance calculation logic: Math.sqrt(Math.pow(x2-x1, 2) + Math.pow(y2-y1, 2))
</script>
