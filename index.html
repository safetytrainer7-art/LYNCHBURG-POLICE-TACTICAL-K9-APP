<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSO K9 Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Times New Roman', serif; overflow: hidden; }
        .module-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; }
        .nav-header { height: 60px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #d4af37; }
        .exit-btn { background: #900; color: #fff; border: 2px solid #fff; padding: 8px 12px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .content-scroll { padding: 15px; overflow-y: auto; height: calc(100% - 60px); box-sizing: border-box; }
        
        /* HOMEPAGE */
        #homepage { width: 100%; height: 100%; background: radial-gradient(circle, #001a11 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; position: absolute; z-index: 10; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .app-icon { width: 115px; height: 115px; background: rgba(0,0,0,0.8); border: 2px solid #d4af37; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .app-icon span { color: #d4af37; font-weight: bold; margin-top: 8px; font-size: 0.85em; }

        /* RADIO CODES */
        .code-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; cursor: pointer; }
        .code-row:active { background: #111; }

        /* SETTINGS */
        .set-row { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="homepage">
    <h1 style="color: #d4af37; letter-spacing: 3px;">ACSO</h1>
    <div class="app-grid">
        <div class="app-icon" onclick="openModule('gps-module')"><div>📡</div><span>GPS</span></div>
        <div class="app-icon" onclick="openModule('med-module')"><div>🐕</div><span>MEDICAL</span></div>
        <div class="app-icon" onclick="openModule('log-module')"><div>📝</div><span>LOGS</span></div>
        <div class="app-icon" onclick="openModule('wind-module')"><div>🌬️</div><span>WIND</span></div>
        <div class="app-icon" onclick="openModule('radio-module')"><div>📻</div><span>RADIO</span></div>
        <div class="app-icon" onclick="openModule('settings-module')"><div>⚙️</div><span>SETTINGS</span></div>
    </div>
</div>

<!-- RADIO MODULE -->
<div id="radio-module" class="module-layer">
    <div class="nav-header"><button class="exit-btn" onclick="closeModule('radio-module')">EXIT</button><span style="color:#d4af37;">RADIO CODES</span></div>
    <div class="content-scroll">
        <div class="code-row" onclick="shout('10-4. Acknowledgement.')"><b>10-4</b> <span>ACKNOWLEDGED</span></div>
        <div class="code-row" onclick="shout('10-20. Location.')"><b>10-20</b> <span>LOCATION</span></div>
        <div class="code-row" onclick="shout('10-33. Emergency traffic.')"><b>10-33</b> <span style="color:red;">EMERGENCY</span></div>
        <div class="code-row" onclick="shout('Signal 1. Officer in trouble.')"><b>SIGNAL 1</b> <span style="color:red;">OFFICER TROUBLE</span></div>
    </div>
</div>

<!-- SETTINGS MODULE -->
<div id="settings-module" class="module-layer">
    <div class="nav-header"><button class="exit-btn" onclick="closeModule('settings-module')">EXIT</button><span style="color:#d4af37;">SETTINGS</span></div>
    <div class="content-scroll">
        <div class="set-row"><span>Unit ID</span> <b style="color:#d4af37;">ACSO K9-1</b></div>
        <div class="set-row"><span>Voice Volume</span> <input type="range"></div>
        <div class="set-row"><span>Night Mode</span> <input type="checkbox" checked></div>
        <p style="text-align:center; color:#444; font-size:0.8em; margin-top:20px;">v6.0 - Amherst County Sheriff Endorsed</p>
    </div>
</div>

<!-- OTHER MODULES (PLACEHOLDERS TO ENSURE NO LOSS) -->
<div id="gps-module" class="module-layer"><div class="nav-header"><button class="exit-btn" onclick="closeModule('gps-module')">EXIT</button><span>GPS ACTIVE</span></div></div>
<div id="med-module" class="module-layer"><div class="nav-header"><button class="exit-btn" onclick="closeModule('med-module')">EXIT</button><span>MEDICAL ACTIVE</span></div></div>
<div id="log-module" class="module-layer"><div class="nav-header"><button class="exit-btn" onclick="closeModule('log-module')">EXIT</button><span>LOGS ACTIVE</span></div></div>
<div id="wind-module" class="module-layer"><div class="nav-header"><button class="exit-btn" onclick="closeModule('wind-module')">EXIT</button><span>WIND ACTIVE</span></div></div>

<script>
    function openModule(id) { document.getElementById(id).style.display = 'block'; }
    function closeModule(id) { document.getElementById(id).style.display = 'none'; window.speechSynthesis.cancel(); }
    function shout(text) { window.speechSynthesis.cancel(); var u = new SpeechSynthesisUtterance(text); u.rate = 0.9; window.speechSynthesis.speak(u); }
</script>

</body>
</html>
