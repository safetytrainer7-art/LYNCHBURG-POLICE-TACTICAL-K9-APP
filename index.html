<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD COMMAND HUB</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }

        /* This container keeps the image and buttons locked together */
        #app-frame {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* Forces 16:9 Landscape aspect ratio */
            max-height: 100vh;
            max-width: 177.78vh;
            background-image: url('homepage.jpg'), url('homepage.png'), url('homepage.png.png'), url('IMG_2908.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* TACTICAL HOTSPOTS - RED BORDERS FOR ALIGNMENT */
        .hotspot { position: absolute; cursor: pointer; border: 2px solid red; z-index: 50; }
        
        /* Precision positions based on your landscape design */
        #spot-med  { top: 18%; left: 12%; width: 12%; height: 25%; } /* Emergency SOS */
        #spot-law  { top: 48%; left: 12%; width: 12%; height: 25%; } /* Legal Shield */
        #spot-narc { top: 75%; left: 12%; width: 12%; height: 20%; } /* Narcotics */
        
        #spot-map  { top: 18%; right: 12%; width: 12%; height: 25%; } /* GPS Map */
        #spot-logs { top: 48%; right: 12%; width: 12%; height: 25%; } /* Training Logs */
        #spot-va   { top: 75%; right: 12%; width: 12%; height: 20%; } /* VA Code */

        .module { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #001a00; z-index: 100; color: #c5a059; flex-direction: column; }
        .mod-header { background: #000; padding: 15px; border-bottom: 2px solid #c5a059; display: flex; gap: 10px; font-weight: bold; }
        .back-btn { background: #c5a059; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .content { padding: 20px; overflow-y: auto; font-size: 18px; color: #fff; }
    </style>
</head>
<body>

<div id="app-frame">
    <div id="spot-med" class="hotspot" onclick="openMod('med-mod')"></div>
    <div id="spot-law" class="hotspot" onclick="openMod('law-mod')"></div>
    <div id="spot-narc" class="hotspot" onclick="alert('Narcotics Aids: Ready')"></div>
    <div id="spot-map" class="hotspot" onclick="alert('GPS Map: Ready')"></div>
    <div id="spot-logs" class="hotspot" onclick="alert('Training Logs: Ready')"></div>
    <div id="spot-va" class="hotspot" onclick="alert('VA Code: Ready')"></div>
</div>

<div id="med-mod" class="module">
    <div class="mod-header"><button class="back-btn" onclick="closeMod('med-mod')">BACK</button><span>K9 EMERGENCY SOS</span></div>
    <div class="content">
        <h2>K9 FIELD TRAUMA - INTRO</h2>
        <p>Immediate field steps for Amherst County deputies.</p>
    </div>
</div>

<div id="law-mod" class="module">
    <div class="mod-header"><button class="back-btn" onclick="closeMod('law-mod')">BACK</button><span>LEGAL SHIELD</span></div>
    <div class="content">
        <h2>Graham v. Connor</h2>
        <p>Judged from the perspective of a reasonable officer on the scene.</p>
    </div>
</div>

<script>
    function openMod(id) { document.getElementById(id).style.display = 'flex'; }
    function closeMod(id) { document.getElementById(id).style.display = 'none'; }
</script>

</body>
</html>
