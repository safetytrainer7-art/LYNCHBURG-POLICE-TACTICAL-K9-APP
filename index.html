
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD OFFICIAL COMMAND</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #000; overflow: hidden; }

        /* THE LIVE PHOTO LAYER */
        #home-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('homepage.png') no-repeat center center;
            background-size: contain; /* Keeps your photo's proportions perfect */
            z-index: 5000;
        }

        /* INVISIBLE TACTICAL HOTSPOTS */
        /* These sit directly over your photo's icons */
        .hotspot {
            position: absolute;
            cursor: pointer;
            /* border: 1px solid red; /* Uncomment this line to see the boxes for alignment */
        }

        /* Adjust these % values if they don't line up perfectly on your specific screen */
        #spot-map { top: 18%; right: 10%; width: 22%; height: 25%; }
        #spot-med { top: 18%; left: 10%; width: 22%; height: 25%; }
        #spot-law { top: 45%; left: 10%; width: 22%; height: 25%; }
        #spot-logs { top: 45%; right: 10%; width: 22%; height: 25%; }

        /* TACTICAL MAP MODULE */
        #map-module { display: none; height: 100vh; flex-direction: column; background: #000; }
        #map { flex-grow: 1; width: 100%; }
        .map-tools { background: #111; display: grid; grid-template-columns: repeat(6, 1fr); padding: 12px; border-top: 3px solid #c5a059; }
        .m-btn { text-align: center; font-size: 26px; cursor: pointer; }
    </style>
</head>
<body>

<div id="home-screen">
    <div id="spot-map" class="hotspot" onclick="openMap()"></div>
    <div id="spot-med" class="hotspot" onclick="alert('Opening Medical Protocols...')"></div>
    <div id="spot-law" class="hotspot" onclick="alert('Opening Legal Shield...')"></div>
    <div id="spot-logs" class="hotspot" onclick="alert('Opening Training Logs...')"></div>
</div>

<div id="map-module">
    <div style="background:#051a05; padding:10px; display:flex; gap:10px; border-bottom: 2px solid #c5a059;">
        <button onclick="closeMap()" style="background:#c5a059; border:none; padding:10px 20px; font-weight:bold; border-radius:5px;">BACK TO COMMAND</button>
        <input type="text" id="addr" placeholder="MISSION ADDRESS" style="flex-grow:1; padding:12px; border-radius:5px;">
    </div>
    <div id="map"></div>
    <div id="gps-hud" style="background:#000; color:#0f0; text-align:center; padding:5px; font-family:monospace; font-weight:bold;">SATELLITE STANDBY</div>
    <div class="map-tools">
        <div class="m-btn" onclick="sm('k9')">🐕</div>
        <div class="m-btn" onclick="sm('leo')">👮</div>
        <div class="m-btn" onclick="sm('per')">🔴</div>
        <div class="m-btn" onclick="sm('sus')">👤</div>
        <div class="m-btn" onclick="forceGPS()" style="color:#007bff;">🛰️</div>
        <div class="m-btn" onclick="location.reload()" style="color:red;">🔄</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map, mode, userMarker, perimDots = [], perimLine;

    function openMap() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('map-module').style.display = 'flex';
        if(!map) {
            map = L.map('map',{zoomControl:false}).setView([37.584, -79.052], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            map.on('click', function(e){
                if(!mode) return;
                var icons = {'k9':'🐕','leo':'👮','per':'🔴','sus':'👤'};
                L.marker(e.latlng, {icon: L.divIcon({html: `<div style="font-size:30px;">${icons[mode]}</div>`, iconSize:[35,35]})}).addTo(map);
                if(mode === 'per') {
                    perimDots.push(e.latlng);
                    if(perimLine) map.removeLayer(perimLine);
                    perimLine = L.polyline(perimDots, {color: 'red', weight: 4, dashArray: '10, 10'}).addTo(map);
                }
            });
        }
    }

    function closeMap() {
        document.getElementById('map-module').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
    }

    function forceGPS() {
        navigator.geolocation.watchPosition(p => {
            if (p.coords.accuracy > 15) return;
            var pos = [p.coords.latitude, p.coords.longitude];
            if (!userMarker) {
                userMarker = L.circleMarker(pos, {radius:10, color:'#fff', fillColor:'#007bff', fillOpacity:1}).addTo(map);
                map.setView(pos, 19);
            } else { userMarker.setLatLng(pos); }
            document.getElementById('gps-hud').innerText = "LOCK: " + Math.round(p.coords.accuracy*3.28) + " FT";
        }, null, {enableHighAccuracy: true});
    }

    function sm(m){ mode = m; }
</script>
</body>
</html>
