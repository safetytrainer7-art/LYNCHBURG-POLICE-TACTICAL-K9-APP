<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ACSD K9 COMMAND</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { 
            --gold: #d4af37; 
            --acsd-green: #1a3a2a; 
        }
        
        body { 
            margin: 0; 
            padding: 0;
            background-color: var(--acsd-green);
            font-family: 'Times New Roman', serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .app-container {
            width: 100%;
            max-width: 430px;
            height: 98vh;
            border: 5px double var(--gold);
            border-radius: 15px;
            position: relative;
            box-sizing: border-box;
            /* GREEN BACKGROUND WITH PARCHMENT OVERLAY */
            background: 
                linear-gradient(rgba(26, 58, 42, 0.88), rgba(26, 58, 42, 0.88)),
                url('https://www.transparenttextures.com/patterns/parchment.png');
            box-shadow: inset 0 0 80px rgba(0,0,0,0.7);
        }

        /* HEADER */
        .header { text-align: center; padding-top: 15px; }
        .motto-row { 
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; font-weight: bold; color: var(--gold); 
            text-transform: uppercase; font-size: 13px;
            text-shadow: 1px 1px 2px #000;
        }
        .badge-img { width: 95px; height: auto; filter: drop-shadow(0 4px 8px #000); }
        .title { color: var(--gold); font-size: 22px; margin: 10px 0; text-shadow: 2px 2px 3px #000; letter-spacing: 1px; }

        /* K9 CENTERPIECE */
        .k9-photo { 
            width: 190px; 
            height: 190px; 
            margin: 0 auto 10px auto; 
            display: block; 
            filter: drop-shadow(0 5px 15px #000);
        }

        /* NAVIGATION GRID */
        .ui-grid { display: flex; justify-content: space-between; padding: 0 15px; }
        .ui-column { display: flex; flex-direction: column; gap: 20px; width: 32%; align-items: center; }
        
        .nav-btn { text-align: center; cursor: pointer; transition: transform 0.1s; }
        .nav-btn:active { transform: scale(0.9); }
        
        .icon-circle { 
            width: 65px; height: 65px; border: 2px solid var(--gold); border-radius: 50%; 
            background: radial-gradient(circle, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.9) 100%);
            display: flex; align-items: center; justify-content: center; 
            font-size: 28px; margin-bottom: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .sos-alert { border: 3px solid #b22222 !important; box-shadow: 0 0 10px rgba(178,34,34,0.6); }
        .icon-label { font-size: 10px; font-weight: bold; color: #f1e5ac; text-shadow: 1px 1px 2px #000; line-height: 1.2; }

        .footer { 
            position: absolute; bottom: 12px; width: 100%; text-align: center; 
            font-size: 11px; color: var(--gold); font-weight: bold; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="motto-row">
            <span>To Protect</span>
            <img src="acsd badge.jpg" class="badge-img" alt="ACSD Badge">
            <span>To Serve</span>
        </div>
        <h1 class="title">CANINE SEARCH & RESCUE</h1>
    </div>

    <!-- MAIN K9 CENTERPIECE -->
    <img src="gshep.jpg" class="k9-photo" alt="K9 Unit">

    <div class="ui-grid">
        <!-- LEFT SIDE -->
        <div class="ui-column">
            <div class="nav-btn">
                <div class="icon-circle sos-alert">🏥</div>
                <div class="icon-label">Emergency SOS /<br>K9 First Aid</div>
            </div>
            <div class="nav-btn">
                <div class="icon-circle">⚖️</div>
                <div class="icon-label">Graham v. Connor<br>Legal Shield</div>
            </div>
            <div class="nav-btn">
                <div class="icon-circle">🔍</div>
                <div class="icon-label">Narcotics/Ordnance Aids</div>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="ui-column">
            <div class="nav-btn">
                <div class="icon-circle">🗺️</div>
                <div class="icon-label">Live GPS Map</div>
            </div>
            <div class="nav-btn">
                <div class="icon-circle">📝</div>
                <div class="icon-label">Daily Training Logs</div>
            </div>
            <div class="nav-btn">
                <div class="icon-circle">🏛️</div>
                <div class="icon-label">Virginia Criminal Code Title 18.2</div>
            </div>
        </div>
    </div>

    <div class="footer">
        App Created by Retired Deputy Sheriff Earl Wood.
    </div>
</div>

</body>
</html>
