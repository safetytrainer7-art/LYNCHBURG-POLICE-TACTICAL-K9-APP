
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD COMMAND V213</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #c5a059; --le-blue: #0000FF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* NAVIGATION */
        #home { position: absolute; width: 100%; height: 100%; z-index: 1000; background: #000; display: block; }
        #gps-page { position: absolute; width: 100%; height: 100%; z-index: 2000; background: #000; display: none; flex-direction: column; }

        /* MASTER TOP BAR */
        .top-bar { 
            background: #111; 
            padding: 10px; 
            border-bottom: 2px solid var(--gold); 
            display: flex; 
            gap: 10px; 
            align-items: center;
            height: 70px;
        }
        .back-btn { background: var(--gold); color: #000; border: none; padding: 12px 15px; font-weight: 900; border-radius: 6px; cursor: pointer; }
        .addr-input { flex: 1; padding: 12px; background: #222; border: 1px solid var(--gold); color: #fff; border-radius: 6px; font-size: 16px; }
        .go-btn { background: #fff; color: #000; border: none; padding: 12px 20px; font-weight: 900; border-radius: 6px; }

        /* MAP AREA */
        #map { flex: 1; width: 100%; background: #222; }

        /* COMMAND PANEL */
        .command-panel { 
            background: #111; 
            padding: 15px; 
            border-top: 3px solid var(--gold); 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px;
            padding-bottom: 30px;
        }
        .cmd-btn { 
            padding: 20px 10px; 
            font-weight: 900; 
            border-radius: 10px; 
            border: none; 
            text-transform: uppercase; 
            font-size: 14px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.5);
        }
        .btn-blue { background: var(--le-blue); color: #fff; }
        .btn-red { background: #cc0000; color: #fff; }
        .btn-grey { background: #333; color: var(--gold); grid-column: span 2; }

        /* THE BLUE/WHITE DOT ICON */
        .k9-dot {
            width: 24px;
            height: 24px;
            background: #0000FF;
            border: 3px solid #FFFFFF;
            border-radius: 50%;
            box-shadow: 0 0 10px #0000FF;
        }

        /* HOME SCREEN BUTTONS */
        .home-grid { position: absolute; width: 100%; height: 100%; display: flex; justify-content: space-between; padding: 20% 5%; pointer-events: none; }
        .home-btn { pointer-events: auto; width: 120px; height: 80px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); color: var(--gold); font-weight: 900; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

    <div id="home">
        <img src="homepage.jpg" style="width:100%; height:100%; object-fit: contain;">
        <div class="home-grid">
            <div class="home-btn" onclick="openGPS()">TACTICAL GPS</div>
            <div class="home-btn" onclick="alert('Module Loading...')">LEGAL BIBLE</div>
        </div>
    </div>

    <div id="gps-page">
        <div class="top-bar">
            <button class="back-btn" onclick="closeGPS()">MENU</button>
            <input type="text" id="target" class="addr-input" placeholder="Enter Search Address...">
            <button class="go-btn" onclick="searchAddress()">GO</button>
        </div>

        <div id="map"></div>

        <div class="command-panel">
            <button class="cmd-btn btn-blue" onclick="findMe()">1. SHOW MY POSITION</button>
            <button class="cmd-btn btn-red" onclick="drawPerimeter()">2. SET PERIMETER</button>
            <button class="cmd-btn btn-grey" onclick="resetMap()">RESET TO AMHERST</button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, userMarker, perimeter;

    function openGPS() {
        document.getElementById('home').style.display = 'none';
        document.getElementById('gps-page').style.display = 'flex';
        if(!map) {
            setTimeout(initMap, 200);
        }
    }

    function closeGPS() {
        document.getElementById('gps-page').style.display = 'none';
        document.getElementById('home').style.display = 'block';
    }

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([37.5853, -79.0514], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }

    // REAL TIME POSITION LOCK
    function findMe() {
        if (!navigator.geolocation) {
            alert("GPS not supported by this device.");
            return;
        }
        
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const myLoc = [lat, lng];

            // BLUE WITH WHITE BORDER DOT
            const blueWhiteIcon = L.divIcon({
                className: 'k9-dot-container',
                html: '<div class="k9-dot"></div>',
                iconSize: [24, 24]
            });

            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(myLoc, { icon: blueWhiteIcon }).addTo(map);
            map.setView(myLoc, 17);
        }, (err) => {
            alert("GPS Error: Please enable location services in settings.");
        }, { enableHighAccuracy: true });
    }

    // LIVE ADDRESS SEARCH
    async function searchAddress() {
        const query = document.getElementById('target').value;
        if(!query) return;
        
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
        const data = await response.json();
        
        if (data.length > 0) {
            const loc = [data[0].lat, data[0].lon];
            L.marker(loc).addTo(map).bindPopup("TARGET LOCATION").openPopup();
            map.setView(loc, 17);
        } else {
            alert("Address not found. Try adding 'Amherst, VA'.");
        }
    }

    // PERIMETER LOCK
    function drawPerimeter() {
        const center = map.getCenter();
        if (perimeter) map.removeLayer(perimeter);
        
        perimeter = L.circle(center, {
            color: '#FF0000',
            fillColor: '#FF0000',
            fillOpacity: 0.2,
            radius: 500, // 500 meters
            weight: 5
        }).addTo(map);
        
        alert("500m Perimeter Established.");
    }

    function resetMap() {
        map.setView([37.5853, -79.0514], 14);
    }
</script>
</body>
</html>
