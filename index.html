<div id="m-map" class="page">
    <div class="header">
        <button class="back-btn" onclick="closePage('m-map')">← BACK</button>
        <h2 style="color:#c5a059; margin:0;">TACTICAL COMMAND MAP</h2>
    </div>

    <div style="background: #000; padding: 10px; border-bottom: 2px solid #c5a059;">
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="map-search" placeholder="STREET, CITY..." 
                   style="flex-grow: 1; padding: 12px; background: #111; color: #fff; border: 1px solid #c5a059; font-size: 16px;">
            <button onclick="searchAddr()" style="background: #c5a059; color: #000; border: none; padding: 10px 20px; font-weight: bold;">GO</button>
        </div>

        <div style="display: flex; justify-content: space-around; margin-bottom: 10px;">
            <button class="tool-btn le-btn" onclick="setRole('le')">BLUE (LE)</button>
            <button class="tool-btn k9-btn" onclick="setRole('k9')">LT BLUE (K9)</button>
            <button class="tool-btn sar-btn" onclick="setRole('sar')">RED (SAR)</button>
            <button class="tool-btn sub-btn" onclick="setRole('sub')">PURPLE (SUB)</button>
        </div>

        <button id="start-btn" onclick="startGps()" 
                style="width: 100%; background: #004400; color: #fff; border: 2px solid #00ff00; padding: 15px; font-weight: bold; text-transform: uppercase;">
            ▶ START LIVE GPS TRACKING
        </button>
    </div>

    <div id="live-map" style="width: 100%; height: 55vh; background: #111; border-bottom: 2px solid #c5a059;"></div>

    <div style="display: flex; justify-content: space-between; padding: 12px; background: #000; color: #c5a059; font-family: monospace; font-size: 13px;">
        <div id="wind-dir">🚩 WIND: NORTH 8MPH</div>
        <div id="dist-check">OFFICER DIST: -- FT</div>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    .tool-btn { flex: 1; background: #1a1a1a; color: #c5a059; border: 1px solid #c5a059; padding: 10px 2px; font-size: 11px; font-weight: bold; border-radius: 4px; margin: 0 2px; }
    .le-btn { border-left: 5px solid blue; }
    .k9-btn { border-left: 5px solid lightblue; }
    .sar-btn { border-left: 5px solid red; }
    .sub-btn { border-left: 5px solid purple; }
    
    /* Live Pulse Effect for Officer Location */
    .pulse {
        width: 15px; height: 15px;
        background: #007bff; border: 3px solid white;
        border-radius: 50%; box-shadow: 0 0 0 rgba(0, 123, 255, 0.4);
        animation: pulse-blue 2s infinite;
    }
    @keyframes pulse-blue {
        0% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.7); }
        70% { box-shadow: 0 0 0 15px rgba(0, 123, 255, 0); }
        100% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); }
    }
</style>

<script>
    let map;
    let userMarker;

    function initMap() {
        if (!map) {
            // Defaulting to general VA coordinates until GPS kicks in
            map = L.map('live-map').setView([37.525, -79.15], 13); 
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19
            }).addTo(map);
        }
    }

    // New Geocoding Function (The "GO" button logic)
    async function searchAddr() {
        let addr = document.getElementById('map-search').value;
        if(!addr) return;
        
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`);
            const data = await response.json();
            
            if (data.length > 0) {
                const lat = data[0].lat;
                const lon = data[0].lon;
                map.setView([lat, lon], 17); // Zoom in close to the address
                L.marker([lat, lon]).addTo(map).bindPopup("<b>SEARCH START POINT</b><br>" + addr).openPopup();
            } else {
                alert("Address not found. Please try adding City and State.");
            }
        } catch (error) {
            alert("Search service error. Check internet connection.");
        }
    }

    function startGps() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                
                if (userMarker) {
                    userMarker.setLatLng([lat, lng]);
                } else {
                    const icon = L.divIcon({ className: 'pulse', iconSize: [15, 15] });
                    userMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                }
                map.panTo([lat, lng]);
            }, err => alert("Please allow GPS access in your settings."), { enableHighAccuracy: true });
        }
    }

    // Attach map trigger to your existing openPage function
    window.addEventListener('click', function(e) {
        if (e.target.innerText === "TACTICAL MAP") {
            setTimeout(initMap, 200);
        }
    });
</script>
