
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 Command - ACSO TACTICAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: #fff; font-family: 'Times New Roman', serif; overflow: hidden; }
        
        #map { width: 100%; height: 55%; border-bottom: 4px solid #d4af37; background: #111; z-index: 1; }

        /* THE LIVE GPS "BLUE PULSE" ANIMATION */
        .gps-pulse {
            width: 15px; height: 15px; background: #007bff; border: 3px solid #fff;
            border-radius: 50%; box-shadow: 0 0 0 rgba(0, 123, 255, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 123, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); }
        }

        .nav-header { 
            position: absolute; top: 0; left: 0; width: 100%; height: 60px; 
            background: #000; z-index: 2000; display: flex; align-items: center; padding: 0 15px;
            border-bottom: 2px solid #d4af37;
        }
        
        .back-btn { 
            background: #d4af37; color: #000; padding: 8px 15px; border-radius: 5px;
            font-weight: bold; text-decoration: none; cursor: pointer;
        }

        .hud { 
            position: absolute; top: 70px; right: 10px; z-index: 1000; 
            background: rgba(0,26,17,0.9); border: 1px solid #d4af37; padding: 10px; border-radius: 5px;
            text-align: center; color: #00ff00;
        }

        .command-panel { 
            width: 100%; height: 45%; background: #001a11; padding: 15px; 
            box-sizing: border-box; overflow-y: auto; z-index: 5;
        }

        .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .go-btn { flex: 2; background: #28a745; color: white; padding: 12px; font-weight: bold; border: none; border-radius: 4px; }
        
        .asset-selector { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid #d4af37; }
        .mode-btn { padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.7em; border: 2px solid transparent; text-align: center; color: #fff;}
        .active-mode { border-color: #fff; transform: scale(1.1); }

        .instruction-bar { background: #ff0000; color: #fff; text-align: center; font-size: 0.8em; padding: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="back-btn" onclick="location.reload()">← EXIT GPS</div>
    <div style="margin-left: 20px; font-weight: bold; color: #d4af37;">TACTICAL COMMAND</div>
</div>

<div class="hud">
    <div style="font-size: 1.5em;" id="wind-icon">↑</div>
    <small>WIND / 315° NW</small>
</div>

<div id="map"></div>
<div class="instruction-bar">TAP A DOT TO REMOVE IT FROM THE FIELD</div>

<div class="command-panel">
    <div class="btn-row">
        <input type="text" id="targetAddr" style="flex:3; padding:10px; background:#000; color:#d4af37; border:1px solid #d4af37;" placeholder="Enter Search Area...">
        <button class="go-btn" onclick="executeSearch()">INITIALIZE</button>
    </div>

    <div class="btn-row">
        <button onclick="setMode('perimeter')" style="flex:1; background:#ff8c00; color:white; border:none; padding:10px; font-weight:bold; border-radius:4px;">DRAW PERIMETER</button>
        <button onclick="useLiveGPS()" style="flex:1; background:#007bff; color:white; border:none; padding:10px; font-weight:bold; border-radius:4px;">MY LIVE POSITION</button>
    </div>

    <div class="asset-selector">
        <div id="btn-blue" class="mode-btn" style="background:blue;" onclick="setMode('blue')">OFFICER</div>
        <div id="btn-red" class="mode-btn" style="background:red;" onclick="setMode('red')">SAR</div>
        <div id="btn-green" class="mode-btn" style="background:green;" onclick="setMode('green')">CIVILIAN</div>
        <div id="btn-purple" class="mode-btn" style="background:purple;" onclick="setMode('purple')">SUBJECT</div>
    </div>
</div>

<script>
    var map = L.map('map', { zoomControl: false }).setView([37.58, -79.05], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var currentMode = 'blue';
    var perimeterPoints = [];
    var perimeterPolygon = null;
    var liveMarker = null;

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active-mode'));
        if(mode !== 'perimeter' && mode !== 'delete') {
            document.getElementById('btn-' + mode).classList.add('active-mode');
        }
    }

    // LIVE GPS TRACKING (THE BLUE FLASHING DOT)
    function useLiveGPS() {
        map.locate({setView: true, watch: true, maxZoom: 16});
    }

    map.on('locationfound', function(e) {
        if (liveMarker) map.removeLayer(liveMarker);
        
        var pulseIcon = L.divIcon({
            className: 'gps-pulse-container',
            html: '<div class="gps-pulse"></div>',
            iconSize: [20, 20]
        });
        
        liveMarker = L.marker(e.latlng, {icon: pulseIcon}).addTo(map);
        liveMarker.bindPopup("YOU ARE HERE").openPopup();
    });

    // MAP CLICK LOGIC
    map.on('click', function(e) {
        if (currentMode === 'perimeter') {
            addPerimeterPoint(e.latlng);
        } else {
            dropMarker(e.latlng, currentMode);
        }
    });

    function dropMarker(latlng, color) {
        var marker = L.circleMarker(latlng, {
            radius: 12, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9
        }).addTo(map);

        // REMOVE SEARCHER LOGIC: Tap the dot to delete it
        marker.on('click', function() {
            map.removeLayer(marker);
        });
    }

    function addPerimeterPoint(latlng) {
        perimeterPoints.push([latlng.lat, latlng.lng]);
        if (perimeterPolygon) map.removeLayer(perimeterPolygon);
        if (perimeterPoints.length >= 3) {
            perimeterPolygon = L.polygon(perimeterPoints, {
                color: '#ff8c00', weight: 3, fillOpacity: 0.2, interactive: false
            }).addTo(map);
        }
        var pMarker = L.circleMarker(latlng, {radius: 5, color: '#ff8c00'}).addTo(map);
        pMarker.on('click', function() { map.removeLayer(pMarker); });
    }

    async function executeSearch() {
        var val = document.getElementById('targetAddr').value;
        const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}`);
        const data = await resp.json();
        if(data.length > 0) {
            map.setView([data[0].lat, data[0].lon], 16);
            L.marker([data[0].lat, data[0].lon]).addTo(map).bindPopup("COMMAND POST").openPopup();
        }
    }

    // Wind movement simulation
    setInterval(() => {
        document.getElementById('wind-icon').style.transform = `rotate(${Math.floor(Math.random() * 360)}deg)`;
    }, 5000);

    setMode('blue');
</script>

</body>
</html>
