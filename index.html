<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 Command</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .app-screen {
            width: 100vw;
            height: 100vh;
            background: url('homepage.jpg') no-repeat center center;
            background-size: contain;
            position: relative;
        }
        /* This grid creates larger touch zones that cover BOTH the icon and the text */
        .button-grid {
            position: absolute;
            top: 15%; /* Moves the grid down to align with your icons */
            left: 0;
            width: 100%;
            height: 75%; /* Focuses the buttons on the middle of the screen */
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }
        .btn {
            border: 1px solid rgba(255, 255, 255, 0.05); /* Very faint guide */
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-screen">
    <div class="button-grid">
        <!-- TOP ROW -->
        <div class="btn" onclick="window.location.href='legal.html'"></div>
        <div class="btn" onclick="window.location.href='narcotics.html'"></div>
        <div class="btn" onclick="window.location.href='training.html'"></div>
        
        <!-- MIDDLE ROW -->
        <div class="btn" onclick="window.location.href='emergency.html'"></div>
        <div class="btn" onclick="alert('GPS Tracking: Coming Soon')"></div>
        <div class="btn" onclick="alert('Tactical Tracking: Coming Soon')"></div>

        <!-- BOTTOM ROW (Reserved for additional features) -->
        <div class="btn" onclick="alert('Feature Coming Soon')"></div>
        <div class="btn" onclick="alert('Feature Coming Soon')"></div>
        <div class="btn" onclick="alert('Feature Coming Soon')"></div>
    </div>
</div>

</body>
</html>
