<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ACSD K9 COMMAND</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --acsd-green: #1a3a2a; 
        }
        
        body { 
            margin: 0; 
            background-color: #000;
            background-image: linear-gradient(135deg, #0a1a12 0%, #1a3a2a 100%);
            font-family: 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        /* THE GLASS PANEL EFFECT */
        .app-container {
            width: 95%;
            max-width: 410px;
            height: 96vh;
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 25px;
            position: relative;
            box-sizing: border-box;
            
            /* TRANSLUCENT GLASS OVERLAY */
            background: rgba(26, 58, 42, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* TACTICAL CORNER BRACKETS (Like the BOLO image) */
        .app-container::before {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(0, 255, 127, 0.1);
            border-radius: 20px;
            pointer-events: none;
        }

        .header { text-align: center; padding-top: 20px; }
        .motto-row { 
            display: flex; justify-content: center; align-items: center; 
            gap: 12px; font-weight: bold; color: var(--gold); 
            text-transform: uppercase; font-size: 12px; letter-spacing: 2px;
        }
        
        /* IMAGE LOADING FIX */
        .badge-img { width: 85px; height: 85px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(212,175,55,0.5)); }
        .k9-photo { 
            width: 180px; height: 180px; 
            margin: 15px auto; 
            display: block; 
            object-fit: contain;
            border-radius: 50%;
            border: 2px solid var(--gold);
            padding: 5px;
            background: rgba(0,0,0,0.3);
        }

        .title { color: var(--gold); font-size: 20px; margin: 10px 0; text-shadow: 0 0 10px rgba(0,0,0,1); }

        .ui-grid { display: flex; justify-content: space-between; padding: 0 20px; margin-top: 10px; }
        .ui-column { display: flex; flex-direction: column; gap: 25px; width: 32%; align-items: center; }
        
        /* GLASS BUTTONS */
        .icon-circle { 
            width: 60px; height: 60px; 
            border: 1px solid var(--gold); 
            border-radius: 12px; 
            background: rgba(0, 0, 0, 0.5);
            display: flex; align-items: center; justify-content: center; 
            font-size: 26px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .icon-label { font-size: 10px; font-weight: bold; color: #fff; margin-top: 5px; text-align: center; text-transform: uppercase; }

        .footer { 
            position: absolute; bottom: 15px; width: 100%; text-align: center; 
            font-size: 10px; color: var(--gold); letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="motto-row">
            <span>To Protect</span>
            <img src="acsdbadge.jpg" class="badge-img" alt="Badge">
            <span>To Serve</span>
        </div>
        <h1 class="title">K9 SEARCH & RESCUE</h1>
    </div>

    <img src="gshep_2.jpg" class="k9-photo" alt="K9 Unit">

    <div class="ui-grid">
        <div class="ui-column">
            <div class="icon-circle" style="border-color: #ff4d4d;">🏥</div>
            <div class="icon-label">SOS</div>
            <div class="icon-circle">⚖️</div>
            <div class="icon-label">Legal</div>
        </div>

        <div class="ui-column">
            <div class="icon-circle">🗺️</div>
            <div class="icon-label">GPS Map</div>
            <div class="icon-circle">📝</div>
            <div class="icon-label">Logs</div>
        </div>

        <div class="ui-column">
            <div class="icon-circle">🔍</div>
            <div class="icon-label">Narcotics</div>
            <div class="icon-circle">🏛️</div>
            <div class="icon-label">VA Code</div>
        </div>
    </div>

    <div class="footer">
        RETIRED DEPUTY SHERIFF EARL WOOD
    </div>
</div>

</body>
</html>
