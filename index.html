<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 Command</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .app-screen {
            width: 100vw;
            height: 100vh;
            background: url('homepage.jpg') no-repeat center center;
            background-size: contain;
            position: relative;
        }
        .button-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }
        .btn {
            border: 1px solid rgba(255, 255, 255, 0.2); /* You will see these boxes clearly now */
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-screen">
    <div class="button-grid">
        <!-- If you click these, they MUST open the files -->
        <div class="btn" onclick="window.location.href='legal.html'"></div>
        <div class="btn" onclick="window.location.href='narcotics.html'"></div>
        <div class="btn" onclick="window.location.href='training.html'"></div>
        
        <div class="btn" onclick="window.location.href='emergency.html'"></div>
        <div class="btn" onclick="alert('GPS')"></div>
        <div class="btn" onclick="alert('Tactical')"></div>

        <div class="btn" onclick="alert('Row 3 Left')"></div>
        <div class="btn" onclick="alert('Row 3 Center')"></div>
        <div class="btn" onclick="alert('Row 3 Right')"></div>
    </div>
</div>

</body>
</html>
