
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD V227</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #c5a059; --le-blue: #0000FF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #001a00; overflow: hidden; }
        
        /* 1. THE REPAIRED HOMEPAGE */
        #home { 
            display: block; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 1000; 
            /* This MUST match the name of the file in your folder exactly */
            background: url('edited-image.jpg') no-repeat center center;
            background-size: contain;
        }

        /* 2. THE INVISIBLE TOUCH TARGETS */
        .touch-grid {
            position: absolute;
            top: 30%; left: 5%; width: 90%; height: 55%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(3, 1fr);
            z-index: 1100;
            gap: 15px;
        }
        .hitbox { cursor: pointer; background: rgba(255,255,255,0); }

        /* 3. THE GPS OVERLAY */
        #gps-page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; background: #000; display: none; flex-direction: column; }
        .top-nav { background: #111; padding: 10px; border-bottom: 2px solid var(--gold); display: flex; gap: 8px; height: 85px; align-items: flex-end; }
        .menu-btn { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: 900; border-radius: 6px; }
        #map { flex: 1; width: 100%; }
        .map-footer { background: #111; border-top: 2px solid var(--gold); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 40px; }
        .foot-btn { padding: 22px; font-weight: 900; border-radius: 8px; border: none; text-transform: uppercase; color: #fff; }
        
        /* THE LIVE GPS DOT */
        .user-dot { width: 28px; height: 28px; background: var(--le-blue); border: 4px solid #FFFFFF; border-radius: 50%; box-shadow: 0 0 15px var(--le-blue); }
    </style>
</head>
<body>

    <div id="home">
        <div class="touch-grid">
            <div class="hitbox" onclick="openGPS()"></div> <div class="hitbox" onclick="alert('Legal Bible')"></div> <div class="hitbox" onclick="alert('First Aid')"></div> <div class="hitbox" onclick="alert('Training')"></div> <div class="hitbox" onclick="alert('Incident Rpt')"></div> <div class="hitbox" onclick="alert('Settings')"></div> </div>
    </div>

    <div id="gps-page">
        <div class="top-nav">
            <button class="menu-btn" onclick="closeGPS()">BACK</button>
            <input type="text" id="targetAddr" style="flex:1; padding:12px; background:#222; border:1px solid var(--gold); color:#fff;" placeholder="Search Address...">
            <button class="menu-btn" style="background:#fff;" onclick="runSearch()">GO</button>
        </div>
        <div id="map"></div>
        <div class="map-footer">
            <button class="foot-btn" style="background:var(--le-blue);" onclick="locateUser()">MY POSITION</button>
            <button class="foot-btn" style="background:#cc0000;" onclick="dropPerimeter()">SET PERIMETER</button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker, perimeter;
    function openGPS() { document.getElementById('home').style.display='none'; document.getElementById('gps-page').style.display='flex'; if(!map){setTimeout(initMap,300);}}
    function closeGPS() { document.getElementById('gps-page').style.display='none'; document.getElementById('home').style.display='block';}
    function initMap() { map = L.map('map',{zoomControl:false}).setView([37.5853, -79.0514], 14); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);}
    function locateUser() { navigator.geolocation.getCurrentPosition(p=>{ const loc=[p.coords.latitude, p.coords.longitude]; const icon=L.divIcon({html:'<div class="user-dot"></div>',className:'',iconSize:[28,28]}); if(marker)map.removeLayer(marker); marker=L.marker(loc,{icon:icon}).addTo(map); map.setView(loc,17);},()=>alert("GPS Error"),{enableHighAccuracy:true});}
    async function runSearch() { const q=document.getElementById('targetAddr').value; const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`); const d=await r.json(); if(d[0]){ const loc=[d[0].lat, d[0].lon]; L.marker(loc).addTo(map); map.setView(loc,17);}}
    function dropPerimeter() { if(perimeter)map.removeLayer(perimeter); perimeter=L.circle(map.getCenter(),{color:'red',radius:500,weight:8,fillOpacity:0.15}).addTo(map);}
</script>
</body>
</html>
