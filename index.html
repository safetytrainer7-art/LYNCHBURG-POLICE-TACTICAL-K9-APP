<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LPD K-9 TACTICAL MAP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --lpd-blue: #002d62; --neon: #00ff66; --gold: #d4af37; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }

        .app-container { display: flex; flex-direction: column; height: 100vh; }

        /* TOP MISSION BAR */
        .mission-info {
            background: var(--lpd-blue); color: white; padding: 40px 15px 10px;
            border-bottom: 2px solid var(--gold); z-index: 1000;
        }
        .mission-info h1 { font-size: 18px; margin: 0; }
        .mission-info p { font-size: 11px; color: var(--gold); margin: 2px 0; font-weight: bold; }

        /* THE ACTUAL MAP COMPONENT */
        #map { flex-grow: 1; width: 100%; background: #222; }

        /* OVERLAY FOR TRACKING STATUS */
        .tracking-overlay {
            position: absolute; bottom: 20px; left: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.85); border: 1px solid var(--lpd-blue);
            border-radius: 8px; padding: 12px; z-index: 1000; color: white;
            pointer-events: none;
        }
        .status-header { color: var(--neon); font-weight: bold; font-size: 12px; margin-bottom: 5px; text-transform: uppercase; }
        .unit-list { font-size: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="mission-info">
        <h1>LYNCHBURG TACTICAL COMMAND</h1>
        <p id="address-display">ACTIVE SEARCH: 1200 CHURCH ST, LYNCHBURG</p>
    </div>

    <div id="map"></div>

    <div class="tracking-overlay">
        <div class="status-header">Live Pursuit Data</div>
        <div class="unit-list">
            <span>K9-1 (Miller): <span style="color:var(--neon)">TRACKING</span></span>
            <span>Unit 109: <span style="color:var(--gold)">PERIMETER</span></span>
            <span>WIND: 6mph NW</span>
            <span>COMPASS: 312°</span>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize the map and set view to Lynchburg, VA
    // Coordinates for Church St, Lynchburg: 37.4137, -79.1422
    var map = L.map('map').setView([37.4137, -79.1422], 16);

    // Add a dark tactical map layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // K9 Handler Icon (Green)
    var k9Icon = L.circleMarker([37.4137, -79.1422], {
        color: '#00ff66', fillColor: '#00ff66', fillOpacity: 0.8, radius: 8
    }).addTo(map).bindPopup('<b>K9-1 (AXEL)</b><br>Active Scent Path').openPopup();

    // Perimeter Units (Blue/Gold)
    L.circleMarker([37.4150, -79.1400], { color: '#d4af37', radius: 6 }).addTo(map).bindPopup('Unit 109');
    L.circleMarker([37.4120, -79.1450], { color: '#d4af37', radius: 6 }).addTo(map).bindPopup('Unit 215');

</script>

</body>
</html>
