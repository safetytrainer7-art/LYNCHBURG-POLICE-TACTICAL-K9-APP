<script>
    let map, userMarker, perimeterMode = false;
    let activeColor = 'blue'; // Default starting color

    // Function to set the role and color
    function setRole(role) {
        const colors = {
            'le': 'blue',
            'k9': '#00d4ff', // Light Blue
            'sar': 'red',
            'sub': 'purple',
            'civ': 'green'
        };
        activeColor = colors[role];
        
        // Visual feedback for the officer
        alert("ROLE SET: " + role.toUpperCase() + " (Dots will now be " + activeColor + ")");
        
        // If we already have a user marker, update its color to match the role
        if (userMarker) {
            userMarker.setStyle({color: activeColor, fillColor: activeColor});
        }
    }

    function togglePerimeter() {
        perimeterMode = !perimeterMode;
        if(perimeterMode) {
            alert("PERIMETER ACTIVE: Tap map to drop RED DOTS.");
            map.on('click', e => {
                // Perimeter dots stay RED regardless of role
                L.circleMarker(e.latlng, { 
                    color: 'red', 
                    radius: 8, 
                    fillOpacity: 0.9,
                    weight: 2 
                }).addTo(map);
            });
        } else {
            alert("PERIMETER OFF.");
            map.off('click');
        }
    }

    function startGps() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                
                if (userMarker) { 
                    userMarker.setLatLng([lat, lng]); 
                } else {
                    // Creates a solid, colored marker based on your selected role
                    userMarker = L.circleMarker([lat, lng], { 
                        color: activeColor, 
                        radius: 10, 
                        fillOpacity: 0.8,
                        weight: 3
                    }).addTo(map);
                }
                map.panTo([lat, lng]);
            }, null, { enableHighAccuracy: true });
        }
    }

    // UPDATED FLAG LOGIC
    function dropFlag() { 
        if(userMarker) {
            // Drop a permanent Yellow marker for found evidence
            L.circleMarker(userMarker.getLatLng(), {
                color: 'yellow',
                radius: 12,
                fillOpacity: 1,
                weight: 4
            }).addTo(map).bindPopup("<b>PROPERTY FOUND</b>").openPopup();
        } 
    }
</script>

<style>
    /* Adjusting button colors to match the map dots */
    .role-btn[onclick*="le"] { border-top: 5px solid blue !important; }
    .role-btn[onclick*="k9"] { border-top: 5px solid #00d4ff !important; }
    .role-btn[onclick*="sar"] { border-top: 5px solid red !important; }
    .role-btn[onclick*="sub"] { border-top: 5px solid purple !important; }
    .role-btn[onclick*="civ"] { border-top: 5px solid green !important; }
</style>
