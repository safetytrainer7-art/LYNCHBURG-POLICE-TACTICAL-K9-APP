<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 Command - ACSO</title>
    <!-- Script to handle PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; font-family: 'Times New Roman', serif; color: white; overflow-x: hidden; }
        .app-screen { width: 100vw; height: 100vh; background: url('homepage.jpg') no-repeat center center; background-size: contain; position: relative; }
        .button-grid { position: absolute; bottom: 15.5%; left: 5%; width: 90%; height: 30%; display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .btn { cursor: pointer; border: 1px solid rgba(255,255,255,0.01); }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #001a11; z-index: 100; overflow-y: auto; padding: 25px; box-sizing: border-box; border: 3px solid #d4af37; }
        .active { display: block; }
        .close-btn { background: #d4af37; color: black; padding: 12px 20px; font-weight: bold; cursor: pointer; display: inline-block; margin-bottom: 25px; border-radius: 5px; }
        
        h1 { color: #d4af37; text-transform: uppercase; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
        .form-section { background: rgba(255,255,255,0.05); padding: 20px; margin-bottom: 25px; border: 1px solid #d4af37; border-radius: 5px; }
        label { display: block; color: #d4af37; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; font-size: 0.9em; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .submit-btn { background: #d4af37; color: black; padding: 15px; width: 100%; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="app-screen">
    <div class="button-grid">
        <div class="btn" onclick="openSection('emergencySection')"></div>
        <div class="btn" onclick="openSection('gpsSection')"></div>
        <div class="btn" onclick="openSection('narcSection')"></div>
        <div class="btn" onclick="openSection('legalSection')"></div>
        <div class="btn" onclick="openSection('trainSection')"></div>
        <div class="btn" onclick="openSection('vaSection')"></div>
    </div>
</div>

<!-- TRAINING LOGS & INCIDENT REPORTS -->
<div id="trainSection" class="overlay">
    <div class="close-btn" onclick="closeSections()">← BACK TO COMMAND</div>
    <h1>K9 ADMINISTRATION & LOGS</h1>

    <!-- DAILY TRAINING FORM -->
    <div class="form-section">
        <h2>Daily K9 Training Log</h2>
        <form id="trainingForm">
            <label>Handler Name / ID</label>
            <input type="text" id="t_handler" placeholder="e.g. Deputy Wood">
            
            <label>K9 Name</label>
            <input type="text" id="t_k9" placeholder="K9 Name">

            <label>Training Type</label>
            <select id="t_type">
                <option>Narcotics Detection</option>
                <option>Tracking / SAR</option>
                <option>Apprehension / Bite Work</option>
                <option>Obedience</option>
            </select>

            <label>Performance Notes</label>
            <textarea id="t_notes" rows="4" placeholder="Describe the environment, distractions, and K9 response..."></textarea>
            
            <button type="button" class="submit-btn" onclick="generatePDF('Training Log')">Generate Training PDF</button>
        </form>
    </div>

    <!-- INCIDENT REPORT FORM -->
    <div class="form-section">
        <h2>K9 Incident Report (Call for Service)</h2>
        <form id="incidentForm">
            <label>Case Number / CFS #</label>
            <input type="text" id="i_case" placeholder="2026-XXXX">
            
            <label>Location of Incident</label>
            <input type="text" id="i_loc" placeholder="Amherst County Location">

            <label>Suspect/Subject Name</label>
            <input type="text" id="i_suspect" placeholder="Name or Description">

            <label>Deployment Narrative</label>
            <textarea id="i_narrative" rows="6" placeholder="Describe deployment, alerts, or apprehension details..."></textarea>
            
            <button type="button" class="submit-btn" onclick="generatePDF('Incident Report')">Generate Court-Ready PDF</button>
        </form>
    </div>
</div>

<!-- (Previous sections for Legal, VA Code, etc. remain here) -->

<script>
    function openSection(id) { document.getElementById(id).classList.add('active'); }
    function closeSections() { 
        var sections = document.getElementsByClassName('overlay');
        for(var i=0; i<sections.length; i++) { sections[i].classList.remove('active'); }
    }

    // PDF GENERATION LOGIC
    function generatePDF(title) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFont("times", "bold");
        doc.setFontSize(18);
        doc.text("AMHERST COUNTY SHERIFF'S OFFICE", 105, 20, { align: 'center' });
        doc.text("K9 COMMAND UNIT - " + title.toUpperCase(), 105, 30, { align: 'center' });
        
        doc.setFontSize(12);
        doc.setFont("times", "normal");
        doc.text("Date Generated: " + new Date().toLocaleDateString(), 20, 45);
        
        let yPos = 60;
        
        if(title === 'Training Log') {
            doc.text("Handler: " + document.getElementById('t_handler').value, 20, yPos);
            doc.text("K9: " + document.getElementById('t_k9').value, 20, yPos + 10);
            doc.text("Type: " + document.getElementById('t_type').value, 20, yPos + 20);
            doc.text("Notes:", 20, yPos + 35);
            doc.text(doc.splitTextToSize(document.getElementById('t_notes').value, 170), 20, yPos + 45);
        } else {
            doc.text("Case #: " + document.getElementById('i_case').value, 20, yPos);
            doc.text("Location: " + document.getElementById('i_loc').value, 20, yPos + 10);
            doc.text("Suspect: " + document.getElementById('i_suspect').value, 20, yPos + 20);
            doc.text("Deployment Narrative:", 20, yPos + 35);
            doc.text(doc.splitTextToSize(document.getElementById('i_narrative').value, 170), 20, yPos + 45);
        }

        doc.text("__________________________", 20, 250);
        doc.text("Officer Signature / ID", 20, 260);

        doc.save(title + "_" + new Date().getTime() + ".pdf");
        alert(title + " has been generated and saved to your device.");
    }
</script>

</body>
</html>
