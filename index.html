<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ACSD K9 COMMAND</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --acsd-green: #1a3a2a; 
        }
        
        body { 
            margin: 0; 
            background-color: #000;
            font-family: 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        .app-container {
            width: 100%;
            max-width: 430px;
            height: 98vh;
            border: 5px double var(--gold);
            border-radius: 15px;
            position: relative;
            box-sizing: border-box;
            
            /* BUILT-IN PARCHMENT (No external link needed) */
            background-color: var(--acsd-green);
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 4px 4px;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
        }

        .header { text-align: center; padding-top: 15px; }
        .motto-row { 
            display: flex; justify-content: center; align-items: center; 
            gap: 12px; font-weight: bold; color: var(--gold); 
            text-transform: uppercase; font-size: 13px;
        }
        
        /* Forces the image to show a border if it fails to load so we can troubleshoot */
        .badge-img { 
            width: 90px; height: 90px; 
            object-fit: contain; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
        }
        
        .title { color: var(--gold); font-size: 22px; margin: 10px 0; text-shadow: 2px 2px 4px #000; }

        .k9-photo { 
            width: 200px; height: 200px; 
            margin: 5px auto 15px auto; 
            display: block; 
            object-fit: contain;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .ui-grid { display: flex; justify-content: space-between; padding: 0 15px; }
        .ui-column { display: flex; flex-direction: column; gap: 20px; width: 32%; align-items: center; }
        
        .icon-circle { 
            width: 65px; height: 65px; border: 2px solid var(--gold); border-radius: 50%; 
            background: #000; display: flex; align-items: center; justify-content: center; 
            font-size: 28px; margin-bottom: 4px;
        }
        .icon-label { font-size: 10px; font-weight: bold; color: #f1e5ac; text-align: center; }

        .footer { 
            position: absolute; bottom: 12px; width: 100%; text-align: center; 
            font-size: 11px; color: var(--gold); font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="motto-row">
            <span>To Protect</span>
            <img src="./acsdbadge.jpg" class="badge-img" alt="Badge">
            <span>To Serve</span>
        </div>
        <h1 class="title">CANINE SEARCH & RESCUE</h1>
    </div>

    <img src="./gshep_2.jpg" class="k9-photo" alt="K9 Unit">

    <div class="ui-grid">
        <div class="ui-column">
            <div class="icon-circle" style="border-color: #b22222;">🏥</div>
            <div class="icon-label">SOS / First Aid</div>
            <div class="icon-circle">⚖️</div>
            <div class="icon-label">Legal Shield</div>
        </div>

        <div class="ui-column">
            <div class="icon-circle">🗺️</div>
            <div class="icon-label">GPS Map</div>
            <div class="icon-circle">📝</div>
            <div class="icon-label">Training Logs</div>
        </div>

        <div class="ui-column">
            <div class="icon-circle">🔍</div>
            <div class="icon-label">Narcotics</div>
            <div class="icon-circle">🏛️</div>
            <div class="icon-label">VA Code</div>
        </div>
    </div>

    <div class="footer">
        App Created by Retired Deputy Sheriff Earl Wood.
    </div>
</div>

</body>
</html>
