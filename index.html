
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD V161</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }

        /* THE LOCK-BOX: This keeps the buttons attached to the photo pixels */
        #photo-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* Fixed 16:9 Landscape aspect ratio */
            max-height: 100vh;
            max-width: 177.78vh;
            background-image: url('homepage.jpg'), url('homepage.png'), url('IMG_2908.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* HOTSPOTS: Now they move with the photo, not the whole screen */
        .hotspot { 
            position: absolute; 
            cursor: pointer; 
            border: 2px solid red; /* Temporary for testing */
            z-index: 100; 
        }
        
        /* Precision mapping for your gold icons */
        #spot-med  { top: 18%; left: 11%; width: 13%; height: 26%; } /* Emergency SOS */
        #spot-law  { top: 48%; left: 11%; width: 13%; height: 26%; } /* Legal Shield */
        #spot-narc { top: 75%; left: 11%; width: 13%; height: 18%; } /* Narcotics */
        
        #spot-map  { top: 18%; right: 11%; width: 13%; height: 26%; } /* GPS Map */
        #spot-logs { top: 48%; right: 11%; width: 13%; height: 26%; } /* Training Logs */
        #spot-va   { top: 75%; right: 11%; width: 13%; height: 18%; } /* VA Code */

        .module { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #001a00; z-index: 200; color: #c5a059; flex-direction: column; }
        .mod-header { background: #000; padding: 20px; border-bottom: 2px solid #c5a059; display: flex; justify-content: space-between; }
        .back-btn { background: #c5a059; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="photo-container">
    <div id="spot-med" class="hotspot" onclick="openMod('med-mod')"></div>
    <div id="spot-law" class="hotspot" onclick="openMod('law-mod')"></div>
    <div id="spot-narc" class="hotspot" onclick="alert('Narcotics Protocols Ready')"></div>
    <div id="spot-map" class="hotspot" onclick="alert('Tactical Map Loading...')"></div>
    <div id="spot-logs" class="hotspot" onclick="alert('Training Logs Ready')"></div>
    <div id="spot-va" class="hotspot" onclick="alert('VA Criminal Code Ready')"></div>
</div>

<div id="med-mod" class="module">
    <div class="mod-header"><span>K9 EMERGENCY SOS</span><button class="back-btn" onclick="closeMod('med-mod')">BACK</button></div>
    <div style="padding:20px; color:#fff;"><h2>Field Trauma Triage</h2><p>Immediate steps for heat and injury.</p></div>
</div>

<div id="law-mod" class="module">
    <div class="mod-header"><span>LEGAL SHIELD BIBLE</span><button class="back-btn" onclick="closeMod('law-mod')">BACK</button></div>
    <div style="padding:20px; color:#fff;"><h2>Graham v. Connor</h2><p>Objective reasonableness standard.</p></div>
</div>

<script>
    function openMod(id) { document.getElementById(id).style.display = 'flex'; }
    function closeMod(id) { document.getElementById(id).style.display = 'none'; }
</script>

</body>
</html>
