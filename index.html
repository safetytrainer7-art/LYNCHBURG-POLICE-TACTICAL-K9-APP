<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD COMMAND HUB</title>
    <style>
        :root { --gold: #c5a059; }
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }

        /* AUTO-ROTATE: Forces landscape layout even if phone is held vertically */
        @media screen and (orientation: portrait) {
            #app-frame {
                transform: rotate(90deg);
                width: 100vh;
                height: 56.25vh; /* Maintains 16:9 ratio */
            }
        }

        #app-frame {
            position: relative;
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh;
            background-image: url('homepage.png.png'), url('homepage.png'), url('homepage.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* TACTICAL HOTSPOTS - RED CALIBRATION BOXES */
        .hotspot { position: absolute; cursor: pointer; border: 2px solid red; z-index: 50; box-sizing: border-box; }
        
        /* Precision mapping to your gold icons */
        #spot-med  { top: 17%; left: 11.5%; width: 12%; height: 26%; } /* SOS */
        #spot-law  { top: 46%; left: 11.5%; width: 12%; height: 26%; } /* Legal */
        #spot-narc { top: 73%; left: 11.5%; width: 12%; height: 18%; } /* Narc */
        
        #spot-map  { top: 17%; right: 11.5%; width: 12%; height: 26%; } /* Map */
        #spot-logs { top: 46%; right: 11.5%; width: 12%; height: 26%; } /* Logs */
        #spot-va   { top: 73%; right: 11.5%; width: 12%; height: 18%; } /* VA Code */

        .module { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #001a00; z-index: 100; color: var(--gold); flex-direction: column; }
        .mod-header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; gap: 10px; }
        .back-btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div id="app-frame">
    <div id="spot-med" class="hotspot" onclick="openMod('med-mod')"></div>
    <div id="spot-law" class="hotspot" onclick="openMod('law-mod')"></div>
    <div id="spot-narc" class="hotspot" onclick="alert('Narcotics Detection Standards Active')"></div>
    <div id="spot-map" class="hotspot" onclick="alert('Launching Tactical Map...')"></div>
    <div id="spot-logs" class="hotspot" onclick="alert('Training Records: Active')"></div>
    <div id="spot-va" class="hotspot" onclick="alert('VA Criminal Code Loaded')"></div>
</div>

<div id="med-mod" class="module">
    <div class="mod-header"><button class="back-btn" onclick="closeMod('med-mod')">BACK</button><span>K9 EMERGENCY SOS</span></div>
    <div style="padding:20px; color:#fff;">
        <h2 style="color:var(--gold)">FIELD TRAUMA PROTOCOLS</h2>
        <ul>
            <li><strong>Heat Stress:</strong> Move to shade. Cool paws and groin with water.</li>
            <li><strong>Trauma:</strong> Apply direct pressure to wounds.</li>
        </ul>
    </div>
</div>

<div id="law-mod" class="module">
    <div class="mod-header"><button class="back-btn" onclick="closeMod('law-mod')">BACK</button><span>LEGAL SHIELD</span></div>
    <div style="padding:20px; color:#fff;">
        <h2 style="color:var(--gold)">Graham v. Connor</h2>
        <p>Standard for objective reasonableness in the use of force.</p>
    </div>
</div>

<script>
    function openMod(id) { document.getElementById(id).style.display = 'flex'; }
    function closeMod(id) { document.getElementById(id).style.display = 'none'; }
</script>

</body>
</html>
