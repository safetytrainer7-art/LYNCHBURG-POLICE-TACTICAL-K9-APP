<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSO K9 Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }

        /* USING YOUR IMAGE AS THE ACTUAL BACKGROUND */
        #homepage {
            width: 100vw; height: 100vh;
            background: url('https://files.oaiusercontent.com/file-K7m9XoH5BwA79NfJ3nB6Yp?se=2024-10-24T00%3A14%3A36Z&sp=r&sv=24.10.01&sr=b&rscc=max-age%3D604800%2C%20immutable%2C%20private&rscd=attachment%3B%20filename%3Dhomepage_2.jpg&sig=o3nLzN23G9GvNl9wZ0R9A1lE/pP9P6U%3D') no-repeat center center;
            background-size: 100% 100%;
            position: relative;
        }

        /* PLACING ICONS OVER THE RED SQUARE AREA */
        .icon-overlay {
            position: absolute;
            top: 57%; /* Aligning with the red box in your image */
            left: 50%;
            transform: translateX(-50%);
            width: 82%;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px 10px;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon-circle {
            width: 55px; height: 55px; border: 2px solid #d4af37; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6em; background: rgba(0,0,0,0.6); margin-bottom: 5px;
        }
        .nav-item span { 
            font-size: 0.62em; color: #d4af37; font-weight: bold; 
            text-align: center; width: 85px; line-height: 1.1; 
        }

        /* MODULE LAYERS */
        .module-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; }
        .nav-header { height: 60px; background: #0b2414; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #d4af37; }
        .exit-btn { background: #900; color: #fff; border: 1px solid #fff; padding: 8px 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="homepage">
    <div class="icon-overlay">
        <div class="nav-item" onclick="openModule('sos-layer')"><div class="icon-circle" style="border-color:#ff0000;">🏥</div><span>Emergency SOS</span></div>
        <div class="nav-item" onclick="openModule('gps-layer')"><div class="icon-circle">🗺️</div><span>Live GPS Map</span></div>
        <div class="nav-item" onclick="openModule('law-layer')"><div class="icon-circle">🔍</div><span>Narcotics Aids</span></div>
        <div class="nav-item" onclick="openModule('law-layer')"><div class="icon-circle">⚖️</div><span>Legal Shield</span></div>
        <div class="nav-item" onclick="openModule('log-layer')"><div class="icon-circle">📝</div><span>Training Logs</span></div>
        <div class="nav-item" onclick="openModule('law-layer')"><div class="icon-circle">🏛️</div><span>VA Code</span></div>
    </div>
</div>

<!-- GPS MODULE -->
<div id="gps-layer" class="module-layer">
    <div class="nav-header"><button class="exit-btn" onclick="closeModule('gps-layer')">BACK</button><span style="color:#d4af37;">TACTICAL GPS</span></div>
    <div id="map" style="width:100%; height:60%;"></div>
    <div style="padding:15px; background:#000; height:40%;">
        <div style="color:#00ff00; font-family:monospace; border:1px solid #00ff00; padding:10px; margin-bottom:10px;">
            CP DISTANCE: <span id="cp-val">0</span> YD<br>
            GAP DISTANCE: <span id="gap-val">0</span> YD
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button onclick="setMode('blue')" style="background:blue; color:#fff; padding:15px; font-weight:bold; border:none;">OFFICER</button>
            <button onclick="setMode('green')" style="background:green; color:#fff; padding:15px; font-weight:bold; border:none;">K9 UNIT</button>
        </div>
    </div>
</div>

<!-- EMERGENCY SOS MODULE -->
<div id="sos-layer" class="module-layer">
    <div class="nav-header"><button class="exit-btn" onclick="closeModule('sos-layer')">BACK</button><span style="color:#d4af37;">DUTY MEDICAL</span></div>
    <div style="padding:20px;">
        <button style="width:100%; padding:25px; background:#900; color:#fff; font-weight:bold; border:2px solid #fff; margin-bottom:20px;" onclick="shout('Commencing K9 CPR. Thirty compressions to two breaths.')">K9 CPR AUDIO GUIDE</button>
        <button style="width:100%; padding:25px; background:#1a3c2a; color:#d4af37; font-weight:bold; border:2px solid #d4af37;" onclick="shout('Trauma protocol. Apply pressure. Check for shock.')">TRAUMA AUDIO GUIDE</button>
    </div>
</div>

<!-- DATA MODULES -->
<div id="law-layer" class="module-layer"><div class="nav-header"><button class="exit-btn" onclick="closeModule('law-layer')">BACK</button><span>LEGAL VA CODE</span></div></div>
<div id="log-layer" class="module-layer"><div class="nav-header"><button class="exit-btn" onclick="closeModule('log-layer')">BACK</button><span>TRAINING LOGS</span></div></div>

<script>
    var map, lastPos, currentMode = 'blue';

    function openModule(id) {
        document.getElementById(id).style.display = 'block';
        if (id === 'gps-layer' && !map) {
            map = L.map('map', {zoomControl: false}).setView([37.58, -79.05], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            map.on('click', function(e) {
                L.circleMarker(e.latlng, {radius: 12, fillColor: currentMode, color: '#fff', weight: 2, fillOpacity: 0.9}).addTo(map);
                if(lastPos) document.getElementById('gap-val').innerText = Math.round(e.latlng.distanceTo(lastPos) * 1.09361);
                lastPos = e.latlng;
            });
        }
    }

    function closeModule(id) { document.getElementById(id).style.display = 'none'; window.speechSynthesis.cancel(); }
    function setMode(m) { currentMode = m; }
    function shout(t) { window.speechSynthesis.cancel(); window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
</script>

</body>
</html>
