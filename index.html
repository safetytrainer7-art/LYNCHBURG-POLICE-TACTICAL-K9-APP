
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSO K9 Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Times New Roman', serif; overflow: hidden; }

        /* --- HOMEPAGE --- */
        #homepage {
            width: 100%; height: 100%;
            background: radial-gradient(circle, #001a11 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: absolute; z-index: 10;
        }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .app-icon {
            width: 115px; height: 115px; background: rgba(0,0,0,0.8); border: 2px solid #d4af37;
            border-radius: 15px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer; text-align: center;
        }
        .app-icon span { color: #d4af37; font-weight: bold; margin-top: 8px; font-size: 0.85em; }

        /* --- MODULE LAYERS --- */
        .module-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none;
        }
        .nav-header { 
            height: 60px; background: #000; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #d4af37;
        }
        .exit-btn { background: #900; color: #fff; border: 2px solid #fff; padding: 8px 12px; font-weight: bold; border-radius: 5px; cursor: pointer; }

        /* --- CONTENT AREAS --- */
        .content-scroll { padding: 15px; overflow-y: auto; height: calc(100% - 60px); padding-bottom: 50px; box-sizing: border-box; }
        
        /* --- LOG STYLING --- */
        .log-input { width: 100%; padding: 12px; background: #111; border: 1px solid #d4af37; color: #fff; margin-bottom: 10px; border-radius: 5px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 15px; background: #28a745; color: #fff; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .log-entry { background: #0a0a0a; border-left: 4px solid #d4af37; padding: 10px; margin-top: 15px; font-family: monospace; font-size: 0.8em; }

        /* --- MEDICAL STYLING --- */
        .med-card { background: #0a0a0a; border: 1px solid #d4af37; border-radius: 10px; padding: 20px; margin-bottom: 15px; }
        .med-card h2 { color: #d4af37; margin: 0 0 10px 0; border-bottom: 1px solid #333; }
        .speak-btn { background: #d4af37; color: #000; border: none; width: 100%; padding: 15px; font-weight: bold; border-radius: 5px; margin-top: 10px; cursor: pointer; }

        /* --- GPS STYLING --- */
        #map { width: 100%; height: 50%; border-bottom: 2px solid #d4af37; }
        .gps-controls { height: calc(50% - 60px); background: #001a11; padding: 10px; box-sizing: border-box; overflow-y: auto; }
        .hud-bar { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 8px; font-family: monospace; font-size: 0.8em; margin-bottom: 8px; display: flex; justify-content: space-around; }
        .btn-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .dot-btn { flex: 1; padding: 10px; font-weight: bold; border-radius: 4px; border: 2px solid transparent; color: #fff; font-size: 0.7em; text-align: center; }
        .active-dot { border-color: #fff; box-shadow: 0 0 8px #fff; }
    </style>
</head>
<body>

<!-- 1. HOMEPAGE -->
<div id="homepage">
    <div style="text-align:center; margin-bottom: 20px;">
        <h1 style="color: #d4af37; margin: 0; letter-spacing: 3px;">ACSO</h1>
        <p style="color: #666; margin: 5px 0;">K9 COMMAND INTERFACE</p>
    </div>
    <div class="app-grid">
        <div class="app-icon" onclick="openModule('gps-module')">
            <div style="font-size: 2.5em;">📡</div><span>TACTICAL GPS</span>
        </div>
        <div class="app-icon" onclick="openModule('med-module')">
            <div style="font-size: 2.5em;">🐕</div><span>K9 MEDICAL</span>
        </div>
        <div class="app-icon" onclick="openModule('log-module')">
            <div style="font-size: 2.5em;">📝</div><span>SEARCH LOGS</span>
        </div>
        <div class="app-icon" onclick="alert('Module Locked')">
            <div style="font-size: 2.5em;">🌬️</div><span>WIND/WX</span>
        </div>
        <div class="app-icon" onclick="alert('Module Locked')">
            <div style="font-size: 2.5em;">📻</div><span>RADIO CODES</span>
        </div>
        <div class="app-icon" onclick="alert('Settings Locked')">
            <div style="font-size: 2.5em;">⚙️</div><span>SETTINGS</span>
        </div>
    </div>
</div>

<!-- 2. SEARCH LOGS MODULE -->
<div id="log-module" class="module-layer">
    <div class="nav-header">
        <button class="exit-btn" onclick="closeModule('log-module')">EXIT TO HOME</button>
        <span style="color: #d4af37; font-weight: bold;">SEARCH LOGS</span>
    </div>
    <div class="content-scroll">
        <div style="background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333;">
            <label style="color: #d4af37; font-size: 0.8em;">DATE / TIME</label>
            <input type="text" id="log-time" class="log-input" placeholder="05/02/2026 - 10:00AM">
            
            <label style="color: #d4af37; font-size: 0.8em;">LOCATION / CASE #</label>
            <input type="text" id="log-loc" class="log-input" placeholder="Amherst - Rt 29 North">
            
            <label style="color: #d4af37; font-size: 0.8em;">ACTIVITY / FINDINGS</label>
            <textarea id="log-notes" class="log-input" style="height: 80px;" placeholder="K9 Track started at CP..."></textarea>
            
            <button class="save-btn" onclick="saveLog()">SUBMIT ENTRY</button>
        </div>
        
        <h3 style="color: #d4af37; border-bottom: 1px solid #d4af37; margin-top: 25px;">HISTORICAL LOGS</h3>
        <div id="log-display"></div>
    </div>
</div>

<!-- 3. K9 MEDICAL MODULE -->
<div id="med-module" class="module-layer">
    <div class="nav-header">
        <button class="exit-btn" onclick="closeModule('med-module')">EXIT TO HOME</button>
        <span style="color: #d4af37; font-weight: bold;">K9 FIRST AID</span>
    </div>
    <div class="content-scroll">
        <div class="med-card"><h2>K9 CPR</h2><p>100-120 compressions/min. 30:2 cycle.</p><button class="speak-btn" onclick="shout('K9 CPR Protocol active.')">🔊 VOICE GUIDE</button></div>
        <div class="med-card"><h2>TRAUMA</h2><p>Apply pressure. Use hemostatic gauze.</p><button class="speak-btn" onclick="shout('Trauma protocol active.')">🔊 VOICE GUIDE</button></div>
    </div>
</div>

<!-- 4. GPS MODULE -->
<div id="gps-module" class="module-layer">
    <div class="nav-header">
        <button class="exit-btn" onclick="closeModule('gps-module')">SHUT DOWN GPS</button>
        <span style="color: #d4af37; font-weight: bold;">FIELD GPS</span>
    </div>
    <div id="map"></div>
    <div class="gps-controls">
        <div class="hud-bar">
            <span>CP: <b id="cp-val">0</b> YD</span>
            <span>GAP: <b id="gap-val">0</b> YD</span>
        </div>
        <div class="btn-row">
            <input type="text" id="cp-input" style="flex:2; padding:10px; background:#000; color:#d4af37; border:1px solid #d4af37;" placeholder="CP Address...">
            <button onclick="initCP()" style="flex:1; background:#28a745; color:#fff; border:none; font-weight:bold;">SET CP</button>
        </div>
        <div class="btn-row">
            <div id="dot-blue" class="dot-btn" style="background:blue;" onclick="setMode('blue')">OFFICER</div>
            <div id="dot-red" class="dot-btn" style="background:red;" onclick="setMode('red')">SAR</div>
            <div id="dot-purple" class="dot-btn" style="background:purple;" onclick="setMode('purple')">SUBJECT</div>
        </div>
    </div>
</div>

<script>
    var map, cpPos, lastMarkerPos, currentMode = 'blue';

    function openModule(id) {
        document.getElementById(id).style.display = 'block';
        if (id === 'gps-module' && !map) {
            map = L.map('map', { zoomControl: false }).setView([37.58, -79.05], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            map.on('click', function(e) { dropUnit(e.latlng, currentMode); });
        }
    }

    function closeModule(id) { document.getElementById(id).style.display = 'none'; window.speechSynthesis.cancel(); }

    // --- LOG LOGIC ---
    function saveLog() {
        var time = document.getElementById('log-time').value;
        var loc = document.getElementById('log-loc').value;
        var notes = document.getElementById('log-notes').value;
        
        if(!loc || !notes) { alert("Please enter Location and Activity"); return; }
        
        var entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<strong>${time || 'CURRENT'}</strong><br>LOC: ${loc}<br>ACT: ${notes}`;
        
        document.getElementById('log-display').prepend(entry);
        
        // Clear inputs
        document.getElementById('log-loc').value = "";
        document.getElementById('log-notes').value = "";
        alert("Log Saved to Terminal");
    }

    // --- GPS LOGIC ---
    function setMode(m) {
        currentMode = m;
        document.querySelectorAll('.dot-btn').forEach(b => b.classList.remove('active-dot'));
        document.getElementById('dot-'+m).classList.add('active-dot');
    }

    function dropUnit(ll, color) {
        var marker = L.circleMarker(ll, {radius: 12, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9}).addTo(map);
        let cpDist = cpPos ? Math.round(ll.distanceTo(cpPos) * 1.09361) : 0;
        let gapDist = lastMarkerPos ? Math.round(ll.distanceTo(lastMarkerPos) * 1.09361) : 0;
        document.getElementById('cp-val').innerText = cpDist;
        document.getElementById('gap-val').innerText = gapDist;
        lastMarkerPos = ll;
    }

    async function initCP() {
        var val = document.getElementById('cp-input').value;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}`);
        const data = await res.json();
        if(data.length > 0) {
            cpPos = L.latLng(data[0].lat, data[0].lon);
            map.setView(cpPos, 16);
            L.marker(cpPos, {icon: L.divIcon({html: '<div style="background:white; padding:2px; border:2px solid #000; font-weight:bold;">CP</div>'})}).addTo(map);
        }
    }

    function shout(text) { window.speechSynthesis.cancel(); var u = new SpeechSynthesisUtterance(text); u.rate = 0.85; window.speechSynthesis.speak(u); }
</script>

</body>
</html>
