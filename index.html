<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD MISSION COMMAND V216</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #c5a059; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Times New Roman', serif; overflow: hidden; }
        
        /* THE NEW HOMEPAGE LAYER */
        #home { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; overflow: hidden; background: #000; }
        .hero-bg { width: 100%; height: 100%; object-fit: contain; }

        /* THE UI OVERLAY: GLASS CARDS LEFT & RIGHT */
        .ui-lanes {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: space-between;
            padding: 8% 4%;
            z-index: 1100;
        }

        .side-lane {
            width: 28%;
            height: 80%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        /* TACTICAL GLASS BUTTONS */
        .tactical-box {
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            color: var(--gold);
            box-shadow: 0 4px 10px #000;
            transition: transform 0.1s;
        }
        .tactical-box:active { transform: scale(0.95); background: var(--gold); color: #000; }

        /* ICONS & LABELS */
        .tactical-box .icon { font-size: 24px; display: block; margin-bottom: 5px; }
        .tactical-box .label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-shadow: 1px 1px 2px #000; }

        /* GPS UI (TRANSFERED) */
        #gps-page { position: absolute; width: 100%; height: 100%; z-index: 2000; background: #000; display: none; flex-direction: column; }
        .top-bar { background: #111; padding: 10px; border-bottom: 2px solid var(--gold); display: flex; gap: 8px; height: 70px; align-items: flex-end; }
        .back-btn { background: var(--gold); color: #000; border: none; padding: 10px; font-weight: 900; border-radius: 4px; }
        .addr-input { flex: 1; padding: 10px; background: #222; border: 1px solid var(--gold); color: #fff; border-radius: 4px; }
        .go-btn { background: #fff; font-weight: 900; padding: 10px; border-radius: 4px; border: none; }
        #map { flex: 1; width: 100%; }
        .cmd-panel { background: #111; border-top: 2px solid var(--gold); padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 25px; }
        .cmd-btn { padding: 18px 5px; font-weight: 900; border-radius: 6px; border: none; text-transform: uppercase; font-size: 12px; }
        .k9-dot { width: 22px; height: 22px; background: #0000FF; border: 3px solid #FFFFFF; border-radius: 50%; box-shadow: 0 0 10px #0000FF; }
    </style>
</head>
<body>

    <div id="home">
        <img src="homepage.jpg" class="hero-bg" alt="Official ACSD Homepage">
        
        <div class="ui-lanes">
            <div class="side-lane">
                <div class="tactical-box" onclick="openGPS()">
                    <span class="icon">📍</span>
                    <span class="label">TACTICAL GPS</span>
                </div>
                <div class="tactical-box" onclick="alert('Loading Legal Bible...')">
                    <span class="icon">⚖️</span>
                    <span class="label">LEGAL BIBLE</span>
                </div>
                <div class="tactical-box" onclick="alert('Loading Training Logs...')">
                    <span class="icon">🐕</span>
                    <span class="label">K9 TRAINING</span>
                </div>
            </div>

            <div class="side-lane">
                <div class="tactical-box" onclick="alert('Loading First Aid...')">
                    <span class="icon">🚑</span>
                    <span class="label">K9 FIRST AID</span>
                </div>
                <div class="tactical-box" onclick="alert('Loading Reports...')">
                    <span class="icon">📝</span>
                    <span class="label">INCIDENT RPT</span>
                </div>
                <div class="tactical-box" onclick="alert('Loading Settings...')">
                    <span class="icon">⚙️</span>
                    <span class="label">SETTINGS</span>
                </div>
            </div>
        </div>
    </div>

    <div id="gps-page">
        <div class="top-bar">
            <button class="back-btn" onclick="closeGPS()">MENU</button>
            <input type="text" id="target" class="addr-input" placeholder="Search Address...">
            <button class="go-btn" onclick="searchAddress()">GO</button>
        </div>
        <div id="map"></div>
        <div class="cmd-panel">
            <button class="cmd-btn" style="background:#0000FF; color:#fff;" onclick="findMe()">SHOW POSITION</button>
            <button class="cmd-btn" style="background:#cc0000; color:#fff;" onclick="drawPerimeter()">SET PERIMETER</button>
            <button class="cmd-btn" style="background:#333; color:var(--gold); grid-column: span 2;" onclick="resetMap()">RESET AMHERST</button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, userMarker, perimeter;

    function openGPS() {
        document.getElementById('home').style.display = 'none';
        document.getElementById('gps-page').style.display = 'flex';
        if(!map) { setTimeout(initMap, 300); }
    }

    function closeGPS() {
        document.getElementById('gps-page').style.display = 'none';
        document.getElementById('home').style.display = 'block';
    }

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([37.5853, -79.0514], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }

    function findMe() {
        navigator.geolocation.getCurrentPosition((pos) => {
            const myLoc = [pos.coords.latitude, pos.coords.longitude];
            const icon = L.divIcon({ html: '<div class="k9-dot"></div>', className: '', iconSize: [22, 22] });
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(myLoc, { icon: icon }).addTo(map);
            map.setView(myLoc, 17);
        }, (err) => alert("GPS Lost"), { enableHighAccuracy: true });
    }

    async function searchAddress() {
        const query = document.getElementById('target').value;
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
        const data = await response.json();
        if (data.length > 0) {
            const loc = [data[0].lat, data[0].lon];
            L.marker(loc).addTo(map);
            map.setView(loc, 17);
        }
    }

    function drawPerimeter() {
        if (perimeter) map.removeLayer(perimeter);
        perimeter = L.circle(map.getCenter(), { color: '#FF0000', radius: 500, weight: 6, fillOpacity: 0.1 }).addTo(map);
        alert("500 Meter Perimeter Lock.");
    }

    function resetMap() { map.setView([37.5853, -79.0514], 14); }
</script>
</body>
</html>
