
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LPD K-9 TACTICAL COMMAND</title>
    <style>
        :root { 
            --lpd-blue: #002d62; 
            --neon: #00ff66; 
            --gold: #d4af37; 
            --glass: rgba(0, 10, 20, 0.95); 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; font-family: 'Segoe UI', Arial, sans-serif; 
            color: white; overflow: hidden; 
        }

        /* BACKGROUND & GLOW */
        .app-container {
            position: relative;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at 50% 20%, #001a33 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER SECTION */
        .header {
            width: 100%; padding: 45px 0 15px 0; text-align: center;
            border-bottom: 2px solid var(--lpd-blue);
            background: rgba(0, 45, 98, 0.2);
        }
        .header h1 { color: white; letter-spacing: 5px; font-size: 24px; margin: 0; }
        .header p { color: var(--neon); font-size: 10px; font-weight: bold; letter-spacing: 2px; margin-top: 5px; }

        /* THE LIVE SCANNER GRID (THE "WOW" FACTOR) */
        .overwatch-view {
            width: 90%; height: 35%;
            margin: 20px 0;
            background: rgba(0, 255, 102, 0.05);
            border: 1px solid var(--neon);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .moving-grid {
            position: absolute; width: 200%; height: 200%;
            background-image: linear-gradient(rgba(0,255,102,0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,102,0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: move 20s linear infinite;
        }
        @keyframes move { from { transform: translate(-40px, -40px); } to { transform: translate(0, 0); } }

        /* FLOATING ACTION BUTTONS */
        .button-grid {
            width: 92%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px;
        }
        .tactical-btn {
            background: var(--glass);
            border: 1px solid var(--lpd-blue);
            border-top: 3px solid var(--neon);
            padding: 22px 5px;
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .tactical-btn:active { background: #111; transform: translateY(2px); }
        .tactical-btn span { display: block; font-size: 32px; margin-bottom: 8px; }
        .tactical-btn label { color: var(--gold); font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* OVERLAY PANEL (FOR DATA) */
        #data-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 100; padding: 50px 20px; box-sizing: border-box;
        }
        .panel-content { border: 1px solid var(--gold); padding: 20px; border-radius: 10px; background: #0a0a0a; }
        .close-btn { color: #ff3b30; font-weight: bold; margin-top: 30px; text-align: center; font-size: 14px; letter-spacing: 2px; }

        .footer { font-size: 9px; color: #555; margin-bottom: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>K-9 GUARDIAN</h1>
        <p>LYNCHBURG PD // TACTICAL COMMAND</p>
    </div>

    <div class="overwatch-view">
        <div class="moving-grid"></div>
        <div style="z-index: 5; text-align: center; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;">
            <div style="color:var(--neon); font-size: 12px; font-weight: bold;">[ TRACKING ACTIVE ]</div>
            <div style="font-size: 9px; opacity: 0.7; margin-top: 4px;">SYNCING WITH PERIMETER UNITS</div>
        </div>
    </div>

    <div class="button-grid">
        <div class="tactical-btn" onclick="showData('Legal')">
            <span>⚖️</span>
            <label>Case Law</label>
        </div>
        <div class="tactical-btn" onclick="showData('Troops')">
            <span>🛡️</span>
            <label>Troop Sync</label>
        </div>
        <div class="tactical-btn" onclick="showData('Medical')">
            <span>🐕‍🦺</span>
            <label>K9 Med</label>
        </div>
        <div class="tactical-btn" onclick="showData('Log')">
            <span>📝</span>
            <label>Deployment Log</label>
        </div>
    </div>

    <div class="footer">SYSTEM BY EARL WOOD // ACSD SOLUTIONS</div>
</div>

<div id="data-panel">
    <div class="panel-content" id="panel-body"></div>
    <div class="close-btn" onclick="hideData()">[ CLOSE DATA PORTAL ]</div>
</div>

<script>
    const tacticalData = {
        'Legal': '<h2 style="color:var(--gold)">VA K9 CASE LAW</h2><ul style="line-height:1.6"><li><b>FL v. Harris:</b> Training records are key to reliability.</li><li><b>Rodriguez v. US:</b> Stop cannot be extended for dog.</li><li><b>US v. Place:</b> Sniff is not a Fourth Amendment search.</li></ul>',
        'Troops': '<h2 style="color:var(--gold)">LIVE PERIMETER</h2><p><b>Unit 402:</b> Point Position (Active)</p><p><b>Unit 109:</b> Perimeter South</p><p><b>Command:</b> Monitoring Live Feed</p>',
        'Medical': '<h2 style="color:var(--gold)">K9 FIELD MEDIC</h2><p><b>BLOAT:</b> Critical emergency. Immediate transport.</p><p><b>HEAT:</b> Apply water to belly/paws. Do not use ice.</p><p><b>NARC EXPOSURE:</b> Administer Naloxone if K9 lethargic.</p>',
        'Log': '<h2 style="color:var(--gold)">DEPLOYMENT LOG</h2><p>GPS Location: Lynchburg, VA</p><p>Track Duration: 14m 22s</p><p>Surface: Wooded/Rural</p><p>Status: Record Finalized</p>'
    };

    function showData(key) {
        document.getElementById('panel-body').innerHTML = tacticalData[key];
        document.getElementById('data-panel').style.display = 'block';
    }

    function hideData() {
        document.getElementById('data-panel').style.display = 'none';
    }
</script>

</body>
</html>
