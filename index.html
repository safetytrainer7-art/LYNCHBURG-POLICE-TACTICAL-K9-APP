
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAR TACTICAL - ALPHA ONE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --sar-orange: #ff4500; --topo-green: #2e8b57; --water-blue: #1e90ff; --gold: #ffd700; }
        body, html { margin: 0; padding: 0; height: 100%; background: #0b1a0b; font-family: 'Courier New', monospace; overflow: hidden; }

        /* SAR HUD */
        .sar-header { background: #000; padding: 45px 15px 10px; border-bottom: 3px solid var(--sar-orange); z-index: 2000; position: relative; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .info-cell { background: #1a1a1a; border: 1px solid var(--sar-orange); color: var(--sar-orange); padding: 5px; text-align: center; font-size: 10px; font-weight: bold; }
        
        #map { flex-grow: 1; width: 100%; height: calc(100vh - 160px); z-index: 1; }

        /* TEAM LIST (LIVE) */
        .team-hud { position: absolute; right: 10px; top: 180px; width: 120px; background: rgba(0,0,0,0.85); border-left: 3px solid var(--sar-orange); padding: 10px; z-index: 2000; color: #fff; font-size: 10px; border-radius: 0 5px 5px 0; }
        .member-stat { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .member-stat span { color: var(--gold); }

        /* SAR ACTION BAR */
        .sar-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 15px; background: #000; z-index: 2000; border-top: 3px solid var(--sar-orange); }
        .sar-btn { background: #1a1a1a; border: 1px solid var(--sar-orange); padding: 12px 0; border-radius: 5px; color: #fff; text-align: center; font-weight: bold; font-size: 11px; cursor: pointer; }
        .found-btn { background: var(--sar-orange); color: #fff; grid-column: span 4; margin-top: 10px; padding: 18px; border-radius: 8px; font-size: 18px; border: none; font-weight: 900; }
    </style>
</head>
<body>

<div class="sar-header">
    <div class="grid-info">
        <div class="info-cell">COORD: <span id="lat-lon">---</span></div>
        <div class="info-cell">ELEV: <span id="elev-val">340ft</span></div>
        <div class="info-cell">TEAM: <span id="team-count">1 (YOU)</span></div>
    </div>
</div>

<div id="map"></div>

<div class="team-hud">
    <b>TEAM LIVE</b>
    <div id="team-list">
        <div class="member-stat">Unit 1: <span>ACTIVE</span></div>
    </div>
</div>

<div class="sar-bar">
    <div class="sar-btn" onclick="toggleBreadcrumbs()">TRAIL: ON</div>
    <div class="sar-btn" onclick="map.locate({setView:true})">RE-CENTER</div>
    <div class="sar-btn" onclick="addMarker('POI')">+ POI</div>
    <div class="sar-btn" onclick="addMarker('SIGN')">+ SIGN</div>
    <button class="found-btn" onclick="triggerFound()">PATIENT LOCATED</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. TOPOGRAPHIC MAP ENGINE
    var map = L.map('map', { zoomControl: false }).setView([37.4137, -79.1422], 16);
    
    // Using OpenTopoMap for wilderness detail
    L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        maxZoom: 17,
        attribution: 'SAR Tactical Alpha'
    }).addTo(map);

    // 2. LIVE BREADCRUMB LOGIC
    var trail = [];
    var polyline = L.polyline([], {color: '#ffff00', weight: 3, opacity: 0.7, dashArray: '5, 10'}).addTo(map);
    
    // 3. TEAM POSITIONS (MOCKED FOR ALPHA - THIS IS WHERE FIREBASE GOES)
    var myMarker = L.circleMarker([0,0], { color: '#fff', fillColor: '#ff4500', fillOpacity: 1, radius: 10, weight: 3 }).addTo(map);
    myMarker.bindTooltip("<b>SAR-1 (YOU)</b>", {permanent: true, direction: 'top'});

    function onLocationUpdate(p) {
        var lat = p.coords.latitude;
        var lon = p.coords.longitude;
        var newPos = [lat, lon];
        
        myMarker.setLatLng(newPos);
        document.getElementById('lat-lon').innerText = lat.toFixed(4) + "," + lon.toFixed(4);
        
        // Add to breadcrumb trail
        trail.push(newPos);
        polyline.setLatLngs(trail);
    }

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(onLocationUpdate, null, { enableHighAccuracy: true });
    }

    // 4. SAR SPECIFIC TOOLS
    function addMarker(type) {
        var center = map.getCenter();
        var color = (type == 'POI') ? 'blue' : 'red';
        var m = L.circleMarker(center, { color: color, radius: 8 }).addTo(map);
        m.bindPopup("<b>" + type + " FOUND</b><br>Time: " + new Date().toLocaleTimeString()).openPopup();
    }

    function triggerFound() {
        alert("SEARCH SUSPENDED: COORDINATES BROADCAST TO ALL UNITS");
        document.body.style.background = "red";
        setTimeout(() => { document.body.style.background = "#0b1a0b"; }, 2000);
    }

    function toggleBreadcrumbs() {
        if(map.hasLayer(polyline)) { map.removeLayer(polyline); }
        else { polyline.addTo(map); }
    }
</script>
</body>
</html>
