
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD INTERCEPTOR - V110</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --og: #ff6600; --gd: #ffd700; --nv: #00ff44; }
        body, html { margin:0; padding:0; background:#000; color:#fff; font-family:sans-serif; height:100%; overflow:hidden; }
        #map { flex-grow:1; width:100%; height: 80vh; }
        .hdr { background:#001a00; border-bottom:2px solid var(--og); padding:10px; text-align:center; color:var(--gd); font-weight:bold; font-size:12px; }
        #dist-hud { background: #111; color: var(--nv); padding: 8px; font-size: 14px; text-align: center; border-top: 1px solid var(--og); font-family: monospace; font-weight:bold; }
        .tool-bar { background:#1a1a1a; display:grid; grid-template-columns:repeat(5,1fr); padding:10px; gap:5px; }
        .t-btn { background:#333; padding:15px 0; text-align:center; border-radius:4px; font-size:24px; border:1px solid #555; }
        .t-btn.active { background: #002200; border-color: var(--nv); }
        .nav-btn { background:var(--og); color:#fff; padding:15px; text-align:center; font-weight:bold; text-decoration:none; display:block; margin:5px; border-radius:5px; }
        .gps-beacon { width: 14px; height: 14px; background: #007bff; border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 20px #007bff; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="hdr">ACSD INTERCEPTOR • FIELD GPS MODULE</div>
    <div id="map"></div>
    <div id="dist-hud">GPS STATUS: STANDBY</div>
    <div class="tool-bar">
        <div id="b-k9" class="t-btn" onclick="sm('k9')">🐕</div>
        <div id="b-leo" class="t-btn" onclick="sm('leo')">👮</div>
        <div id="b-per" class="t-btn" onclick="sm('per')">🔴</div>
        <div id="b-sus" class="t-btn" onclick="sm('sus')">👤</div>
        <div class="t-btn" onclick="startLiveTrack()">🛰️</div>
    </div>
    <a href="vault.html" class="nav-btn">OPEN THE VAULT (LEGAL/MED/REPORTS)</a>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map, mode, line, pts=[], userMarker, watchID, officerMarkers = [];
    map = L.map('map',{zoomControl:false}).setView([37.584, -79.052], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    line = L.polyline([],{color:'red',weight:4,dashArray:'10,10'}).addTo(map);

    function startLiveTrack(){
        if(navigator.geolocation){
            navigator.geolocation.getCurrentPosition(p=>{
                var pos = [p.coords.latitude, p.coords.longitude];
                map.setView(pos, 18);
            });
            watchID = navigator.geolocation.watchPosition(p => {
                var pos = [p.coords.latitude, p.coords.longitude];
                if(!userMarker){
                    userMarker = L.marker(pos, {icon: L.divIcon({className: 'gps-beacon', iconSize:[14,14]})}).addTo(map);
                } else { userMarker.setLatLng(pos); }
                calcDist();
            }, null, {enableHighAccuracy:true, maximumAge:0});
            document.getElementById('dist-hud').innerText = "GPS ACTIVE - TRACKING";
        }
    }

    map.on('click', function(e){
        if(!mode) return;
        if(mode==='per'){ pts.push(e.latlng); line.setLatLngs(pts); L.circleMarker(e.latlng,{radius:5,color:'red'}).addTo(map); }
        else { 
            var m = L.marker(e.latlng,{icon:L.divIcon({html:{'k9':'🐕','leo':'👮','sus':'👤'}[mode],iconSize:[30,30],className:'m-ico'})}).addTo(map);
            if(mode === 'leo') officerMarkers.push(m);
        }
        calcDist();
    });

    function calcDist(){
        if(!userMarker || officerMarkers.length === 0) return;
        var uPos = userMarker.getLatLng();
        var text = "";
        officerMarkers.forEach((m, i) => {
            var d = uPos.distanceTo(m.getLatLng()) * 1.09361;
            text += `LEO ${i+1}: ${Math.round(d)}yd | `;
        });
        document.getElementById('dist-hud').innerHTML = text.slice(0, -3);
    }
    function sm(m){ mode=m; document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active')); document.getElementById('b-'+m).classList.add('active'); }
</script>
</body>
</html>
