
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 Command</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .app-screen {
            width: 100vw;
            height: 100vh;
            background: url('homepage.jpg') no-repeat center center;
            background-size: contain;
            position: relative;
        }
        /* This grid starts higher (top: 5%) to catch those top icons */
        .button-grid {
            position: absolute;
            top: 5%; 
            left: 0;
            width: 100%;
            height: 85%; 
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: repeat(4, 1fr); /* 4 rows gives us more precision */
        }
        .btn {
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-screen">
    <div class="button-grid">
        <!-- TOP ROW: Legal, Narcotics, Training -->
        <div class="btn" onclick="window.location.href='legal.html'"></div>
        <div class="btn" onclick="window.location.href='narcotics.html'"></div>
        <div class="btn" onclick="window.location.href='training.html'"></div>
        
        <!-- MIDDLE ROW: Emergency, GPS, Tactical -->
        <div class="btn" onclick="window.location.href='emergency.html'"></div>
        <div class="btn" onclick="alert('GPS Tracking: Coming Soon')"></div>
        <div class="btn" onclick="alert('Tactical Tracking: Coming Soon')"></div>

        <!-- LOWER MIDDLE: Catching any stray text clicks -->
        <div class="btn" onclick="window.location.href='emergency.html'"></div>
        <div class="btn" onclick="alert('GPS Tracking: Coming Soon')"></div>
        <div class="btn" onclick="alert('Tactical Tracking: Coming Soon')"></div>

        <!-- BOTTOM ROW -->
        <div class="btn" onclick="alert('Additional Tools Coming')"></div>
        <div class="btn" onclick="alert('Additional Tools Coming')"></div>
        <div class="btn" onclick="alert('Additional Tools Coming')"></div>
    </div>
</div>

</body>
</html>
