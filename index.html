<div id="m-map" class="page">
    <div class="header">
        <button class="back-btn" onclick="closePage('m-map')">← BACK</button>
        <h2 style="color:#c5a059; margin:0;">TACTICAL MAP HUB</h2>
    </div>

    <div style="background: #000; padding: 10px; border-bottom: 2px solid #c5a059;">
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="map-search" placeholder="ENTER SEARCH ADDRESS..." 
                   style="flex-grow: 1; padding: 12px; background: #111; color: #fff; border: 1px solid #c5a059; font-weight: bold;">
            <button onclick="searchAddr()" style="background: #c5a059; color: #000; border: none; padding: 10px; font-weight: bold;">GO</button>
        </div>

        <div style="display: flex; justify-content: space-around; margin-bottom: 10px;">
            <button class="tool-btn" onclick="setRole('le')">BLUE (LE)</button>
            <button class="tool-btn" onclick="setRole('k9')">LT BLUE (K9)</button>
            <button class="tool-btn" onclick="setRole('sar')">RED (SAR)</button>
            <button class="tool-btn" onclick="setRole('sub')">PURPLE (SUB)</button>
        </div>

        <button id="start-btn" onclick="startGps()" 
                style="width: 100%; background: #004400; color: #fff; border: 2px solid #00ff00; padding: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;">
            ▶ START LIVE TRACKING
        </button>
    </div>

    <div id="live-map" style="width: 100%; height: 50vh; background: #111; border-bottom: 2px solid #c5a059;"></div>

    <div style="display: flex; justify-content: space-between; padding: 15px; background: #000; color: #c5a059; font-family: monospace;">
        <div id="wind-dir">🚩 WIND: NORTH 8MPH</div>
        <div id="dist-check">DIST TO NEAREST: -- FT</div>
    </div>
    
    <div style="padding: 10px; display: flex; gap: 10px;">
        <button class="tool-btn" style="background: #444;" onclick="toggleNight()">NIGHT VISION</button>
        <button class="tool-btn" style="background: #600; color: white;" onclick="resetPerimeter()">RESET PERIMETER</button>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    .tool-btn { flex: 1; background: #1a1a1a; color: #c5a059; border: 1px solid #c5a059; padding: 10px 2px; font-size: 11px; font-weight: bold; border-radius: 4px; }
    .night-vision-map { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.2); }
</style>

<script>
    let map;
    let userMarker;
    
    // Initialize the map when the page opens
    function initMap() {
        if (!map) {
            map = L.map('live-map').setView([37.525, -79.15], 13); // Centered near Amherst
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }
    }

    // Override the openPage function to load the map
    const oldOpen = openPage;
    openPage = function(id) {
        oldOpen(id);
        if(id === 'm-map') {
            setTimeout(initMap, 300); // Give it a second to show the page first
        }
    }

    function startGps() {
        const btn = document.getElementById('start-btn');
        btn.innerHTML = "📡 TRACKING ACTIVE";
        btn.style.background = "#440000"; // Glow red when hot
        
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                
                if (userMarker) {
                    userMarker.setLatLng([lat, lng]);
                } else {
                    userMarker = L.circleMarker([lat, lng], { color: 'blue', radius: 10, fillOpacity: 0.8 }).addTo(map);
                }
                map.setView([lat, lng], 16);
            });
        }
    }

    function searchAddr() {
        let addr = document.getElementById('map-search').value;
        if(addr) {
            // Simple logic: In the real world, this calls a geocoder. 
            // For now, it alerts the team.
            alert("SEARCHING FOR: " + addr);
        }
    }

    function toggleNight() {
        document.getElementById('live-map').classList.toggle('night-vision-map');
    }
    
    function resetPerimeter() {
        if(confirm("CLEAR ALL TRACKING DATA?")) {
            location.reload();
        }
    }
</script>
