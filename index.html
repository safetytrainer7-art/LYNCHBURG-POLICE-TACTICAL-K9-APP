
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD SAR - TACTICAL V19</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --orange: #ff6600; --gold: #ffd700; --blue: #007bff; --live: #00ff00; --clue: #ff0000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        .header { background: #001a00; padding: 45px 15px 10px; border-bottom: 3px solid var(--orange); }
        .search-row { display: flex; gap: 5px; }
        .search-row input { flex-grow: 1; padding: 12px; border-radius: 4px; border: none; font-size: 16px; font-weight: bold; }
        
        #map { width: 100%; height: calc(100vh - 320px); background: #111; }

        /* TACTICAL LEGEND */
        .legend { 
            position: absolute; left: 10px; top: 200px; width: 200px; 
            background: rgba(0,0,0,0.95); border: 2px solid var(--gold); 
            padding: 12px; z-index: 2000; border-radius: 8px; font-size: 12px; 
        }
        .legend b { color: var(--orange); display: block; margin: 8px 0 4px 0; border-bottom: 1px solid #444; }
        .unit-stat { display: flex; justify-content: space-between; margin-bottom: 3px; font-family: monospace; }

        /* CLUE MARKER */
        .clue-icon { background: var(--clue); border: 2px solid white; border-radius: 50%; width: 12px; height: 12px; box-shadow: 0 0 10px red; }

        .toolbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 10px; background: #000; }
        .tool { background: #222; border: 1px solid #444; padding: 15px 0; border-radius: 6px; text-align: center; color: #fff; cursor: pointer; }
        .tool label { display: block; font-size: 8px; color: var(--gold); text-transform: uppercase; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="search-row">
        <input type="text" id="map-addr" placeholder="Enter Search Address, VA">
        <button onclick="deploySearch()" style="background:var(--orange); color:white; border:none; padding:10px; border-radius:4px; font-weight:bold;">DEPLOY</button>
    </div>
    <button onclick="setCommand()" style="width:100%; background:#004400; color:white; border:1px solid lime; padding:8px; font-size:11px; border-radius:4px; margin-top:5px;">LOCK COMMAND POST PULSE</button>
</div>

<div id="map"></div>

<div class="legend">
    <b>COMMAND STATUS</b>
    <div style="color:var(--live); font-weight:bold;">● SYSTEM ACTIVE</div>
    
    <b>UNIT DIRECTORY</b>
    <div class="unit-stat"><span>SAR-01 (CMD)</span><span style="color:var(--live);">LIVE</span></div>
    <div class="unit-stat"><span>K9-UNIT</span><span id="k9-count">IDLE</span></div>
    <div class="unit-stat"><span>GROUND-1</span><span id="g1-count">IDLE</span></div>
    
    <b>CLUES FOUND: <span id="clue-val" style="color:red;">0</span></b>
</div>

<div class="toolbar">
    <div class="tool" onclick="addUnit('yellow')"><span>🐕</span><label>Add K9</label></div>
    <div class="tool" onclick="addUnit('lime')"><span>🚶</span><label>Add Ground</label></div>
    <div class="tool" onclick="dropClue()"><span>🚩</span><label>Mark Clue</label></div>
    <div class="tool" onclick="location.reload()"><span>🔄</span><label>Reset</label></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false }).setView([37.5, -79.0], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Command Pulse Icon
    var cmdIcon = L.divIcon({ className: 'c', html: '<div style="width:20px; height:20px; background:#007bff; border:3px solid white; border-radius:50%; box-shadow:0 0 15px #007bff;"></div>', iconSize:[20,20] });

    function deploySearch() {
        var addr = document.getElementById('map-addr').value;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${addr}`)
            .then(r => r.json()).then(d => {
                if(d[0]) { map.setView([d[0].lat, d[0].lon], 17); L.marker([d[0].lat, d[0].lon]).addTo(map).bindPopup("PLS").openPopup(); }
            });
    }

    function setCommand() { L.marker(map.getCenter(), {icon: cmdIcon}).addTo(map); }

    function addUnit(color) {
        L.circleMarker(map.getCenter(), {radius: 8, color: 'white', fillColor: color, fillOpacity: 1}).addTo(map).bindPopup("UNIT DEPLOYED");
        if(color == 'yellow') document.getElementById('k9-count').innerText = "DEPLOYED";
        if(color == 'lime') document.getElementById('g1-count').innerText = "DEPLOYED";
    }

    var clueCount = 0;
    function dropClue() {
        clueCount++;
        L.circleMarker(map.getCenter(), {radius: 6, color: 'white', fillColor: 'red', fillOpacity: 1}).addTo(map).bindPopup("CLUE #" + clueCount);
        document.getElementById('clue-val').innerText = clueCount;
    }
</script>
</body>
</html>
