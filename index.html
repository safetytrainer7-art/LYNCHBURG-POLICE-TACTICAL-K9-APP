
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD RESTORED HUB</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            background: #000; overflow: hidden; 
            font-family: 'Georgia', serif;
        }

        #container {
            width: 100vw; height: 100vh;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* 1. THE NEW BADGE - TOP CENTER */
        #top-badge {
            position: absolute;
            top: 10px;
            width: 75px; height: 75px; 
            background-image: url('badge.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 100;
        }

        /* 2. THE CENTER APP IMAGE - RESTORED TO FULL STRENGTH */
        #center-image {
            width: 60%; height: 60%;
            background-image: url('homepage.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 1.0; /* Full brightness restored */
            z-index: 5;
        }

        /* 3. THE BUTTONS - SIDE COLUMNS */
        .side-col { 
            position: absolute; width: 20%; height: 70%; top: 15%; 
            display: flex; flex-direction: column; justify-content: space-around; z-index: 50; 
        }
        .left { left: 5%; }
        .right { right: 5%; }

        .btn {
            background: rgba(0, 40, 0, 0.9);
            border: 2px solid #c5a059;
            color: #c5a059;
            padding: 15px 5px;
            text-align: center; font-weight: bold; font-size: 14px;
            border-radius: 5px; cursor: pointer;
            text-transform: uppercase;
        }

        /* Content Pages */
        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #001a00; z-index: 200; overflow-y: auto; padding: 30px; color: #fff; }
        .header { border-bottom: 2px solid #c5a059; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .back-btn { background: #c5a059; color: #000; border: none; padding: 10px 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="container">
    <div id="top-badge"></div>

    <div id="center-image"></div>

    <div class="side-col left">
        <div class="btn" onclick="openP('sos')">K9 SOS</div>
        <div class="btn" onclick="openP('law')">Legal Bible</div>
        <div class="btn">Narcotics</div>
    </div>

    <div class="side-col right">
        <div class="btn">Tactical Map</div>
        <div class="btn">Training Logs</div>
        <div class="btn">VA Code</div>
    </div>
</div>

<div id="sos" class="page">
    <div class="header"><h2>K9 EMERGENCY SOS</h2><button class="back-btn" onclick="closeP('sos')">BACK</button></div>
    <p><strong>HEAT STRESS:</strong> Seek shade. Cool water on pads/ears.</p>
</div>

<div id="law" class="page">
    <div class="header"><h2>LEGAL SHIELD BIBLE</h2><button class="back-btn" onclick="closeP('law')">BACK</button></div>
    <h3>Case Law & Statutes</h3>
    <p><strong>Rodriguez v. US:</strong> Do not prolong the stop.</p>
</div>

<script>
    function openP(id) { document.getElementById(id).style.display = 'block'; }
    function closeP(id) { document.getElementById(id).style.display = 'none'; }
</script>

</body>
</html>
