
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD COMMAND V218</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #c5a059; --blue: #0000FF; --red: #FF0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }

        /* THE FOUNDATION: BACKGROUND IMAGE */
        #master-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('homepage.jpg') no-repeat center center;
            background-size: contain;
            display: block;
        }

        /* THE UI LANES: PURE CSS GRID FOR ALIGNMENT */
        .tactical-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: 30% 40% 30%;
            grid-template-rows: 1fr 1fr 1fr;
            padding: 10% 2%;
            z-index: 50;
        }

        /* BUTTON BOXES - PUSHED TO SIDES */
        .btn-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .action-box {
            width: 95%;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 20px 5px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 0 15px #000;
        }

        .action-box:active { background: var(--gold); }
        .action-box span { display: block; color: var(--gold); font-weight: 900; text-transform: uppercase; }
        .label { font-size: 10px; margin-top: 5px; letter-spacing: 1px; }
        .icon { font-size: 22px; }

        /* GPS OVERLAY */
        #gps-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .gps-header { background: #111; padding: 15px; border-bottom: 3px solid var(--gold); display: flex; gap: 10px; padding-top: 60px; }
        .input-field { flex: 1; padding: 12px; background: #222; border: 1px solid var(--gold); color: #fff; border-radius: 5px; }
        .go-btn { background: #fff; padding: 10px 20px; font-weight: 900; border-radius: 5px; border: none; }
        .back-btn { position: absolute; top: 10px; left: 10px; background: var(--gold); padding: 10px; font-weight: 900; border-radius: 5px; z-index: 1100; }

        #map-view { flex: 1; width: 100%; }

        .gps-footer { background: #111; border-top: 3px solid var(--gold); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 40px; }
        .footer-btn { padding: 20px; border-radius: 8px; font-weight: 900; border: none; color: #fff; text-transform: uppercase; }

        /* THE TARGET DOT */
        .k9-dot { width: 26px; height: 26px; background: var(--blue); border: 4px solid #fff; border-radius: 50%; box-shadow: 0 0 10px var(--blue); }
    </style>
</head>
<body>

    <div id="master-screen">
        <div class="tactical-grid">
            <div class="btn-cell"><div class="action-box" onclick="toggleGPS(true)"><span class="icon">📍</span><span class="label">GPS</span></div></div>
            <div class="btn-cell"></div> <div class="btn-cell"><div class="action-box" onclick="alert('LEGAL')"><span class="icon">⚖️</span><span class="label">LEGAL</span></div></div>

            <div class="btn-cell"><div class="action-box" onclick="alert('AID')"><span class="icon">🚑</span><span class="label">AID</span></div></div>
            <div class="btn-cell"></div> <div class="btn-cell"><div class="action-box" onclick="alert('TRAIN')"><span class="icon">🐕</span><span class="label">TRAIN</span></div></div>

            <div class="btn-cell"><div class="action-box" onclick="alert('RPT')"><span class="icon">📝</span><span class="label">REPORT</span></div></div>
            <div class="btn-cell"></div> <div class="btn-cell"><div class="action-box" onclick="alert('SET')"><span class="icon">⚙️</span><span class="label">SETTINGS</span></div></div>
        </div>
    </div>

    <div id="gps-overlay">
        <button class="back-btn" onclick="toggleGPS(false)">MENU</button>
        <div class="gps-header">
            <input type="text" id="search-box" class="input-field" placeholder="Target Address...">
            <button class="go-btn" onclick="runSearch()">GO</button>
        </div>
        <div id="map-view"></div>
        <div class="gps-footer">
            <button class="footer-btn" style="background:var(--blue);" onclick="trackMe()">MY POSITION</button>
            <button class="footer-btn" style="background:var(--red);" onclick="setPerim()">PERIMETER</button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, me, perim;

    function toggleGPS(show) {
        document.getElementById('gps-overlay').style.display = show ? 'flex' : 'none';
        if(show && !map) {
            setTimeout(() => {
                map = L.map('map-view', {zoomControl: false}).setView([37.5853, -79.0514], 14);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }, 300);
        }
    }

    function trackMe() {
        navigator.geolocation.getCurrentPosition(p => {
            const loc = [p.coords.latitude, p.coords.longitude];
            const icon = L.divIcon({html:'<div class="k9-dot"></div>', className:'', iconSize:[26,26]});
            if(me) map.removeLayer(me);
            me = L.marker(loc, {icon: icon}).addTo(map);
            map.setView(loc, 17);
        }, () => alert("GPS ERROR"), {enableHighAccuracy:true});
    }

    async function runSearch() {
        const q = document.getElementById('search-box').value;
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`);
        const d = await r.json();
        if(d[0]) {
            const loc = [d[0].lat, d[0].lon];
            L.marker(loc).addTo(map);
            map.setView(loc, 17);
        }
    }

    function setPerim() {
        if(perim) map.removeLayer(perim);
        perim = L.circle(map.getCenter(), {color:'red', radius:500, weight:8, fillOpacity:0.1}).addTo(map);
        alert("Perimeter Active");
    }
</script>
</body>
</html>
