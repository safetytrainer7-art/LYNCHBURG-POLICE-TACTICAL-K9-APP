
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSO K9 Field Terminal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Replicating the dark green textured background from your image */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b2414; color: #fff; font-family: 'Georgia', serif; overflow-x: hidden; }
        
        #homepage {
            width: 100%; min-height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            background-color: #0b2414;
            display: flex; flex-direction: column; align-items: center;
            position: absolute; z-index: 10;
            padding-bottom: 30px;
        }

        .header-section { text-align: center; padding-top: 15px; }
        .star-badge { font-size: 70px; margin-bottom: 5px; }
        
        .motto-row { display: flex; justify-content: space-between; width: 280px; margin: 0 auto; }
        .motto-tag { color: #d4af37; font-weight: bold; font-size: 1.1em; text-shadow: 1px 1px #000; }

        .title-banner { 
            background: #1a3c2a; color: #d4af37; padding: 12px 30px; 
            font-size: 1.4em; font-weight: bold; border: 1px solid #d4af37;
            margin: 15px 0; width: 85%; text-align: center; box-shadow: 2px 2px 5px #000;
        }

        .k9-portrait {
            width: 160px; height: 160px; border-radius: 50%;
            border: 4px solid #d4af37; background: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 90px; box-shadow: 0 0 15px #000; margin-bottom: 15px;
        }

        /* THE RED SQUARE NAVIGATION (Restored & Fixed) */
        .red-grid-container {
            border: 4px solid #ff0000; 
            background: rgba(18, 53, 36, 0.85);
            padding: 20px 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px 10px;
            width: 90%;
            max-width: 380px;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon-shell {
            width: 55px; height: 55px; border: 2px solid #d4af37; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6em; background: rgba(0,0,0,0.4); margin-bottom: 5px;
        }
        /* Fixed: Made labels smaller to prevent crowding */
        .nav-item span { font-size: 0.65em; color: #d4af37; font-weight: bold; text-align: center; width: 85px; line-height: 1.1; }

        .signature-footer {
            background: #000; color: #d4af37; width: 100%; text-align: center;
            padding: 15px 0; margin-top: auto; font-weight: bold; font-size: 1em;
            border-top: 1px solid #d4af37; letter-spacing: 1px;
        }

        /* MODULES */
        .module-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; }
        .nav-bar { height: 60px; background: #1a3c2a; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #d4af37; }
        .back-btn { background: #900; color: #fff; border: 1px solid #fff; padding: 8px 12px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<div id="homepage">
    <div class="header-section">
        <div class="star-badge">⭐</div>
        <div class="motto-row">
            <div class="motto-tag">TO PROTECT</div>
            <div class="motto-tag">TO SERVE</div>
        </div>
    </div>

    <div class="title-banner">CANINE SEARCH & RESCUE</div>

    <div class="k9-portrait">🐕</div>

    <div class="red-grid-container">
        <!-- ALL ICONS ACTIVATED -->
        <div class="nav-item" onclick="openModule('sos-layer')"><div class="icon-shell" style="border-color:#ff0000;">🏥</div><span>Emergency SOS</span></div>
        <div class="nav-item" onclick="openModule('gps-layer')"><div class="icon-shell">🗺️</div><span>Live GPS Map</span></div>
        <div class="nav-item" onclick="openModule('med-layer')"><div class="icon-shell">🔍</div><span>Narcotics Aids</span></div>
        <div class="nav-item" onclick="openModule('law-layer')"><div class="icon-shell">⚖️</div><span>Legal Shield</span></div>
        <div class="nav-item" onclick="openModule('log-layer')"><div class="icon-shell">📝</div><span>Training Logs</span></div>
        <div class="nav-item" onclick="openModule('law-layer')"><div class="icon-shell">🏛️</div><span>VA Code</span></div>
    </div>

    <div class="signature-footer">RETIRED DEPUTY SHERIFF EARL WOOD</div>
</div>

<!-- GPS LAYER -->
<div id="gps-layer" class="module-layer">
    <div class="nav-bar"><button class="back-btn" onclick="closeModule('gps-layer')">BACK</button><span style="color:#d4af37;">TACTICAL GPS</span></div>
    <div id="map" style="width:100%; height:60%;"></div>
    <div style="padding:15px; background:#000; height:40%;">
        <div style="color:#00ff00; font-family:monospace; border:1px solid #00ff00; padding:10px; margin-bottom:10px;">
            CP DISTANCE: <span id="cp-val">0</span> YD<br>
            GAP DISTANCE: <span id="gap-val">0</span> YD
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button onclick="setMode('blue')" style="background:blue; color:#fff; padding:15px; font-weight:bold; border:none;">OFFICER</button>
            <button onclick="setMode('green')" style="background:green; color:#fff; padding:15px; font-weight:bold; border:none;">K9 UNIT</button>
        </div>
    </div>
</div>

<!-- SOS/MEDICAL LAYER -->
<div id="sos-layer" class="module-layer">
    <div class="nav-bar"><button class="back-btn" onclick="closeModule('sos-layer')">BACK</button><span style="color:#d4af37;">EMERGENCY SOS</span></div>
    <div style="padding:20px;">
        <button style="width:100%; padding:25px; background:#900; color:#fff; font-weight:bold; border:2px solid #fff; margin-bottom:20px;" onclick="shout('Commencing K9 CPR. Thirty compressions to two breaths.')">K9 CPR AUDIO GUIDE</button>
        <button style="width:100%; padding:25px; background:#1a3c2a; color:#d4af37; font-weight:bold; border:2px solid #d4af37;" onclick="shout('Trauma protocol. Apply direct pressure. Check for shock.')">TRAUMA AUDIO GUIDE</button>
    </div>
</div>

<!-- PLACEHOLDERS FOR REMAINING MODULES -->
<div id="med-layer" class="module-layer"><div class="nav-bar"><button class="back-btn" onclick="closeModule('med-layer')">BACK</button><span>NARCOTICS AIDS</span></div></div>
<div id="law-layer" class="module-layer"><div class="nav-bar"><button class="back-btn" onclick="closeModule('law-layer')">BACK</button><span>LEGAL / VA CODE</span></div></div>
<div id="log-layer" class="module-layer"><div class="nav-bar"><button class="back-btn" onclick="closeModule('log-layer')">BACK</button><span>TRAINING LOGS</span></div></div>

<script>
    var map, lastPos, currentMode = 'blue';

    function openModule(id) {
        document.getElementById(id).style.display = 'block';
        if (id === 'gps-layer' && !map) {
            map = L.map('map', {zoomControl: false}).setView([37.58, -79.05], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            map.on('click', function(e) {
                L.circleMarker(e.latlng, {radius: 12, fillColor: currentMode, color: '#fff', weight: 2, fillOpacity: 0.9}).addTo(map);
                if(lastPos) document.getElementById('gap-val').innerText = Math.round(e.latlng.distanceTo(lastPos) * 1.09361);
                lastPos = e.latlng;
            });
        }
    }

    function closeModule(id) { document.getElementById(id).style.display = 'none'; window.speechSynthesis.cancel(); }
    function setMode(m) { currentMode = m; }
    function shout(t) { window.speechSynthesis.cancel(); window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
</script>

</body>
</html>
