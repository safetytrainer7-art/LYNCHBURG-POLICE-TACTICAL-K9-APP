<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 Command - ACSO TACTICAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: #fff; font-family: 'Times New Roman', serif; overflow: hidden; }
        
        /* THE MAP */
        #map { width: 100%; height: 55%; border-bottom: 4px solid #d4af37; background: #111; z-index: 1; }

        /* RETURN ARROW */
        .nav-header { 
            position: absolute; top: 0; left: 0; width: 100%; height: 60px; 
            background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; padding: 0 15px;
            border-bottom: 1px solid #d4af37;
        }
        .back-btn { color: #d4af37; font-size: 1.5em; cursor: pointer; text-decoration: none; font-weight: bold; }

        /* TACTICAL HUD - FLOATING OVER MAP */
        .hud { 
            position: absolute; top: 70px; right: 10px; z-index: 1000; 
            background: rgba(0,26,17,0.8); border: 1px solid #d4af37; padding: 10px; border-radius: 5px;
            pointer-events: none; text-align: center; min-width: 100px;
        }
        .wind-arrow { font-size: 2em; color: #ff0000; display: block; transition: transform 0.5s; }

        /* COMMAND PANEL */
        .command-panel { 
            width: 100%; height: 45%; background: #001a11; padding: 15px; 
            box-sizing: border-box; overflow-y: auto; z-index: 5;
        }

        .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .go-btn { flex: 2; background: #28a745; color: white; padding: 12px; font-weight: bold; border: none; border-radius: 4px; }
        .perim-btn { flex: 1; background: #ff8c00; color: white; padding: 12px; font-weight: bold; border: none; border-radius: 4px; }

        .asset-selector { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; border: 1px solid #d4af37; border-radius: 4px; }
        .mode-btn { padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.75em; border: 2px solid transparent; text-align: center; }
        .active-mode { border-color: #fff; box-shadow: 0 0 8px #fff; }

        .stats-bar { display: flex; justify-content: space-between; margin-top: 10px; background: #000; padding: 10px; border: 1px solid #444; font-size: 0.9em; color: #00ff00; }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="back-btn" onclick="window.location.reload()">← RETURN TO HOME</div>
</div>

<div class="hud">
    <small>WIND</small>
    <div id="wind" class="wind-arrow">↑</div>
    <small id="compass">NW 315°</small>
</div>

<div id="map"></div>

<div class="command-panel">
    <div class="btn-row">
        <input type="text" id="targetAddr" style="flex:3; padding:10px;" placeholder="Search Address...">
        <button class="go-btn" onclick="executeSearch()">INITIALIZE</button>
    </div>

    <div class="btn-row">
        <button class="perim-btn" onclick="setMode('perimeter')">PLACE PERIMETER POINT</button>
        <button class="perim-btn" style="background:#555;" onclick="clearPerimeter()">CLEAR PERIMETER</button>
    </div>

    <div class="asset-selector">
        <div id="btn-blue" class="mode-btn" style="background:blue;" onclick="setMode('blue')">OFFICER</div>
        <div id="btn-red" class="mode-btn" style="background:red;" onclick="setMode('red')">SAR</div>
        <div id="btn-green" class="mode-btn" style="background:green;" onclick="setMode('green')">CIVILIAN</div>
        <div id="btn-purple" class="mode-btn" style="background:purple;" onclick="setMode('purple')">SUBJECT</div>
    </div>

    <div class="stats-bar">
        <span>DIST TO CP: <span id="dist-cp">0</span> YDS</span>
        <span>UNIT GAP: <span id="dist-gap">0</span> YDS</span>
    </div>
</div>

<script>
    var map = L.map('map', { zoomControl: false }).setView([37.58, -79.05], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var currentMode = 'blue';
    var perimeterPoints = [];
    var perimeterPolygon = null;
    var commandPostPos = null;

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active-mode'));
        if(mode !== 'perimeter') {
            document.getElementById('btn-' + mode).classList.add('active-mode');
        }
    }

    // FIX: Taps now work everywhere, even inside polygons
    map.on('click', function(e) {
        if (currentMode === 'perimeter') {
            addPerimeterPoint(e.latlng);
        } else {
            dropMarker(e.latlng, currentMode);
        }
    });

    function addPerimeterPoint(latlng) {
        perimeterPoints.push([latlng.lat, latlng.lng]);
        if (perimeterPolygon) map.removeLayer(perimeterPolygon);
        
        if (perimeterPoints.length >= 3) {
            perimeterPolygon = L.polygon(perimeterPoints, {
                color: '#ff8c00', weight: 3, fillOpacity: 0.2, interactive: false // INTERACTIVE FALSE is key
            }).addTo(map);
        }
        L.circleMarker(latlng, {radius: 4, color: '#ff8c00', interactive: false}).addTo(map);
    }

    function dropMarker(latlng, color) {
        var m = L.circleMarker(latlng, {
            radius: 12, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9
        }).addTo(map);

        // Update Distance HUD
        if(commandPostPos) {
            var d = latlng.distanceTo(commandPostPos) * 1.09361; // Meters to Yards
            document.getElementById('dist-cp').innerText = Math.round(d);
        }
    }

    function clearPerimeter() {
        if (perimeterPolygon) map.removeLayer(perimeterPolygon);
        perimeterPoints = [];
        setMode('blue');
    }

    async function executeSearch() {
        var val = document.getElementById('targetAddr').value;
        const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}`);
        const data = await resp.json();
        if(data.length > 0) {
            commandPostPos = L.latLng(data[0].lat, data[0].lon);
            map.setView(commandPostPos, 16);
            L.marker(commandPostPos).addTo(map).bindPopup("COMMAND POST").openPopup();
        }
    }

    // Simulate Wind/Compass
    setInterval(() => {
        var deg = Math.floor(Math.random() * 360);
        document.getElementById('wind').style.transform = `rotate(${deg}deg)`;
    }, 4000);

    setMode('blue');
</script>

</body>
</html>
