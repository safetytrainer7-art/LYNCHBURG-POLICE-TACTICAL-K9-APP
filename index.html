
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD COMMAND V207</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #c5a059; --le: #0000FF; --sar: #FF0000; --civ: #00FF00; --sus: #800080; --k9: #ADD8E6; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* HEADER */
        .header { background: #111; border-bottom: 3px solid var(--gold); padding: 12px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1100; }
        .back-btn { background: var(--gold); color: #000; border: none; padding: 8px 16px; font-weight: 900; border-radius: 4px; }
        
        #live-map { height: 60vh; width: 100%; background: #222; }
        
        /* CONTROL PANEL */
        .controls { background: #111; padding: 15px; border-top: 2px solid var(--gold); position: relative; z-index: 1100; height: 40vh; }
        
        /* SEARCH BAR */
        .search-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-bar input { flex: 1; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 16px; }
        .search-bar button { background: var(--gold); color: #000; border: none; padding: 0 15px; font-weight: bold; border-radius: 6px; }

        /* RAISED LEGEND - MOVED UP */
        .asset-dock { 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 5px; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            border-radius: 8px;
            margin-bottom: 15px; /* Creates space above the bottom buttons */
        }
        .asset-item { text-align: center; font-size: 9px; font-weight: bold; letter-spacing: 0.5px; }
        .dot { 
            width: 16px; 
            height: 16px; 
            border-radius: 50%; 
            margin: 0 auto 6px; 
            border: 1.5px solid #fff; 
            box-shadow: 0 0 8px rgba(255,255,255,0.3);
        }
        
        /* K9 TEAM ICON ADJUSTED */
        .k9-team-box { 
            display: flex; 
            gap: 2px; 
            justify-content: center; 
            margin-bottom: 6px; 
            padding: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            border: 1px solid var(--gold);
        }
        .k9-team-box div { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #fff; }

        /* ACTION BUTTONS */
        .btn-row { display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 18px; font-weight: bold; border: none; border-radius: 8px; text-transform: uppercase; font-size: 13px; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }

        /* WIND INDICATOR */
        #wind-overlay { position: absolute; top: 75px; right: 15px; z-index: 1001; background: rgba(0,0,0,0.8); padding: 8px; border-radius: 10px; border: 1.5px solid var(--gold); text-align: center; min-width: 60px; }
        #wind-arrow { font-size: 22px; color: #0ff; display: block; line-height: 1; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn">← MENU</button>
        <span style="font-weight:bold; color:var(--gold); font-size: 14px;">TACTICAL COMMAND GPS</span>
    </div>

    <div id="live-map"></div>

    <div id="wind-overlay">
        <span id="wind-arrow">↘</span>
        <div style="font-size:9px; color:#0ff; font-weight:bold; margin-top:2px;">WIND: NW</div>
    </div>

    <div class="controls">
        <div class="search-bar">
            <input type="text" id="target" placeholder="Address or Lat/Long">
            <button onclick="alert('Searching...')">GO</button>
        </div>
        
        <div class="asset-dock">
            <div class="asset-item"><div class="dot" style="background:var(--le);"></div>LE BLUE</div>
            <div class="asset-item"><div class="dot" style="background:var(--sar);"></div>SAR RED</div>
            <div class="asset-item"><div class="dot" style="background:var(--civ);"></div>CIV GRN</div>
            <div class="asset-item"><div class="dot" style="background:var(--sus);"></div>SUS PURP</div>
            <div class="asset-item">
                <div class="k9-team-box">
                    <div style="background:var(--le);"></div>
                    <div style="background:var(--k9);"></div>
                </div>
                K9 TEAM
            </div>
        </div>
        
        <div class="btn-row">
            <button onclick="dropK9Team()" class="action-btn" style="background:#004400; color:#fff; border-bottom: 4px solid #002200;">DEPLOY K9</button>
            <button onclick="setPerimeter()" class="action-btn" style="background:#440000; color:#fff; border-bottom: 4px solid #220000;">PERIMETER</button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, k9Marker, perim;

    function initMap() {
        // Centered on Amherst County area
        map = L.map('live-map').setView([37.5853, -79.0514], 14); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }

    function dropK9Team() {
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const loc = [pos.coords.latitude, pos.coords.longitude];
                
                const k9Icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: "<div style='display:flex; gap:3px; background:rgba(0,0,0,0.7); padding:4px; border-radius:15px; border:2px solid gold;'>" +
                          "<div style='width:12px; height:12px; background:#0000FF; border-radius:50%; border:1px solid #fff;'></div>" +
                          "<div style='width:12px; height:12px; background:#ADD8E6; border-radius:50%; border:1px solid #fff;'></div>" +
                          "</div>",
                    iconSize: [45, 28]
                });

                if(k9Marker) map.removeLayer(k9Marker);
                k9Marker = L.marker(loc, {icon: k9Icon}).addTo(map);
                map.setView(loc, 17);
            });
        }
    }

    function setPerimeter() {
        if(k9Marker) {
            if(perim) map.removeLayer(perim);
            perim = L.circle(k9Marker.getLatLng(), {
                color: 'red',
                fillColor: '#f03',
                fillOpacity: 0.15,
                weight: 3,
                radius: 400
            }).addTo(map);
        } else {
            alert("Set K9 Position first.");
        }
    }

    window.onload = initMap;
</script>
</body>
</html>
