
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LPD TACTICAL - FULL COMMAND</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        :root { --lpd-blue: #003366; --gold: #ffd700; --alert: #d9534f; --le-blue: #007bff; --sar-red: #ff0000; --civ-green: #28a745; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }

        /* HEADER & SEARCH */
        .header { background: var(--lpd-blue); padding: 45px 10px 10px; border-bottom: 3px solid var(--gold); z-index: 1001; }
        .search-container { display: flex; gap: 5px; margin-top: 10px; }
        .search-box { flex-grow: 1; padding: 12px; border-radius: 4px; border: none; font-weight: bold; }
        .go-btn { background: var(--gold); border: none; padding: 0 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* MONITORS */
        .monitor-panel { display: grid; grid-template-columns: 1fr 1fr; background: #222; padding: 5px; z-index: 1001; }
        .monitor-box { background: #000; border: 1px solid #444; padding: 6px; border-radius: 4px; margin: 2px; color: white; font-size: 10px; }
        .monitor-title { color: var(--gold); font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }

        /* MAP AREA */
        #map { flex-grow: 1; width: 100%; z-index: 1; }

        /* LEGEND SIDEBAR */
        .legend { position: absolute; left: 10px; top: 220px; background: rgba(0,0,0,0.85); border: 1px solid var(--gold); padding: 10px; border-radius: 8px; z-index: 1001; display: flex; flex-direction: column; gap: 10px; }
        .leg-item { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; }

        /* ACTION BAR */
        .action-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 10px; background: #111; z-index: 1001; border-top: 2px solid var(--lpd-blue); }
        .q-btn { background: #222; border: 1px solid #444; padding: 12px 0; border-radius: 6px; text-align: center; color: white; cursor: pointer; }
        .q-btn label { font-size: 7px; font-weight: bold; text-transform: uppercase; display: block; margin-top: 4px; }

        /* DATA OVERLAY */
        #data-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 4000; padding: 40px 20px; box-sizing: border-box; overflow-y: auto; color: #000; }
        .close-btn { color: #fff; background: var(--lpd-blue); font-weight: bold; margin-top: 20px; text-align: center; padding: 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 style="color:white; margin:0; font-size:18px;">LPD TACTICAL COMMAND</h1>
        <div class="search-container">
            <input type="text" class="search-box" id="addr-input" placeholder="Enter Address">
            <button class="go-btn" onclick="searchAddress()">GO</button>
        </div>
    </div>

    <div class="monitor-panel">
        <div class="monitor-box">
            <div class="monitor-title">🛡️ Perimeter</div>
            <div id="p-status">UNITS: 1<br>STATUS: STANDBY</div>
        </div>
        <div class="monitor-box">
            <div class="monitor-title">🐕‍🦺 K-9 Injury</div>
            <div id="v-status">TEMP: 101.2 | HR: 88<br>STATUS: NORMAL</div>
        </div>
    </div>

    <div id="map"></div>

    <div class="legend">
        <div class="leg-item" style="background:var(--le-blue);" onclick="setDropType('blue')">LE</div>
        <div class="leg-item" style="background:var(--sar-red);" onclick="setDropType('red')">SAR</div>
        <div class="leg-item" style="background:var(--civ-green);" onclick="setDropType('green')">CIV</div>
        <div class="leg-item" style="background:purple;" onclick="setDropType('vet')">VET</div>
        <div class="leg-item" style="background:#555;" onclick="clearMarkers()">CLR</div>
    </div>

    <div class="action-bar">
        <div class="q-btn" onclick="showData('Legal')"><span>⚖️</span><label>Laws</label></div>
        <div class="q-btn" onclick="showData('Aid')"><span>🩹</span><label>Aid</label></div>
        <div class="q-btn" onclick="toggleDraw()"><span>📐</span><label>Perim</label></div>
        <div class="q-btn" onclick="toggleNightMode()"><span>🌑</span><label>Night</label></div>
        <div class="q-btn" onclick="locateMe()"><span>📍</span><label>GPS</label></div>
    </div>
</div>

<div id="data-panel"><div id="panel-body"></div><div class="close-btn" onclick="hideData()">CLOSE</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script>
    // 1. Initialize Map
    var map = L.map('map', { zoomControl: false }).setView([37.4137, -79.1422], 17);
    var lightLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
    
    // 2. Real-Time GPS Engine
    var myMarker = L.circleMarker([0,0], { color: 'white', fillColor: '#007bff', fillOpacity: 1, radius: 10, weight: 3 }).addTo(map);
    map.on('locationfound', function(e) {
        myMarker.setLatLng(e.latlng);
        document.getElementById('p-status').innerHTML = "UNITS: 1<br>GPS: LOCKED";
    });
    map.locate({watch: true, setView: true, maxZoom: 17});
    function locateMe() { map.locate({setView: true}); }

    // 3. Address Search with "GO"
    function searchAddress() {
        var addr = document.getElementById('addr-input').value;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${addr}`)
            .then(res => res.json())
            .then(data => { if(data[0]) map.setView([data[0].lat, data[0].lon], 18); });
    }

    // 4. Asset Drop System
    var dropType = null;
    var assets = L.layerGroup().addTo(map);
    function setDropType(type) { dropType = type; alert("Click map to drop " + type.toUpperCase()); }
    
    map.on('click', function(e) {
        if(!dropType) return;
        var color = (dropType == 'vet') ? 'purple' : dropType;
        var iconText = (dropType == 'vet') ? '🏥 VET' : dropType.toUpperCase();
        var m = L.circleMarker(e.latlng, { color: 'white', fillColor: color, fillOpacity: 1, radius: 10 }).addTo(assets);
        m.bindPopup(`<button onclick="assets.removeLayer(${L.stamp(m)})">REMOVE</button>`);
        dropType = null;
    });
    function clearMarkers() { assets.clearLayers(); }

    // 5. Perimeter Draw Tool
    var drawnItems = new L.FeatureGroup().addTo(map);
    var drawControl = new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polyline: false, circle: false, marker: false, circlemarker: false, rectangle: true, polygon: true } });
    function toggleDraw() { map.addControl(drawControl); alert("Outline the search area now."); }
    map.on(L.Draw.Event.CREATED, function (e) { drawnItems.addLayer(e.layer); map.removeControl(drawControl); });

    // 6. Night Mode
    var isNight = false;
    function toggleNightMode() {
        if(!isNight) { map.removeLayer(lightLayer); darkLayer.addTo(map); isNight = true; }
        else { map.removeLayer(darkLayer); lightLayer.addTo(map); isNight = false; }
    }

    // 7. Baked Info (10/10)
    const tacticalData = {
        'Legal': `<h2>10 BAKED LAWS</h2><p><b>1. VA § 19.2-81:</b> Warrantless Arrest Authority.</p><p><b>2. Graham v. Connor:</b> Reasonable Force Standard.</p><p><b>3. Florida v. Harris:</b> K-9 Reliability.</p><p><b>4. VA § 18.2-144.1:</b> K-9 Protection (Felony).</p><p><b>5. Rodriguez v. US:</b> Stop Duration.</p><p><b>6. Tennessee v. Garner:</b> Fleeing Felons.</p><p><b>7. Illinois v. Caballes:</b> Open Air Sniffs.</p><p><b>8. VA § 19.2-59:</b> Exigent Entry.</p><p><b>9. Florida v. Jardines:</b> Curtilage/Porch Rule.</p><p><b>10. Terry v. Ohio:</b> Stop and Frisk.</p>`,
        'Aid': `<h2>10 BAKED AID PROCEDURES</h2><p><b>1. Narcan:</b> 4mg nasal for K-9 exposure.</p><p><b>2. Bloat:</b> Retching/Hard stomach - CODE 3 VET.</p><p><b>3. Tourniquet:</b> High and Tight; mark time.</p><p><b>4. Heat:</b> Cool paws/belly. No ice.</p><p><b>5. Chest Wound:</b> Occlusive seal.</p><p><b>6. Shock:</b> Gums white/slow refill.</p><p><b>7. Eyes:</b> Flush 15 mins.</p><p><b>8. Paws:</b> Clean and wrap; watch swelling.</p><p><b>9. Fractures:</b> Immobilize joint above/below.</p><p><b>10. Anaphylaxis:</b> Stridor/Wheezing - VET immediate.</p>`
    };
    function showData(k) { document.getElementById('panel-body').innerHTML = tacticalData[k]; document.getElementById('data-panel').style.display = 'block'; }
    function hideData() { document.getElementById('data-panel').style.display = 'none'; }
</script>

</body>
</html>
