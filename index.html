
<div id="m-map" class="page">
    <div class="header">
        <button class="back-btn" onclick="closePage('m-map')">← BACK</button>
        <h2 style="color:#c5a059; margin:0;">TACTICAL COMMAND MAP</h2>
    </div>

    <div style="background: #000; padding: 10px; border-bottom: 2px solid #c5a059;">
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="map-search" placeholder="ADDRESS, CITY..." 
                   style="flex-grow: 1; padding: 12px; background: #111; color: #fff; border: 1px solid #c5a059;">
            <button onclick="searchAddr()" style="background: #c5a059; color: #000; border: none; padding: 10px 20px; font-weight: bold;">GO</button>
        </div>

        <button id="start-btn" onclick="startGps()" 
                style="width: 100%; background: #004400; color: #fff; border: 2px solid #00ff00; padding: 15px; font-weight: bold; margin-bottom:10px;">
            ▶ START LIVE GPS TRACKING
        </button>

        <div style="display: flex; justify-content: space-around;">
            <button class="tool-btn" onclick="setRole('le')">LE (BLUE)</button>
            <button class="tool-btn" onclick="setRole('k9')">K9 (LT BLUE)</button>
            <button class="tool-btn" onclick="setRole('sar')">SAR (RED)</button>
            <button class="tool-btn" onclick="setRole('sub')">SUB (PURPLE)</button>
        </div>
    </div>

    <div id="live-map" style="width: 100%; height: 50vh; background: #222; border-bottom: 2px solid #c5a059; position: relative;">
        <div id="map-fallback" style="position:absolute; top:40%; width:100%; text-align:center; color:#c5a059;">
            <p>SATELLITE LINK STANDBY</p>
            <button onclick="initMap()" style="background:#c5a059; color:#000; padding:10px; border:none; font-weight:bold;">FORCE LOAD MAP</button>
        </div>
    </div>

    <div style="padding: 12px; background: #000; color: #c5a059; font-family: monospace; font-size: 13px; display: flex; justify-content: space-between;">
        <div id="wind-dir">🚩 WIND: NORTH 8MPH</div>
        <div id="dist-check">DIST: -- FT</div>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    .tool-btn { flex: 1; background: #1a1a1a; color: #c5a059; border: 1px solid #c5a059; padding: 10px 2px; font-size: 10px; font-weight: bold; border-radius: 4px; margin: 0 2px; }
    .pulse { width: 16px; height: 16px; background: #007bff; border: 3px solid white; border-radius: 50%; animation: pulse-blue 2s infinite; }
    @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 123, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); } }
</style>

<script>
    let map;
    let userMarker;

    function initMap() {
        if (!map) {
            // Force it to show Amherst County coordinates immediately
            map = L.map('live-map').setView([37.525, -79.15], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            document.getElementById('map-fallback').style.display = 'none';
        } else {
            map.invalidateSize();
        }
    }

    async function searchAddr() {
        let addr = document.getElementById('map-search').value;
        if(!addr) return;
        initMap(); // Ensure map is live
        
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`);
            const data = await res.json();
            if (data.length > 0) {
                map.setView([data[0].lat, data[0].lon], 17);
                L.marker([data[0].lat, data[0].lon]).addTo(map).bindPopup("<b>SEARCH LOCATION</b>").openPopup();
            }
        } catch (e) { console.log("Search blocked by browser firewall."); }
    }

    function startGps() {
        initMap();
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                if (userMarker) { userMarker.setLatLng([lat, lng]); } 
                else {
                    const icon = L.divIcon({ className: 'pulse', iconSize: [16, 16] });
                    userMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                }
                map.panTo([lat, lng]);
            }, null, { enableHighAccuracy: true });
        }
    }

    // Connect to your main app buttons
    function openPage(id) { 
        document.getElementById(id).style.display = 'block'; 
        if(id === 'm-map') setTimeout(initMap, 300); 
    }
    function closePage(id) { document.getElementById(id).style.display = 'none'; }
</script>
