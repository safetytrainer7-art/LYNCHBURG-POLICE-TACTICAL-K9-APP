<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD COMMAND V215</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #c5a059; --le-blue: #0000FF; --danger: #cc0000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        /* HOME SCREEN */
        #home { position: absolute; width: 100%; height: 100%; z-index: 1000; background: #000; display: block; }
        
        .background-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('homepage.jpg') no-repeat center center;
            background-size: cover;
            opacity: 0.7; /* Increased visibility of background while keeping text readable */
            z-index: 1010;
        }

        .ui-overlay {
            position: absolute;
            width: 100%;
            height: 85%;
            top: 7.5%;
            left: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1020;
        }

        .side-col {
            width: 30%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
        }

        .nav-box {
            background: rgba(15, 15, 15, 0.9);
            border: 2px solid var(--gold);
            border-radius: 10px;
            padding: 20px 5px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
        }
        .nav-box:active { transform: scale(0.92); background: var(--gold); }
        .nav-box:active .label { color: #000; }

        .nav-box .icon { font-size: 24px; margin-bottom: 8px; display: block; }
        .nav-box .label { font-size: 10px; font-weight: 900; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }

        /* GPS INTERFACE */
        #gps-page { position: absolute; width: 100%; height: 100%; z-index: 2000; background: #000; display: none; flex-direction: column; }
        .top-bar { background: #111; padding: 12px; border-bottom: 2px solid var(--gold); display: flex; gap: 8px; align-items: center; z-index: 2010; }
        .back-btn { background: var(--gold); color: #000; border: none; padding: 12px 15px; font-weight: 900; border-radius: 4px; cursor: pointer; }
        .addr-input { flex: 1; padding: 12px; background: #222; border: 1px solid var(--gold); color: #fff; border-radius: 4px; font-size: 16px; }
        .go-btn { background: #fff; font-weight: 900; padding: 12px 18px; border-radius: 4px; border: none; cursor: pointer; }
        
        #map { flex: 1; width: 100%; z-index: 1; }

        .cmd-panel { background: #111; border-top: 2px solid var(--gold); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; z-index: 2010; }
        .cmd-btn { padding: 15px 5px; font-weight: 900; border-radius: 6px; border: none; text-transform: uppercase; font-size: 12px; cursor: pointer; }

        /* PULSING K9 MARKER */
        .k9-dot { 
            width: 20px; height: 20px; background: var(--le-blue); 
            border: 3px solid #fff; border-radius: 50%; 
            box-shadow: 0 0 10px var(--le-blue);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0px rgba(0, 0, 255, 0.7); }
            100% { box-shadow: 0 0 0 15px rgba(0, 0, 255, 0); }
        }
    </style>
</head>
<body>

    <div id="home">
        <div class="background-frame"></div>
        <div class="ui-overlay">
            <div class="side-col">
                <div class="nav-box" onclick="openGPS()">
                    <span class="icon">📍</span><span class="label">TACTICAL GPS</span>
                </div>
                <div class="nav-box" onclick="alert('K9 First Aid protocols loading...')">
                    <span class="icon">🚑</span><span class="label">K9 FIRST AID</span>
                </div>
                <div class="nav-box" onclick="alert('Incident reports encrypted...')">
                    <span class="icon">📝</span><span class="label">INCIDENT RPT</span>
                </div>
            </div>
            <div class="side-col">
                <div class="nav-box" onclick="alert('Loading Legal Bible...')">
                    <span class="icon">⚖️</span><span class="label">LEGAL BIBLE</span>
                </div>
                <div class="nav-box" onclick="alert('Accessing Training Modules...')">
                    <span class="icon">🐕</span><span class="label">K9 TRAINING</span>
                </div>
                <div class="nav-box" onclick="alert('System Settings...')">
                    <span class="icon">⚙️</span><span class="label">SETTINGS</span>
                </div>
            </div>
        </div>
    </div>

    <div id="gps-page">
        <div class="top-bar">
            <button class="back-btn" onclick="closeGPS()">MENU</button>
            <input type="text" id="target" class="addr-input" placeholder="Enter Target Address..." onkeydown="if(event.key==='Enter') searchAddress()">
            <button class="go-btn" onclick="searchAddress()">GO</button>
        </div>
        <div id="map"></div>
        <div class="cmd-panel">
            <button class="cmd-btn" style="background:var(--le-blue); color:#fff;" onclick="findMe()">MY POSITION</button>
            <button class="cmd-btn" style="background:var(--danger); color:#fff;" onclick="drawPerimeter()">PERIMETER</button>
            <button class="cmd-btn" style="background:#333; color:var(--gold); grid-column: span 2;" onclick="resetMap()">RESET TO AMHERST HQ</button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, userMarker, perimeterCircle, perimeterOuter;

    function openGPS() {
        document.getElementById('home').style.display = 'none';
        document.getElementById('gps-page').style.display = 'flex';
        if(!map) { 
            setTimeout(initMap, 100); 
        } else {
            map.invalidateSize();
        }
    }

    function closeGPS() {
        document.getElementById('gps-page').style.display = 'none';
        document.getElementById('home').style.display = 'block';
    }

    function initMap() {
        // Amherst, VA Coordinates
        map = L.map('map', { zoomControl: false }).setView([37.5853, -79.0514], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
    }

    function findMe() {
        if (!navigator.geolocation) return alert("Geolocation not supported");
        
        navigator.geolocation.getCurrentPosition((pos) => {
            const myLoc = [pos.coords.latitude, pos.coords.longitude];
            const icon = L.divIcon({ html: '<div class="k9-dot"></div>', className: '', iconSize: [20, 20] });
            
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(myLoc, { icon: icon }).addTo(map);
            map.setView(myLoc, 17);
        }, (err) => {
            alert("Error: GPS Signal Weak or Permission Denied");
        }, { enableHighAccuracy: true });
    }

    async function searchAddress() {
        const query = document.getElementById('target').value;
        if(!query) return;

        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
            const data = await response.json();
            if (data.length > 0) {
                const loc = [data[0].lat, data[0].lon];
                map.setView(loc, 17);
                L.marker(loc).addTo(map).bindPopup(query).openPopup();
            } else {
                alert("Address not found.");
            }
        } catch (e) {
            alert("Network error.");
        }
    }

    function drawPerimeter() {
        const center = map.getCenter();
        if (perimeterCircle) map.removeLayer(perimeterCircle);
        if (perimeterOuter) map.removeLayer(perimeterOuter);

        // Core Perimeter (Red)
        perimeterCircle = L.circle(center, { 
            color: 'red', fillColor: '#f03', fillOpacity: 0.2, radius: 400, weight: 4 
        }).addTo(map);

        // Outer Cordon (Dashed)
        perimeterOuter = L.circle(center, { 
            color: 'yellow', fillOpacity: 0, radius: 800, weight: 2, dashArray: '10, 10' 
        }).addTo(map);

        map.fitBounds(perimeterOuter.getBounds());
    }

    function resetMap() { 
        map.setView([37.5853, -79.0514], 14); 
    }
</script>
</body>
</html>
