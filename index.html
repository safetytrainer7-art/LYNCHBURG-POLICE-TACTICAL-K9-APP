<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD COMMAND HUB</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            background: #000000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }

        /* The frame is now locked to follow your phone's actual orientation */
        #app-frame {
            position: relative;
            /* This ensures the image stays wide (Landscape) */
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh;
            background-image: url('homepage.png.png'), url('image_a47b1c.png'), url('homepage.png'), url('homepage.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* RED CALIBRATION BOXES */
        .hotspot { position: absolute; cursor: pointer; border: 2px solid red; z-index: 50; box-sizing: border-box; }
        
        /* Pinned to your gold icon layout */
        #spot-med  { top: 17%; left: 11%; width: 13%; height: 26%; } 
        #spot-law  { top: 46%; left: 11%; width: 13%; height: 26%; } 
        #spot-narc { top: 73%; left: 11%; width: 13%; height: 18%; } 
        
        #spot-map  { top: 17%; right: 11%; width: 13%; height: 26%; } 
        #spot-logs { top: 46%; right: 11%; width: 13%; height: 26%; } 
        #spot-va   { top: 73%; right: 11%; width: 13%; height: 18%; } 

        .module { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #001a00; z-index: 100; color: #c5a059; flex-direction: column; }
        .mod-header { background: #000; padding: 15px; border-bottom: 2px solid #c5a059; display: flex; gap: 10px; }
        .back-btn { background: #c5a059; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div id="app-frame">
    <div id="spot-med" class="hotspot" onclick="openMod('med-mod')"></div>
    <div id="spot-law" class="hotspot" onclick="openMod('law-mod')"></div>
    <div id="spot-narc" class="hotspot" onclick="alert('Narcotics Aids Active')"></div>
    <div id="spot-map" class="hotspot" onclick="alert('GPS Map Active')"></div>
    <div id="spot-logs" class="hotspot" onclick="alert('Training Logs Active')"></div>
    <div id="spot-va" class="hotspot" onclick="alert('VA Criminal Code Active')"></div>
</div>

<div id="med-mod" class="module">
    <div class="mod-header"><button class="back-btn" onclick="closeMod('med-mod')">BACK</button><span>K9 EMERGENCY SOS</span></div>
    <div style="padding:20px; color:#fff;">
        <h2 style="color:#c5a059">K9 FIELD TRAUMA</h2>
        <p>Immediate steps for heat stroke and trauma.</p>
    </div>
</div>

<div id="law-mod" class="module">
    <div class="mod-header"><button class="back-btn" onclick="closeMod('law-mod')">BACK</button><span>LEGAL BIBLE</span></div>
    <div style="padding:20px; color:#fff;">
        <h2 style="color:#c5a059">Graham v. Connor</h2>
        <p>Standard for objective reasonableness.</p>
    </div>
</div>

<script>
    function openMod(id) { document.getElementById(id).style.display = 'flex'; }
    function closeMod(id) { document.getElementById(id).style.display = 'none'; }
</script>

</body>
</html>
