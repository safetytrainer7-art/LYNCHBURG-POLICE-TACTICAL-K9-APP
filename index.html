<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD COMMAND V206</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #c5a059; --le: #0000FF; --sar: #FF0000; --civ: #00FF00; --sus: #800080; --k9: #ADD8E6; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        .header { background: #111; border-bottom: 3px solid var(--gold); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1100; }
        .back-btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; font-weight: 900; border-radius: 6px; cursor: pointer; }
        
        #live-map { height: 65vh; width: 100%; background: #222; }
        
        /* SEARCH CONTROLS */
        .controls { background: #111; padding: 10px; border-top: 2px solid var(--gold); display: flex; flex-direction: column; gap: 8px; }
        .search-bar { display: flex; gap: 5px; }
        .search-bar input { flex: 1; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; }
        .search-bar button { background: var(--gold); color: #000; border: none; padding: 10px; font-weight: bold; border-radius: 4px; }
        
        /* ASSET DOCK */
        .asset-dock { display: flex; justify-content: space-around; padding: 10px; background: #0a0a0a; border-top: 1px solid #333; overflow-x: auto; }
        .asset-item { text-align: center; font-size: 10px; min-width: 60px; font-weight: bold; }
        .dot { width: 18px; height: 18px; border-radius: 50%; margin: 0 auto 5px; border: 2px solid #fff; }
        .k9-team { width: 30px; height: 18px; border-radius: 10px; display: flex; gap: 2px; margin: 0 auto 5px; }
        .k9-team div { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #fff; margin-top: 2px; }

        /* WIND INDICATOR */
        #wind-overlay { position: absolute; top: 85px; right: 15px; z-index: 1001; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 50%; border: 2px solid var(--gold); text-align: center; }
        #wind-arrow { font-size: 24px; display: inline-block; transition: 0.5s; color: #0ff; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn">← MENU</button>
        <span style="font-weight:bold; color:var(--gold);">TACTICAL GPS V2.0</span>
        <div id="wind-overlay">
            <div id="wind-arrow">↑</div>
            <div style="font-size:9px; color:#0ff;">WIND: NW</div>
        </div>
    </div>

    <div id="live-map"></div>

    <div class="controls">
        <div class="search-bar">
            <input type="text" id="target" placeholder="Enter Target Address or Lat/Long...">
            <button onclick="alert('Searching Target Area...')">GO</button>
        </div>
        
        <div class="asset-dock">
            <div class="asset-item"><div class="dot" style="background:var(--le);"></div>LE BLUE</div>
            <div class="asset-item"><div class="dot" style="background:var(--sar);"></div>SARS RED</div>
            <div class="asset-item"><div class="dot" style="background:var(--civ);"></div>CIV GREEN</div>
            <div class="asset-item"><div class="dot" style="background:var(--sus);"></div>SUS PURPLE</div>
            <div class="asset-item">
                <div class="k9-team">
                    <div style="background:var(--le);"></div>
                    <div style="background:var(--k9);"></div>
                </div>
                K9 TEAM
            </div>
        </div>
        
        <div style="display:flex; gap:10px;">
            <button onclick="dropK9Team()" style="flex:1; background:#004400; color:#fff; padding:15px; font-weight:bold; border:none; border-radius:6px;">DEPLOY K9 TEAM</button>
            <button onclick="setPerimeter()" style="flex:1; background:#440000; color:#fff; padding:15px; font-weight:bold; border:none; border-radius:6px;">SET PERIMETER</button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, userLoc, k9Marker, perim;

    // INITIALIZE TACTICAL MAP
    function initMap() {
        map = L.map('live-map').setView([37.5853, -79.0514], 14); // Centered on Amherst
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'Tactical Command'
        }).addTo(map);

        // ROTATE WIND ARROW (Simulated for Demo)
        document.getElementById('wind-arrow').style.transform = 'rotate(-45deg)'; 
    }

    function dropK9Team() {
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const loc = [pos.coords.latitude, pos.coords.longitude];
                
                // CUSTOM DOUBLE-DOT ICON
                const k9Icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: "<div style='display:flex; gap:2px; background:rgba(0,0,0,0.5); padding:3px; border-radius:15px; border:2px solid gold;'>" +
                          "<div style='width:12px; height:12px; background:#0000FF; border-radius:50%;'></div>" +
                          "<div style='width:12px; height:12px; background:#ADD8E6; border-radius:50%;'></div>" +
                          "</div>",
                    iconSize: [40, 25]
                });

                if(k9Marker) map.removeLayer(k9Marker);
                k9Marker = L.marker(loc, {icon: k9Icon}).addTo(map);
                map.setView(loc, 16);
            });
        }
    }

    function setPerimeter() {
        if(k9Marker) {
            if(perim) map.removeLayer(perim);
            perim = L.circle(k9Marker.getLatLng(), {
                color: 'red',
                fillColor: '#f03',
                fillOpacity: 0.2,
                radius: 500
            }).addTo(map);
            alert("500m Perimeter Locked on K9 Team Position.");
        } else {
            alert("Deploy K9 Team first to center perimeter.");
        }
    }

    window.onload = initMap;
</script>
</body>
</html>
