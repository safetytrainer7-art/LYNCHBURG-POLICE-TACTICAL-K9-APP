
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD LIVE TEAM COMMAND</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --orange: #ff6600; --gold: #ffd700; --blue: #0044ff; --red: #ff0000; --live: #00ff00; }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100%; overflow: hidden; }
        
        /* GATEKEEPER SCREEN */
        #gatekeeper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .gate-box { background: #111; border: 2px solid var(--orange); padding: 30px; border-radius: 15px; width: 85%; max-width: 300px; }
        .gate-input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; text-align: center; font-size: 18px; box-sizing: border-box; }
        .gate-btn { background: var(--orange); color: #000; padding: 15px; border: none; border-radius: 5px; font-weight: bold; width: 100%; }

        /* APP CONTENT */
        #app-content { display: none; height: 100%; flex-direction: column; }
        .hdr { background: #001a00; border-bottom: 2px solid var(--orange); padding: 8px; text-align: center; color: var(--gold); font-weight: bold; font-size: 12px; }
        #map { flex-grow: 1; width: 100%; }
        .tool-bar { background: #1a1a1a; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 6px; border-top: 1px solid #444; }
        .t-btn { background: #333; border: 1px solid #555; padding: 10px 0; text-align: center; border-radius: 6px; font-size: 20px; }
        .t-btn.active { border-color: var(--live); background: #002200; box-shadow: 0 0 8px var(--live); }
        .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 8px; background: #000; }
        .i-btn { padding: 14px 5px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 11px; border: 1px solid #444; color: #fff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #000; z-index: 9999; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .cls { background: var(--red); color: #fff; padding: 15px; text-align: center; font-weight: bold; border-radius: 5px; margin-bottom: 15px; position: sticky; top: 0; }
    </style>
</head>
<body>

<div id="gatekeeper">
    <div class="gate-box">
        <h2 style="color:var(--gold); margin-top:0;">ACSD K9</h2>
        <p style="font-size:12px; color:#aaa;">TEAM COMMAND INTERFACE</p>
        <input type="text" id="unit-id" class="gate-input" placeholder="UNIT ID (e.g. ACSD-101)">
        <button class="gate-btn" onclick="checkAccess()">AUTHORIZE TEAM VIEW</button>
        <p id="gate-msg" style="color:var(--red); font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="app-content">
    <div class="hdr">LIVE TEAM NETWORK • UNIT: <span id="active-unit"></span></div>
    <div id="map"></div>
    <div class="tool-bar">
        <div id="b-k9" class="t-btn" onclick="sm('k9')">🐕</div>
        <div id="b-leo" class="t-btn" onclick="sm('leo')">👮</div>
        <div id="b-per" class="t-btn" onclick="sm('per')">🔴</div>
        <div id="b-clu" class="t-btn" onclick="sm('clu')">🚩</div>
        <div id="b-sus" class="t-btn" onclick="sm('sus')">👤</div>
    </div>
    <div class="cmd-grid">
        <div class="i-btn" style="background:#001a44;" onclick="om('l-m')">⚖️ LAWS</div>
        <div class="i-btn" style="background:#440000;" onclick="om('m-m')">🚑 MEDICAL</div>
        <div class="i-btn" style="background:#332200;" onclick="om('r-m')">📝 REPORT</div>
        <div class="i-btn" style="background:#003300;" onclick="location.reload()">🔄 REFRESH</div>
    </div>
</div>

<div id="l-m" class="modal"><div class="cls" onclick="cm('l-m')">CLOSE</div><div id="law-content"></div></div>
<div id="m-m" class="modal"><div class="cls" onclick="cm('m-m')">CLOSE</div><div id="med-content"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var validCodes = ["ACSD-101", "ACSD-102", "ACSD-103", "SHERIFF-01", "EARL-01"];
    var myID = "";
    var teamMarkers = {};

    function checkAccess() {
        var val = document.getElementById('unit-id').value.toUpperCase();
        if(validCodes.includes(val)) {
            myID = val;
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            document.getElementById('active-unit').innerText = myID;
            initMap();
            startTeamSync();
        } else {
            document.getElementById('gate-msg').innerText = "ACCESS DENIED";
        }
    }

    var map, mode, pts = [], line;

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([37.584, -79.052], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        line = L.polyline([], {color:'red', weight:4}).addTo(map);

        map.on('click', function(e) {
            if(!mode) return;
            if(mode==='per'){ pts.push(e.latlng); line.setLatLngs(pts); L.circleMarker(e.latlng,{radius:3,color:'red'}).addTo(map); }
            else {
                var ico = {'k9':'🐕','leo':'👮','clu':'🚩','sus':'👤'};
                L.marker(e.latlng, {icon: L.divIcon({html:ico[mode], iconSize:[30,30], className:'m-ico'})}).addTo(map);
            }
        });
    }

    // THE "SECRET SAUCE" - TEAM SYNC
    function startTeamSync() {
        setInterval(() => {
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude;
                const lng = p.coords.longitude;
                
                // 1. Mark yourself
                if(!teamMarkers[myID]) {
                    teamMarkers[myID] = L.marker([lat, lng], {icon: L.divIcon({html:'🔵', className:'m-ico'})}).addTo(map);
                } else {
                    teamMarkers[myID].setLatLng([lat, lng]);
                }

                // 2. Broadcast and Receive (Simulated for Demo using a Free Logic)
                // In a full build, this pings the server. 
                // For the demo, have them all click 'TRACK' to sync their views.
            });
        }, 5000);
    }

    function sm(m) { mode = m; document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active')); if(m) document.getElementById('b-'+m).classList.add('active'); }
    function om(id){ document.getElementById(id).style.display='block'; }
    function cm(id){ document.getElementById(id).style.display='none'; }
</script>
<style>.m-ico{font-size:24px; text-align:center;}</style>
</body>
</html>
