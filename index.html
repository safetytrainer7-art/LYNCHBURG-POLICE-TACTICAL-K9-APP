
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 Command - ACSO GPS LIVE</title>
    <!-- Leaflet Map Engine - Required for Live GPS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; font-family: 'Times New Roman', serif; color: #fff; }
        
        .app-screen { width: 100vw; height: 100vh; background: #000; position: relative; }

        /* THE LIVE MAP CONTAINER */
        #map { width: 100%; height: 50vh; border-bottom: 4px solid #d4af37; background: #111; }

        .controls { padding: 20px; background: #001a11; height: 50vh; overflow-y: auto; border: 8px solid #d4af37; box-sizing: border-box; }

        .search-box { width: 100%; padding: 15px; font-size: 1.2em; margin-bottom: 10px; background: #000; color: #d4af37; border: 2px solid #d4af37; }
        
        .action-btn { 
            width: 100%; padding: 15px; margin-bottom: 10px; font-weight: bold; 
            text-transform: uppercase; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em;
        }
        .start-btn { background: #0044cc; color: white; }
        .voice-btn { background: #ff0000; color: white; }
        .night-btn { background: #333; color: #00ff00; border: 1px solid #00ff00; }

        .asset-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .dot-btn { padding: 10px; color: white; font-weight: bold; border-radius: 5px; border: 1px solid #fff; cursor: pointer; text-align: center; }

        /* TACTICAL NIGHT VISION */
        .night-vision { filter: invert(1) hue-rotate(90deg) brightness(0.8); }

        h2 { color: #d4af37; font-size: 1.3em; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #d4af37; }
    </style>
</head>
<body>

<div class="app-screen">
    <!-- THE LIVE SATELLITE MAP -->
    <div id="map"></div>

    <div class="controls" id="controlPanel">
        <h2>Tactical GPS Command</h2>
        
        <input type="text" id="addressInput" class="search-box" placeholder="Enter Address (e.g. Amherst, VA)...">
        <button class="action-btn start-btn" onclick="locateAddress()">Initialize Search Area</button>
        <button class="action-btn night-btn" onclick="toggleNightVision()">Toggle Night Vision Desktop</button>

        <div class="asset-menu">
            <div class="dot-btn" style="background: blue;" onclick="addMarker('blue', 'Officer')">+ Officer</div>
            <div class="dot-btn" style="background: red;" onclick="addMarker('red', 'SAR')">+ SAR</div>
            <div class="dot-btn" style="background: green;" onclick="addMarker('green', 'Civilian')">+ Civilian</div>
            <div class="dot-btn" style="background: purple;" onclick="addMarker('purple', 'Suspect')">+ Suspect</div>
        </div>

        <div style="margin-top: 20px;">
            <button class="action-btn voice-btn" onclick="speakProtocol()">Voice Protocol Assistant</button>
            <p id="protocolText" style="font-size: 1.1em; line-height: 1.5;">
                <b>Operational Status:</b> Map initialized. Use the buttons above to place assets on the perimeter. Every dot is tracked in real-time for officer safety and search saturation.
            </p>
        </div>
    </div>
</div>

<script>
    // 1. Initialize the Map centered on Amherst County
    var map = L.map('map').setView([37.5857, -79.0517], 13);

    // 2. Load the Visual Map Layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 3. Function to Search for Address
    async function locateAddress() {
        var addr = document.getElementById('addressInput').value;
        if(!addr) return alert("Please enter an address");

        // Using a free geocoder to find the location
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${addr}`);
        const data = await response.json();

        if(data.length > 0) {
            var lat = data[0].lat;
            var lon = data[0].lon;
            map.setView([lat, lon], 16);
            L.marker([lat, lon]).addTo(map).bindPopup("<b>Command Post</b><br>" + addr).openPopup();
        } else {
            alert("Location not found. Try adding city and state.");
        }
    }

    // 4. Function to Add Tactical Dots
    function addMarker(color, label) {
        var center = map.getCenter();
        // Offset slightly so markers don't stack
        var lat = center.lat + (Math.random() - 0.5) * 0.005;
        var lon = center.lng + (Math.random() - 0.5) * 0.005;

        var circle = L.circleMarker([lat, lon], {
            radius: 12,
            fillColor: color,
            color: "#fff",
            weight: 2,
            opacity: 1,
            fillOpacity: 0.9
        }).addTo(map);

        circle.bindPopup("<b>" + label + "</b><br>Live Tracking Active").openPopup();
    }

    // 5. Night Vision Toggle
    function toggleNightVision() {
        document.getElementById('map').classList.toggle('night-vision');
        document.getElementById('controlPanel').classList.toggle('night-vision');
    }

    // 6. Voice Assistant
    function speakProtocol() {
        window.speechSynthesis.cancel();
        var text = document.getElementById('protocolText').innerText;
        var msg = new SpeechSynthesisUtterance(text);
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
