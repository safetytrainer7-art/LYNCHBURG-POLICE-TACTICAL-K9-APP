<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAR COMMAND V8 - LEGEND & LOCK</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --sar-orange: #ff6600; --gold: #ffd700; --live-blue: #007bff; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Arial', sans-serif; overflow: hidden; color: white; }

        /* COMMAND HEADER */
        .header { background: #001a00; padding: 45px 15px 10px; border-bottom: 3px solid var(--sar-orange); z-index: 3000; }
        .search-row { display: flex; gap: 5px; }
        .search-row input { flex-grow: 1; padding: 12px; border-radius: 4px; border: none; font-size: 16px; font-weight: bold; }

        /* THE SUBJECT LEGEND (LEFT SIDE) */
        .legend { 
            position: absolute; left: 10px; top: 180px; width: 160px; 
            background: rgba(0,0,0,0.9); border: 2px solid var(--gold); 
            padding: 10px; z-index: 2000; border-radius: 8px; font-size: 11px; 
        }
        .legend b { color: var(--sar-orange); border-bottom: 1px solid #444; display: block; margin-bottom: 5px; }
        .legend-item { margin-bottom: 6px; }

        #map { flex-grow: 1; width: 100%; height: calc(100vh - 250px); z-index: 1; background: #0b1a0b; }

        /* TOOLS & GPS */
        .toolbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 10px; background: #000; z-index: 3000; }
        .tool { background: #222; border: 1px solid #444; padding: 15px 0; border-radius: 6px; text-align: center; cursor: pointer; color: #fff; }
        .tool.gps-active { background: #004400; border-color: #00ff00; }
        .tool label { display: block; font-size: 8px; color: var(--gold); text-transform: uppercase; margin-top: 5px; font-weight: bold; }

        /* BLUE DOT */
        .pulse {
            width: 18px; height: 18px; background: var(--live-blue); border: 3px solid #fff; border-radius: 50%;
            position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        .pulse::after {
            content: ""; position: absolute; top: -6px; left: -6px; width: 30px; height: 30px;
            border: 2px solid #fff; border-radius: 50%; animation: pulsate 1.5s ease-out infinite;
        }
        @keyframes pulsate { 0% { transform: scale(0.1); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px;">
        <span id="gps-stat" style="color:red;">● GPS: STANDBY</span>
        <span id="clock-val">00:00:00</span>
    </div>
    <div class="search-row">
        <input type="text" id="target-search" placeholder="Enter PLS Address">
        <button onclick="deploySearch()" style="background:var(--sar-orange); color:white; border:none; padding:10px 15px; border-radius:4px; font-weight:bold;">DEPLOY</button>
    </div>
</div>

<div id="map"></div>

<div class="legend">
    <b>SUBJECT PROFILE</b>
    <div class="legend-item">NAME: <span id="sub-name">JOHN DOE</span></div>
    <div class="legend-item">TYPE: <span style="color:yellow;">DEMENTIA</span></div>
    <div class="legend-item">DESC: <span id="sub-desc">BLUE HAT / JEANS</span></div>
    <hr style="border:0; border-top:1px solid #333;">
    <button onclick="editSub()" style="width:100%; font-size:9px; background:#333; color:white; border:1px solid #555;">EDIT INFO</button>
</div>

<div class="toolbar">
    <div id="gps-btn" class="tool" onclick="startGpsLock()"><span>📍</span><label>Lock On Me</label></div>
    <div class="tool" onclick="dropLZ()"><span>🚁</span><label>Set LZ</label></div>
    <div class="tool" onclick="alert('PERIMETER DRAWING ENABLED')"><span>📐</span><label>Perimeter</label></div>
    <div class="tool" onclick="location.reload()"><span>🔄</span><label>Reset</label></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false }).setView([37.4137, -79.1422], 14);
    L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

    // 1. SEARCH DEPLOYMENT
    function deploySearch() {
        var addr = document.getElementById('target-search').value;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${addr}`)
            .then(r => r.json()).then(d => {
                if(d[0]) {
                    var pos = [d[0].lat, d[0].lon];
                    map.setView(pos, 18);
                    L.marker(pos).addTo(map).bindPopup("<b>PLS: " + addr + "</b>").openPopup();
                } else {
                    alert("Address not found.");
                }
            });
    }

    // 2. HARD-WIRED GPS LOCK
    var myMarker = null;
    var pulseIcon = L.divIcon({ className: 'p-icon', html: '<div class="pulse"></div>', iconSize: [30,30], iconAnchor: [15,15] });

    function startGpsLock() {
        document.getElementById('gps-stat').innerText = "● GPS: SEARCHING...";
        document.getElementById('gps-stat').style.color = "yellow";
        document.getElementById('gps-btn').classList.add('gps-active');

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(p) {
                var lat = p.coords.latitude;
                var lng = p.coords.longitude;
                var accuracy = p.coords.accuracy.toFixed(0);

                document.getElementById('gps-stat').innerText = "● GPS: LIVE (" + accuracy + "m)";
                document.getElementById('gps-stat').style.color = "#00ff00";

                if (!myMarker) {
                    myMarker = L.marker([lat, lng], { icon: pulseIcon }).addTo(map);
                    map.setView([lat, lng], 17); // Snaps to you the first time found
                } else {
                    myMarker.setLatLng([lat, lng]);
                }
            }, function(err) {
                alert("GPS Error: Please ensure your browser has permission to use location.");
                document.getElementById('gps-stat').innerText = "● GPS: FAILED";
                document.getElementById('gps-stat').style.color = "red";
            }, { enableHighAccuracy: true });
        }
    }

    function editSub() {
        var n = prompt("Subject Name:");
        var d = prompt("Clothing/Description:");
        if(n) document.getElementById('sub-name').innerText = n.toUpperCase();
        if(d) document.getElementById('sub-desc').innerText = d.toUpperCase();
    }

    function dropLZ() {
        L.circle(map.getCenter(), { radius: 35, color: '#00ff00', fillOpacity: 0.3 }).addTo(map).bindPopup("HELO LZ").openPopup();
    }

    setInterval(() => { document.getElementById('clock-val').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
