<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD CANINE SEARCH & RESCUE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #c5a059; --dark-green: #003314; }
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Georgia', serif; height: 100vh; overflow: hidden; }

        /* THE OFFICIAL HOMEPAGE REPLICA */
        #home-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--dark-green); z-index: 5000; 
            display: flex; flex-direction: column; align-items: center;
            border: 12px double var(--gold); box-sizing: border-box;
        }

        .top-banner { color: var(--gold); text-align: center; margin-top: 30px; font-weight: bold; letter-spacing: 2px; font-size: 12px; }
        .official-star { width: 70px; margin: 10px 0; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .main-title { color: var(--gold); font-size: 20px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; text-align: center; }
        
        /* CENTER K9 PHOTO - LINKED TO A GERMAN SHEPHERD */
        .k9-frame { 
            width: 170px; height: 170px; border-radius: 50%; 
            border: 5px solid var(--gold); margin: 5px 0;
            background: url('https://images.unsplash.com/photo-1589941013453-ec89f33b5e95?q=80&w=500') no-repeat center; 
            background-size: cover;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }

        /* 2x2 ICON GRID WITH WEB-LINKED GOLD ICONS */
        .icon-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 20px; width: 85%; margin-top: 15px; 
        }
        .nav-item { text-align: center; cursor: pointer; transition: transform 0.2s; }
        .nav-item:active { transform: scale(0.9); }
        .nav-icon { width: 65px; height: 65px; margin: 0 auto 5px; filter: drop-shadow(0 0 5px #000); }
        .nav-label { color: var(--gold); font-size: 10px; font-weight: bold; text-transform: uppercase; line-height: 1.2; }

        .footer { 
            position: absolute; bottom: 15px; width: 100%; text-align: center; 
            color: #7ab37a; font-size: 10px; font-style: italic; font-weight: bold;
        }

        /* TACTICAL MAP MODULE */
        #map-module { display: none; height: 100vh; flex-direction: column; background: #000; }
        #map { flex-grow: 1; width: 100%; }
        .map-tools { background: #111; display: grid; grid-template-columns: repeat(6, 1fr); padding: 12px; border-top: 3px solid var(--gold); }
        .m-btn { text-align: center; font-size: 26px; cursor: pointer; }
    </style>
</head>
<body>

<div id="home-screen">
    <div class="top-banner">TO PROTECT &nbsp;&nbsp;&nbsp; ★ ACSD ★ &nbsp;&nbsp;&nbsp; TO SERVE</div>
    <img src="https://img.icons8.com/color/144/sheriff-badge.png" class="official-star">
    <div class="main-title">CANINE SEARCH & RESCUE</div>
    
    <div class="k9-frame"></div> 

    <div class="icon-grid">
        <div class="nav-item" onclick="openMap()">
            <img src="https://img.icons8.com/color/144/map-marker.png" class="nav-icon">
            <div class="nav-label">Live GPS Map</div>
        </div>
        <div class="nav-item">
            <img src="https://img.icons8.com/color/144/plus--v1.png" class="nav-icon">
            <div class="nav-label">Emergency SOS /<br>K9 First Aid</div>
        </div>
        <div class="nav-item">
            <img src="https://img.icons8.com/color/144/scales.png" class="nav-icon">
            <div class="nav-label">Graham v. Connor<br>Legal Shield</div>
        </div>
        <div class="nav-item">
            <img src="https://img.icons8.com/color/144/edit-property.png" class="nav-icon">
            <div class="nav-label">Daily Training<br>Logs</div>
        </div>
    </div>

    <div class="footer">All Rights Reserved. App Created by Retired Deputy Sheriff Earl Wood.</div>
</div>

<div id="map-module">
    <div style="background:#051a05; padding:10px; display:flex; gap:10px; border-bottom: 2px solid var(--gold);">
        <button onclick="closeMap()" style="background:var(--gold); border:none; padding:10px 20px; font-weight:bold; border-radius:5px;">BACK</button>
        <input type="text" id="addr" placeholder="ENTER MISSION ADDRESS" style="flex-grow:1; padding:12px; border-radius:5px; border:none;">
    </div>
    <div id="map"></div>
    <div id="gps-hud" style="background:#000; color:#00ff00; text-align:center; padding:5px; font-family:monospace; font-weight:bold;">SATELLITE: STANDBY</div>
    <div class="map-tools">
        <div class="m-btn" onclick="sm('k9')">🐕</div>
        <div class="m-btn" onclick="sm('leo')">👮</div>
        <div class="m-btn" onclick="sm('per')">🔴</div>
        <div class="m-btn" onclick="sm('sus')">👤</div>
        <div class="m-btn" onclick="forceGPS()" style="color:#007bff;">🛰️</div>
        <div class="m-btn" onclick="location.reload()" style="color:red;">🔄</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map, mode, userMarker, watchID, perimDots = [], perimLine;

    function openMap() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('map-module').style.display = 'flex';
        if(!map) {
            map = L.map('map',{zoomControl:false}).setView([37.584, -79.052], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            map.on('click', function(e){
                if(!mode) return;
                var icons = {'k9':'🐕','leo':'👮','per':'🔴','sus':'👤'};
                L.marker(e.latlng, {icon: L.divIcon({html: `<div style="font-size:30px;">${icons[mode]}</div>`, iconSize:[35,35]})}).addTo(map);
                if(mode === 'per') {
                    perimDots.push(e.latlng);
                    if(perimLine) map.removeLayer(perimLine);
                    perimLine = L.polyline(perimDots, {color: 'red', weight: 4, dashArray: '10, 10'}).addTo(map);
                }
            });
        }
    }

    function closeMap() {
        document.getElementById('map-module').style.display = 'none';
        document.getElementById('home-screen').style.display = 'flex';
    }

    function forceGPS() {
        if (navigator.geolocation) {
            document.getElementById('gps-hud').innerText = "LOCKING SATELLITE...";
            watchID = navigator.geolocation.watchPosition(p => {
                if (p.coords.accuracy > 15) return;
                var pos = [p.coords.latitude, p.coords.longitude];
                if (!userMarker) {
                    userMarker = L.circleMarker(pos, {radius:10, color:'#fff', fillColor:'#007bff', fillOpacity:1}).addTo(map);
                    map.setView(pos, 19);
                } else { userMarker.setLatLng(pos); }
                document.getElementById('gps-hud').innerText = "LOCK ACTIVE (" + Math.round(p.coords.accuracy*3.28) + " FT)";
            }, null, {enableHighAccuracy: true});
        }
    }

    function sm(m){ mode = m; }
</script>
</body>
</html>
