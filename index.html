
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD SAR - COMMAND V23</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --orange: #ff6600; --gold: #ffd700; --blue: #007bff; --live: #00ff00; --clue: #ff0000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        .header { background: #001a00; padding: 45px 15px 10px; border-bottom: 3px solid var(--orange); z-index: 3000; }
        .search-row { display: flex; gap: 5px; }
        .search-row input { flex-grow: 1; padding: 12px; border-radius: 4px; border: none; font-size: 16px; font-weight: bold; }
        
        #map { width: 100%; height: calc(100vh - 380px); background: #111; z-index: 1; }

        /* TACTICAL MONITOR PANEL */
        .legend { 
            position: absolute; left: 10px; top: 200px; width: 235px; 
            background: rgba(0,0,0,0.95); border: 2px solid var(--gold); 
            padding: 12px; z-index: 2000; border-radius: 8px; font-size: 11px; 
        }
        .legend b { color: var(--orange); display: block; margin: 6px 0 3px 0; border-bottom: 1px solid #444; text-transform: uppercase; }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 3px; font-family: monospace; font-size: 12px; }

        .monitor-box { background: #111; border: 1px solid #333; padding: 5px; margin-top: 5px; border-radius: 4px; }
        .coords { font-size: 9px; color: #aaa; text-align: center; display: block; margin-top: 4px; }

        .toolbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 10px; background: #000; z-index: 3000; }
        .tool { background: #222; border: 1px solid #444; padding: 15px 0; border-radius: 6px; text-align: center; color: #fff; cursor: pointer; }
        .tool label { display: block; font-size: 8px; color: var(--gold); text-transform: uppercase; margin-top: 5px; font-weight: bold; }
        .active-tool { background: var(--orange) !important; border: 2px solid white !important; }

        .pulse-cmd { width: 20px; height: 20px; background: var(--blue); border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 15px var(--blue); animation: p 1.5s infinite; }
        @keyframes p { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="header">
    <div class="search-row">
        <input type="text" id="pls-in" placeholder="Search Address, VA">
        <button onclick="deployPLS()" style="background:var(--orange); color:white; border:none; padding:10px; border-radius:4px; font-weight:bold;">DEPLOY</button>
    </div>
    <button onclick="lockCMD()" style="width:100%; background:#003300; color:white; border:1px solid lime; padding:8px; font-size:11px; border-radius:4px; margin-top:5px; font-weight:bold;">ACTIVATE COMMAND CENTER</button>
</div>

<div id="map"></div>

<div class="legend">
    <b>Breach Monitor</b>
    <div class="stat-line"><span>ZONE STATUS:</span><span id="p-status" style="color:red;">OPEN</span></div>
    <div class="monitor-box">
        <div class="stat-line"><span>HEADING:</span><span>N (000°)</span></div>
        <div class="stat-line"><span>WIND:</span><span>10 MPH NW</span></div>
        <span id="coords-display" class="coords">LAT: --.--- | LON: --.---</span>
    </div>

    <b>Unit Inventory</b>
    <div class="stat-line"><span>K9 DEPLOYED:</span><span id="k-val" style="color:yellow;">0</span></div>
    <div class="stat-line"><span>GROUND TEAMS:</span><span id="g-val" style="color:var(--live);">0</span></div>
    <div class="stat-line" style="border-top:1px solid #444; padding-top:4px;"><span>CLUES FOUND:</span><span id="c-val" style="color:red;">0</span></div>
</div>

<div class="toolbar">
    <div id="t-perim" class="tool" onclick="setMode('perim')"><span>📐</span><label>Perimeter</label></div>
    <div id="t-k9" class="tool" onclick="setMode('k9')"><span>🐕</span><label>Add K9</label></div>
    <div id="t-ground" class="tool" onclick="setMode('ground')"><span>🚶</span><label>Add Ground</label></div>
    <div id="t-clue" class="tool" onclick="setMode('clue')"><span>🚩</span><label>Mark Clue</label></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false }).setView([37.5, -79.0], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var mode = null; var kC = 0, gC = 0, cC = 0;
    var pPts = []; var area = L.polygon([], {color: '#ff6600', weight: 6, fillOpacity: 0.3}).addTo(map);

    function setMode(m) {
        mode = m; document.querySelectorAll('.tool').forEach(t => t.classList.remove('active-tool'));
        document.getElementById('t-' + m).classList.add('active-tool');
    }

    function deployPLS() {
        var a = document.getElementById('pls-in').value;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${a}`)
            .then(r => r.json()).then(d => {
                if(d[0]) { map.setView([d[0].lat, d[0].lon], 17); L.marker([d[0].lat, d[0].lon]).addTo(map).bindPopup("PLS").openPopup(); }
            });
    }

    function lockCMD() {
        var c = map.getCenter();
        var icon = L.divIcon({ className: 'c', html: '<div class="pulse-cmd"></div>', iconSize:[20,20], iconAnchor:[10,10] });
        L.marker(c, {icon: icon}).addTo(map);
        document.getElementById('coords-display').innerText = `LAT: ${c.lat.toFixed(4)} | LON: ${c.lng.toFixed(4)}`;
    }

    map.on('click', function(e) {
        if (mode === 'perim') {
            pPts.push(e.latlng); area.setLatLngs(pPts);
            L.circleMarker(e.latlng, {radius: 8, color: 'white', fillColor: 'white', fillOpacity: 1}).addTo(map);
            if(pPts.length >= 3) { document.getElementById('p-status').innerText = "SECURED"; document.getElementById('p-status').style.color = "var(--live)"; }
        } else if (mode === 'k9') {
            kC++; L.circleMarker(e.latlng, {radius: 10, color: 'white', fillColor: 'yellow', fillOpacity: 1, weight: 3}).addTo(map).bindPopup("K9 UNIT");
            document.getElementById('k-val').innerText = kC;
        } else if (mode === 'ground') {
            gC++; L.circleMarker(e.latlng, {radius: 10, color: 'white', fillColor: 'lime', fillOpacity: 1, weight: 3}).addTo(map).bindPopup("GROUND TEAM");
            document.getElementById('g-val').innerText = gC;
        } else if (mode === 'clue') {
            cC++; L.circleMarker(e.latlng, {radius: 8, color: 'white', fillColor: 'red', fillOpacity: 1, weight: 3}).addTo(map).bindPopup("CLUE FOUND");
            document.getElementById('c-val').innerText = cC;
        }
    });
</script>
</body>
</html>
