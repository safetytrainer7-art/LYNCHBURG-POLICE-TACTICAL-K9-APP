<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSD SAR - FINAL COMMAND BUILD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --orange: #ff6600; --gold: #ffd700; --blue: #007bff; --live: #00ff00; --clue: #ff0000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        /* HEADER & SEARCH */
        .header { background: #001a00; padding: 45px 15px 10px; border-bottom: 3px solid var(--orange); z-index: 3000; }
        .search-row { display: flex; gap: 5px; }
        .search-row input { flex-grow: 1; padding: 12px; border-radius: 4px; border: none; font-size: 16px; font-weight: bold; }
        
        #map { width: 100%; height: calc(100vh - 360px); background: #111; z-index: 1; }

        /* TACTICAL INSTRUMENT PANEL */
        .legend { 
            position: absolute; left: 10px; top: 200px; width: 230px; 
            background: rgba(0,0,0,0.95); border: 2px solid var(--gold); 
            padding: 12px; z-index: 2000; border-radius: 8px; font-size: 11px; 
        }
        .legend b { color: var(--orange); display: block; margin: 8px 0 4px 0; border-bottom: 1px solid #444; text-transform: uppercase; }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 3px; font-family: monospace; font-size: 13px; }

        /* WIND & COMPASS */
        .inst-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin: 10px 0; background: #111; padding: 5px; border-radius: 4px; border: 1px solid #333; }
        .inst-cell { text-align: center; }
        .inst-label { font-size: 8px; color: var(--gold); display: block; }

        /* TOOLBAR */
        .toolbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 10px; background: #000; z-index: 3000; }
        .tool { background: #222; border: 1px solid #444; padding: 15px 0; border-radius: 6px; text-align: center; color: #fff; cursor: pointer; }
        .tool label { display: block; font-size: 8px; color: var(--gold); text-transform: uppercase; margin-top: 5px; font-weight: bold; }
        .active-tool { background: var(--orange) !important; border: 2px solid white !important; box-shadow: 0 0 10px var(--orange); }

        /* COMMAND PULSE */
        .pulse-cmd { width: 22px; height: 22px; background: var(--blue); border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 15px var(--blue); animation: b 1.5s infinite; }
        @keyframes b { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="header">
    <div class="search-row">
        <input type="text" id="pls-input" placeholder="Enter PLS Address, VA">
        <button onclick="deployPLS()" style="background:var(--orange); color:white; border:none; padding:10px; border-radius:4px; font-weight:bold;">DEPLOY</button>
    </div>
    <button onclick="lockCommand()" style="width:100%; background:#004400; color:white; border:1px solid lime; padding:8px; font-size:11px; border-radius:4px; margin-top:5px; font-weight:bold;">ACTIVATE COMMAND DOT</button>
</div>

<div id="map"></div>

<div class="legend">
    <b>Command Status</b>
    <div class="stat-line"><span>GPS:</span><span id="gps-stat" style="color:red;">OFFLINE</span></div>
    <div class="stat-line"><span>MODE:</span><span id="mode-stat" style="color:yellow;">STANDBY</span></div>
    
    <b>Instruments</b>
    <div class="inst-grid">
        <div class="inst-cell"><span class="inst-label">HEADING</span><span id="heading">N (000°)</span></div>
        <div class="inst-cell"><span class="inst-label">WIND</span><span id="wind">8 MPH NW</span></div>
    </div>

    <b>Unit Inventory</b>
    <div class="stat-line"><span>K9 ASSETS:</span><span id="k9-val" style="color:yellow;">0</span></div>
    <div class="stat-line"><span>GROUND TEAMS:</span><span id="g-val" style="color:var(--live);">0</span></div>
    <div class="stat-line" style="border-top:1px solid #444; padding-top:4px;"><span>CLUES FOUND:</span><span id="c-val" style="color:red;">0</span></div>
</div>

<div class="toolbar">
    <div id="t-perim" class="tool" onclick="setMode('perim')"><span>📐</span><label>Perimeter</label></div>
    <div id="t-k9" class="tool" onclick="setMode('k9')"><span>🐕</span><label>K9 Unit</label></div>
    <div id="t-ground" class="tool" onclick="setMode('ground')"><span>🚶</span><label>Ground</label></div>
    <div id="t-clue" class="tool" onclick="setMode('clue')"><span>🚩</span><label>Mark Clue</label></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false }).setView([37.5, -79.0], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var mode = null;
    var kCount = 0, gCount = 0, cCount = 0;
    var pPts = [];
    var areaLayer = L.polygon([], {color: '#ff6600', weight: 6, fillOpacity: 0.3}).addTo(map);

    function setMode(m) {
        mode = m;
        document.querySelectorAll('.tool').forEach(t => t.classList.remove('active-tool'));
        document.getElementById('t-' + m).classList.add('active-tool');
        document.getElementById('mode-stat').innerText = m.toUpperCase();
    }

    function deployPLS() {
        var addr = document.getElementById('pls-input').value;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${addr}`)
            .then(r => r.json()).then(d => {
                if(d[0]) { 
                    map.setView([d[0].lat, d[0].lon], 17); 
                    L.marker([d[0].lat, d[0].lon]).addTo(map).bindPopup("<b>PLS</b>").openPopup(); 
                }
            });
    }

    function lockCommand() {
        var icon = L.divIcon({ className: 'c', html: '<div class="pulse-cmd"></div>', iconSize:[22,22], iconAnchor:[11,11] });
        L.marker(map.getCenter(), {icon: icon}).addTo(map);
        document.getElementById('gps-stat').innerText = "LIVE";
        document.getElementById('gps-stat').style.color = "var(--live)";
    }

    map.on('click', function(e) {
        if (mode === 'perim') {
            pPts.push(e.latlng); areaLayer.setLatLngs(pPts);
            L.circleMarker(e.latlng, {radius: 8, color: 'white', fillColor: 'white', fillOpacity: 1}).addTo(map);
        } else if (mode === 'k9') {
            kCount++; L.circleMarker(e.latlng, {radius: 10, color: 'white', fillColor: 'yellow', fillOpacity: 1, weight: 3}).addTo(map).bindPopup("K9 UNIT #" + kCount);
            document.getElementById('k9-val').innerText = kCount;
        } else if (mode === 'ground') {
            gCount++; L.circleMarker(e.latlng, {radius: 10, color: 'white', fillColor: 'lime', fillOpacity: 1, weight: 3}).addTo(map).bindPopup("GROUND TEAM #" + gCount);
            document.getElementById('g-val').innerText = gCount;
        } else if (mode === 'clue') {
            cCount++; L.circleMarker(e.latlng, {radius: 8, color: 'white', fillColor: 'red', fillOpacity: 1, weight: 3}).addTo(map).bindPopup("CLUE #" + cCount);
            document.getElementById('c-val').innerText = cCount;
        }
    });
</script>
</body>
</html>
